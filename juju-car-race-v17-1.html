<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Juju Car Race v17.1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0f172a;overflow:hidden;font-family:system-ui;touch-action:none}
#game{width:100%;height:100vh;display:block}
.hud{position:fixed;top:0;left:0;right:0;height:60px;display:flex;justify-content:space-between;align-items:center;padding:0 12px;z-index:5;background:rgba(0,0,0,.6)}
.btn{background:#fff;color:#1e40af;border:0;border-radius:12px;padding:8px 14px;font-weight:900;font-size:16px;text-decoration:none}
.score{color:#fff;font-weight:900;font-size:28px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;z-index:999}
.start-btn{background:#10b981;color:#fff;border:0;padding:18px 50px;border-radius:15px;font-weight:900;font-size:22px}
.instructions{position:fixed;bottom:20px;width:100%;text-align:center;color:#fff;font-weight:900;font-size:14px}
.coin{position:absolute;width:20px;height:20px;background:gold;border-radius:50%;box-shadow:0 0 10px gold}
</style>
</head>
<body>
<div class="hud">
  <a href="./dashboard.html" class="btn">← Back</a>
  <div class="score" id="score">0</div>
</div>

<canvas id="game"></canvas>
<div class="instructions">Tap Left | Tap Right</div>

<div class="overlay" id="startScreen">
  <h1>🏎️ JUJU CAR RACE v17.1</h1>
  <p style="margin:20px 0">Tap START to enable sound</p>
  <button class="start-btn" onclick="startGame()">START</button>
</div>

<div class="overlay" id="gameOver" style="display:none">
  <h1>💥 CRASHED!</h1>
  <p id="finalScore" style="font-size:28px;font-weight:900;margin:10px 0">Score: 0</p>
  <button class="start-btn" onclick="restartGame()">PLAY AGAIN</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 60;

// SOUNDS
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type){
  if(audioCtx.state === 'suspended') audioCtx.resume(); // 🔥 IMPORTANT FOR SOUND
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);

  if(type === 'start'){ osc.frequency.value = 600; gain.gain.value = 0.2; }
  if(type === 'coin'){ osc.frequency.value = 1200; gain.gain.value = 0.15; }
  if(type === 'crash'){ osc.frequency.value = 100; gain.gain.value = 0.4; }

  osc.start(); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  osc.stop(audioCtx.currentTime + 0.3);
}

let gameRunning = false;
let player = {lane: 1, x: 0};
let lanes = [], enemies = [], coins = []; // 🔥 COINS ARRAY ADD
let score = 0, speed = 8, lastSpawn = 0, lastCoin = 0;
const roadWidth = 300;

function setLanes(){
  const startX = (canvas.width - roadWidth)/2 + roadWidth/6;
  lanes = [startX, startX + roadWidth/3, startX + roadWidth*2/3];
  player.x = lanes[1];
}

function drawRoad(){
  ctx.fillStyle = '#166534'; ctx.fillRect(0,0,canvas.width,canvas.height);
  const roadX = (canvas.width - roadWidth)/2;
  ctx.fillStyle = '#fbbf24'; ctx.fillRect(roadX-10,0,10,canvas.height); ctx.fillRect(roadX+roadWidth,0,10,canvas.height);
  ctx.fillStyle = '#1f2937'; ctx.fillRect(roadX,0,roadWidth,canvas.height);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.setLineDash([30,30]); ctx.lineDashOffset = -Date.now()/20*speed;
  ctx.beginPath();ctx.moveTo(roadX + roadWidth/3,0);ctx.lineTo(roadX + roadWidth/3,canvas.height);ctx.stroke();
  ctx.beginPath();ctx.moveTo(roadX + roadWidth*2/3,0);ctx.lineTo(roadX + roadWidth*2/3,canvas.height);ctx.stroke();
  ctx.setLineDash([]);
}

function drawVehicle(x,y,color,type){
  ctx.save(); ctx.translate(x,y);
  if(type === 'car'){ ctx.fillStyle=color; ctx.fillRect(-25,-45,50,90); ctx.fillStyle='#1e3a8a'; ctx.fillRect(-20,-35,40,20); ctx.fillRect(-20,15,40,20); }
  if(type === 'truck'){ ctx.fillStyle=color; ctx.fillRect(-30,-60,60,120); ctx.fillStyle='#555'; ctx.fillRect(-25,-50,50,40); }
  if(type === 'bus'){ ctx.fillStyle=color; ctx.fillRect(-28,-55,56,110); ctx.fillStyle='#ddd'; for(let i=0;i<3;i++) ctx.fillRect(-25,-45+i*25,50,15); }
  if(type === 'bike'){ ctx.fillStyle=color; ctx.fillRect(-10,-30,20,60); ctx.fillStyle='black'; ctx.fillRect(-15,-25,5,10); ctx.fillRect(10,-25,5,10); }
  ctx.fillStyle='black'; ctx.fillRect(-28,-30,8,15); ctx.fillRect(20,-30,8,15); ctx.fillRect(-28,30,8,15); ctx.fillRect(20,30,8,15);
  ctx.restore();
}

function drawCoin(x,y){
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle = 'gold'; ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fbbf24'; ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function spawnEnemy(){
  const types = ['car','truck','bus','bike'];
  const colors = ['#3b82f6','#10b981','#a855f7','#f59e0b','#ef4444'];
  let count = Math.random()<0.6?1:2, used=[];
  for(let i=0;i<count;i++){
    let lane; do{lane=Math.floor(Math.random()*3);}while(used.includes(lane)); used.push(lane);
    enemies.push({lane:lane, x:lanes[lane], y:-100-i*250, color:colors[Math.floor(Math.random()*5)], type:types[Math.floor(Math.random()*4)]});
  }
}

function spawnCoin(){ // 🔥 NEW COIN SPAWN FUNCTION
  let lane = Math.floor(Math.random()*3);
  coins.push({lane:lane, x:lanes[lane], y:-50});
}

function update(){
  if(!gameRunning) return;
  speed = 8 + Math.floor(score/500);

  if(Date.now()-lastSpawn>1400){lastSpawn=Date.now();spawnEnemy();}
  if(Date.now()-lastCoin>2000){lastCoin=Date.now();spawnCoin();} // 2 sec ki 1 coin

  // Update Enemies
  enemies.forEach((e,i)=>{
    e.y+=speed;
    if(e.y>canvas.height+120){ enemies.splice(i,1); }
    if(Math.abs(e.x-player.x)<45 && Math.abs(e.y-(canvas.height-120))<80) endGame();
  });

  // Update Coins
  coins.forEach((c,i)=>{
    c.y+=speed;
    if(c.y>canvas.height+50) coins.splice(i,1);
    if(Math.abs(c.x-player.x)<40 && Math.abs(c.y-(canvas.height-120))<60){ // COLLECT
      coins.splice(i,1);
      score+=50; // 🔥 COIN = 50 POINTS
      playSound('coin');
    }
  });

  document.getElementById('score').textContent=score;
}

function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawRoad();
  enemies.forEach(e=>drawVehicle(e.x,e.y,e.color,e.type));
  coins.forEach(c=>drawCoin(c.x,c.y)); // 🔥 DRAW COINS
  if(gameRunning){
    player.x = lanes[player.lane];
    drawVehicle(player.x,canvas.height-120,'#ef4444','car');
  }
}

function gameLoop(){ update(); render(); requestAnimationFrame(gameLoop); }

function startGame(){
  if(audioCtx.state === 'suspended') audioCtx.resume(); // 🔥 FIRST CLICK LO RESUME
  gameRunning=true; score=0; enemies=[]; coins=[];
  speed=8; document.getElementById('startScreen').style.display='none';
  document.getElementById('score').textContent=0; setLanes(); playSound('start');
}

function endGame(){
  gameRunning=false; playSound('crash');
  document.getElementById('finalScore').textContent=`Score: ${score}`;
  document.getElementById('gameOver').style.display='flex';
}

function restartGame(){
  enemies=[]; coins=[]; score=0; speed=8; player.lane=1;
  document.getElementById('gameOver').style.display='none'; gameRunning=true;
}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(!gameRunning)return;
  let x=e.touches[0].clientX;
  if(x<canvas.width/3){if(player.lane>0)player.lane--;}
  else if(x>canvas.width*2/3){if(player.lane<2)player.lane++;}
},{passive:false});

setLanes(); gameLoop();
</script>
</body>
</html>

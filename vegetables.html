<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vegetables - Juju</title>
<link rel="manifest" href="./manifest.json?v=121"> <!-- 🔥 version bump -->
<meta name="theme-color" content="#22C55E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation}
  body{font-family:'Nunito',sans-serif;background:#22C55E;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:15px;color:#fff;justify-content:center}

.header{width:100%;max-width:400px;display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:10px} /* 🔥 margin 15->10 */
.back-btn{position:absolute;left:0;background:#fff;color:#15803D;border:0;border-radius:12px;padding:10px 14px;font-size:18px;font-weight:900;font-family:Nunito;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2)}
.back-btn:active{transform:scale(.95)}
.page-heading{display:none} /* 🔥 Top heading hide */

.card{background:#fff;color:#1F2937;border-radius:25px;padding:20px;width:100%;max-width:400px;text-align:center;box-shadow:0 8px 0 rgba(0,0,0,.2);display:flex;flex-direction:column;justify-content:center;margin-top:10px}

.card-heading{background:#22C55E;color:#fff;font-size:20px;font-weight:900;padding:12px 20px;border-radius:15px;margin-bottom:15px;display:flex;align-items:center;justify-content:center;gap:8px} /* 🔥 Card lopala heading box */

.veg-box{width:100%;aspect-ratio:1/1;background:#DCFCE7;border-radius:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;margin-bottom:15px;transition:transform.1s}
.veg-box:active{transform:scale(.95)}
.veg-emoji{font-size:120px;line-height:1;pointer-events:none}

.veg-name{font-size:28px;font-weight:900;color:#15803D;margin-bottom:20px;min-height:40px}

.controls{display:flex;gap:12px;justify-content:center}
.btn{flex:1;background:#22C55E;color:#fff;border:0;border-radius:12px;padding:14px 18px;font-size:16px;font-weight:900;font-family:Nunito;cursor:pointer;box-shadow:0 4px 0 #15803D}
.btn:active{transform:scale(.97)}
.btn:disabled{background:#9CA3AF;box-shadow:0 4px 0 #6B7280;cursor:not-allowed}

.counter{font-size:14px;font-weight:800;color:#6B7280;margin-top:10px;text-align:center}
</style>
</head>
<body>

  <div class="header">
    <button class="back-btn" onclick="location.href='./dashboard.html#vegetables'">←</button>
  </div>

  <div class="card">
    <div class="card-heading" id="cardHeading">🥦 Vegetables</div> <!-- 🔥 Red mark chesina chotla idhe vastundi -->

    <div class="veg-box" id="vegBox">
      <div class="veg-emoji" id="vegEmoji">🥕</div>
    </div>
    <div class="veg-name" id="vegName">Carrot</div>

    <div class="controls">
      <button class="btn" id="prevBtn" onclick="prevVeg()">← Previous</button>
      <button class="btn" id="nextBtn" onclick="nextVeg()">Next →</button>
    </div>
    <div class="counter" id="counter">1 / 10</div>
  </div>

<script>
  const vegetables = [
    {name:'Carrot', emoji:'🥕'},{name:'Broccoli', emoji:'🥦'},{name:'Tomato', emoji:'🍅'},
    {name:'Corn', emoji:'🌽'},{name:'Potato', emoji:'🥔'},{name:'Eggplant', emoji:'🍆'},
    {name:'Cucumber', emoji:'🥒'},{name:'Pepper', emoji:'🫑'},{name:'Mushroom', emoji:'🍄'},{name:'Onion', emoji:'🧅'}
  ];

  let currentIndex = 0;
  const synth = window.speechSynthesis;

  const vegBox = document.getElementById('vegBox');
  const vegEmoji = document.getElementById('vegEmoji');
  const vegName = document.getElementById('vegName');
  const cardHeading = document.getElementById('cardHeading'); // 🔥 new
  const counter = document.getElementById('counter');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  function speak(text){
    if(synth.speaking){ synth.cancel(); }
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    utter.rate = 0.9;
    synth.speak(utter);
  }

  function loadVeg(index){
    const veg = vegetables[index];
    vegEmoji.textContent = veg.emoji;
    vegName.textContent = veg.name;
    cardHeading.innerHTML = `${veg.emoji} ${veg.name}`; // 🔥 Heading kuda veg name tho update avthundi
    counter.textContent = `${index + 1} / ${vegetables.length}`;

    prevBtn.disabled = index === 0;
    nextBtn.disabled = index === vegetables.length - 1;
    nextBtn.textContent = index === vegetables.length - 1? 'Completed ✓' : 'Next →';
  }

  function prevVeg(){
    if(currentIndex > 0){
      currentIndex--;
      loadVeg(currentIndex);
    }
  }

  function nextVeg(){
    if(currentIndex < vegetables.length - 1){
      currentIndex++;
      loadVeg(currentIndex);
    }
  }

  vegBox.addEventListener('click', ()=>{
    speak(vegetables[currentIndex].name);
    vegBox.style.transform = 'scale(0.95)';
    setTimeout(()=>vegBox.style.transform = 'scale(1)', 100);
  });

  loadVeg(0);
</script>
</body>
</html>

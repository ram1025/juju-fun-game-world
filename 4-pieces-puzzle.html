<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Connect Dots - Juju Fun World</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;touch-action:none}
body{font-family:'Baloo 2';background:#3B82F6;padding:15px}
.header{display:flex;justify-content:space-between;margin-bottom:10px}
.btn{background:white;border:none;padding:10px 20px;border-radius:15px;font-size:16px;font-weight:900;color:#F97316}
.container{background:#FFF7ED;padding:20px;border-radius:30px;max-width:400px;margin:0 auto;text-align:center}
.title{font-size:28px;font-weight:900;color:#F97316;margin-bottom:10px}
#canvas{background:#FFFFFF;border:4px solid #FDBA74;border-radius:20px;width:100%;height:350px}
.win{font-size:20px;color:#10B981;font-weight:900;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="header">
    <button class="btn" onclick="location.href='./dashboard.html'">← Back</button>
    <button class="btn" style="background:#3B82F6;color:white" onclick="nextFigure()">Next →</button>
</div>
<div class="container">
    <div class="title" id="figureTitle">Connect Dots: Square 🟦</div>
    <canvas id="canvas"></canvas>
    <div class="win" id="winText">Great! You made a Square 🎉</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let cw,ch;
let currentFigure=0;
let nextDot=0; // which dot to connect next
let drawing=false;

const figures=[
    {
        name:"Square", emoji:"🟦",
        dots:[{x:120,y:120},{x:280,y:120},{x:280,y:280},{x:120,y:280}] // 4 points
    },
    {
        name:"Triangle", emoji:"🔺",
        dots:[{x:200,y:100},{x:100,y:280},{x:300,y:280}] // 3 points
    },
    {
        name:"House", emoji:"🏠",
        dots:[{x:120,y:200},{x:280,y:200},{x:280,y:300},{x:120,y:300},{x:200,y:120}] // house shape
    }
];

function init(){
    cw=canvas.width=canvas.offsetWidth; ch=350; canvas.height=ch;
    nextDot=0;
    drawing=false;
    drawDots();
    document.getElementById('figureTitle').textContent=`Connect Dots: ${figures[currentFigure].name} ${figures[currentFigure].emoji}`;
    document.getElementById('winText').style.display='none';
    speak(figures[currentFigure].name);
}

function drawDots(){
    ctx.clearRect(0,0,cw,ch);
    const dots=figures[currentFigure].dots;
    dots.forEach((d,i)=>{
        // draw dot
        ctx.fillStyle= i===nextDot? '#EF4444' : '#374151'; // next dot red
        ctx.beginPath();ctx.arc(d.x,d.y,12,0,Math.PI*2);ctx.fill();
        // draw number
        ctx.fillStyle='white';
        ctx.font='900 14px Baloo 2';
        ctx.textAlign='center';
        ctx.fillText(i+1, d.x, d.y+5);
    });
}

canvas.addEventListener('touchstart',start);
canvas.addEventListener('mousedown',start);
canvas.addEventListener('touchmove',move);
canvas.addEventListener('mousemove',move);
canvas.addEventListener('touchend',end);
canvas.addEventListener('mouseup',end);

function getPos(e){
    const rect=canvas.getBoundingClientRect();
    const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
    return {x,y};
}

function start(e){
    const pos=getPos(e);
    const d=figures[currentFigure].dots[nextDot];
    if(Math.sqrt((pos.x-d.x)**2 + (pos.y-d.y)**2) < 20){
        drawing=true;
    }
}

function move(e){
    if(!drawing) return;
    const pos=getPos(e);
    const d=figures[currentFigure].dots[nextDot+1];
    if(d && Math.sqrt((pos.x-d.x)**2 + (pos.y-d.y)**2) < 30){
        // connect line
        ctx.strokeStyle='#3B82F6';
        ctx.lineWidth=8;
        ctx.beginPath();
        ctx.moveTo(figures[currentFigure].dots[nextDot].x, figures[currentFigure].dots[nextDot].y);
        ctx.lineTo(d.x,d.y);
        ctx.stroke();
        nextDot++;
        drawDots(); // redraw to show next red dot
        if(nextDot>=figures[currentFigure].dots.length-1){
            // complete
            ctx.fillStyle='rgba(59,130,246,0.3)';
            ctx.beginPath();
            figures[currentFigure].dots.forEach((d,i)=>{if(i===0)ctx.moveTo(d.x,d.y); else ctx.lineTo(d.x,d.y);});
            ctx.closePath();ctx.fill();
            document.getElementById('winText').style.display='block';
            speak("Great Job");
            drawing=false;
        }
    }
}

function end(){ drawing=false; }

function nextFigure(){
    currentFigure=(currentFigure+1)%figures.length;
    init();
}
function speak(t){if('speechSynthesis' in window){const u=new SpeechSynthesisUtterance(t);u.rate=0.8;speechSynthesis.speak(u);}}
init();
</script>
</body>
</html>

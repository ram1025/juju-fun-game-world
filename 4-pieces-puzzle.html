<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>4 Pieces Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#3B82F6;font-family:'Nunito',sans-serif;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:28px;font-weight:900;margin-bottom:5px}
.level{font-size:18px;margin-bottom:15px;color:#FEF9C3;font-weight:800}
.board{width:320px;height:320px;background:#E5E7EB;border-radius:30px;position:relative;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,.3);overflow:hidden;border:4px dashed #9CA3AF}
.outline{position:absolute;border:3px dashed #22C55E;background:rgba(34,197,94,0.1)}
.piece{position:absolute;cursor:grab;background:#FACC15;border:3px solid #1e293b;transition:all 0.2s;touch-action:none;z-index:5;box-shadow:0 4px 10px rgba(0,0,0,.3)}
.piece:active{cursor:grabbing;transform:scale(1.05);z-index:10}
.piece.placed{border-color:#22C55E;background:#22C55E;cursor:default}
.buttons{display:flex;gap:12px;margin-bottom:20px}
.btn{background:#fff;color:#1e40af;border:0;padding:12px 25px;border-radius:15px;font-size:16px;font-weight:900;cursor:pointer}
.btn:active{transform:scale(0.95)}
.win{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;color:#1e40af;padding:30px;border-radius:25px;text-align:center;font-size:24px;font-weight:900;display:none;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.win.show{display:block}
</style>
</head>
<body>
<h1>🧩 4 Pieces Puzzle</h1>
<div class="level" id="levelText">Level 1 / 5 - T Shape</div>
<div class="board" id="board"></div>
<div class="buttons">
  <button class="btn" onclick="resetLevel()">🔄 Reset</button>
  <button class="btn" onclick="showHint()">💡 Hint</button>
  <button class="btn" onclick="nextLevel()">➡️ Next</button>
</div>
<div class="win" id="winBox">Great Job! 🎉<br><button class="btn" onclick="nextLevel()" style="margin-top:15px">Next Level</button></div>

<script>
let currentLevel = 0;
let selected = null;
let offsetX = 0, offsetY = 0;

const levels = [
  // LEVEL 1: T SHAPE - 4 pieces
  {
    name:"T Shape", 
    outline:{w:200,h:200,x:60,y:60},
    pieces:[
      {w:100,h:50,x:0,y:0, targetX:60, targetY:60}, // Top left
      {w:100,h:50,x:0,y:0, targetX:160, targetY:60}, // Top right
      {w:50,h:100,x:0,y:0, targetX:110, targetY:110}, // Middle
      {w:50,h:50,x:0,y:0, targetX:110, targetY:210} // Bottom
    ]
  },
  // LEVEL 2: SQUARE
  {
    name:"Square", 
    outline:{w:160,h:160,x:80,y:80},
    pieces:[
      {w:80,h:80,x:0,y:0, targetX:80, targetY:80},
      {w:80,h:80,x:0,y:0, targetX:160, targetY:80},
      {w:80,h:80,x:0,y:0, targetX:80, targetY:160},
      {w:80,h:80,x:0,y:0, targetX:160, targetY:160}
    ]
  },
  // LEVEL 3: HOUSE
  {
    name:"House", 
    outline:{w:160,h:160,x:80,y:80},
    pieces:[
      {w:160,h:80,x:0,y:0, targetX:80, targetY:160},
      {w:160,h:80,x:0,y:0, targetX:80, targetY:80},
      {w:80,h:80,x:0,y:0, targetX:80, targetY:0},
      {w:80,h:80,x:0,y:0, targetX:160, targetY:0}
    ]
  },
  // LEVEL 4: CROSS
  {
    name:"Cross", 
    outline:{w:180,h:180,x:70,y:70},
    pieces:[
      {w:60,h:180,x:0,y:0, targetX:130, targetY:70},
      {w:180,h:60,x:0,y:0, targetX:70, targetY:130},
      {w:60,h:60,x:0,y:0, targetX:130, targetY:190},
      {w:60,h:60,x:0,y:0, targetX:190, targetY:130}
    ]
  },
  // LEVEL 5: L SHAPE
  {
    name:"L Shape", 
    outline:{w:140,h:140,x:90,y:90},
    pieces:[
      {w:140,h:40,x:0,y:0, targetX:90, targetY:90},
      {w:40,h:140,x:0,y:0, targetX:90, targetY:130},
      {w:40,h:40,x:0,y:0, targetX:130, targetY:90},
      {w:40,h:40,x:0,y:0, targetX:190, targetY:90}
    ]
  }
];

function loadLevel(){
  const board = document.getElementById('board');
  board.innerHTML = '';
  document.getElementById('levelText').textContent = `Level ${currentLevel+1} / 5 - ${levels[currentLevel].name}`;

  // Draw outline
  let outline = document.createElement('div');
  outline.className = 'outline';
  outline.style.width = levels[currentLevel].outline.w+'px';
  outline.style.height = levels[currentLevel].outline.h+'px';
  outline.style.left = levels[currentLevel].outline.x+'px';
  outline.style.top = levels[currentLevel].outline.y+'px';
  board.appendChild(outline);

  // Create pieces - all start at bottom
  levels[currentLevel].pieces.forEach((p,i)=>{
    let div = document.createElement('div');
    div.className = 'piece';
    div.style.width = p.w+'px';
    div.style.height = p.h+'px';
    div.style.left = (50 + i*70)+'px';
    div.style.top = '350px';
    div.dataset.targetX = p.targetX;
    div.dataset.targetY = p.targetY;
    board.appendChild(div);
  });
}

function showHint(){
  [...document.getElementById('board').children].forEach((piece,i)=>{
    if(piece.classList.contains('piece')){
      piece.style.left = piece.dataset.targetX + 'px';
      piece.style.top = piece.dataset.targetY + 'px';
      piece.classList.add('placed');
    }
  });
  setTimeout(checkWin, 500);
}

function resetLevel(){ loadLevel(); }

function nextLevel(){
  document.getElementById('winBox').classList.remove('show');
  currentLevel = (currentLevel + 1) % levels.length;
  loadLevel();
}

function checkWin(){
  let correct = 0;
  [...document.getElementById('board').children].forEach((piece)=>{
    if(piece.classList.contains('piece')){
      let x = parseInt(piece.style.left);
      let y = parseInt(piece.style.top);
      let tx = parseInt(piece.dataset.targetX);
      let ty = parseInt(piece.dataset.targetY);
      if(Math.abs(x - tx) < 25 && Math.abs(y - ty) < 25){
        piece.classList.add('placed');
        piece.style.left = tx + 'px';
        piece.style.top = ty + 'px';
        correct++;
      }
    }
  });
  if(correct === 4){
    document.getElementById('winBox').classList.add('show');
  }
}

// Drag logic
const board = document.getElementById('board');
board.addEventListener('mousedown', e=>{
  if(e.target.classList.contains('piece') &&!e.target.classList.contains('placed')){
    selected = e.target;
    let rect = board.getBoundingClientRect();
    offsetX = e.clientX - rect.left - parseInt(selected.style.left);
    offsetY = e.clientY - rect.top - parseInt(selected.style.top);
  }
});
document.addEventListener('mousemove', e=>{
  if(selected){
    let rect = board.getBoundingClientRect();
    selected.style.left = (e.clientX - rect.left - offsetX) + 'px';
    selected.style.top = (e.clientY - rect.top - offsetY) + 'px';
  }
});
document.addEventListener('mouseup', ()=>{if(selected){checkWin();} selected=null;});

// Touch
board.addEventListener('touchstart', e=>{
  if(e.target.classList.contains('piece') &&!e.target.classList.contains('placed')){
    selected = e.target;
    let touch = e.touches[0];
    let rect = board.getBoundingClientRect();
    offsetX = touch.clientX - rect.left - parseInt(selected.style.left);
    offsetY = touch.clientY - rect.top - parseInt(selected.style.top);
  }
});
document.addEventListener('touchmove', e=>{
  if(selected){ e.preventDefault();
    let touch = e.touches[0];
    let rect = board.getBoundingClientRect();
    selected.style.left = (touch.clientX - rect.left - offsetX) + 'px';
    selected.style.top = (touch.clientY - rect.top - offsetY) + 'px';
  }
});
document.addEventListener('touchend', ()=>{if(selected){checkWin();} selected=null;});

loadLevel();
</script>
</body>
</html>

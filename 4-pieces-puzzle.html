<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>4 Pieces Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#3B82F6;font-family:'Nunito',sans-serif;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0}
.header{width:100%;display:flex;align-items:center;justify-content:center;position:relative;padding:15px 20px}
.back-btn{position:absolute;left:15px;background:#fff;border:0;border-radius:12px;padding:10px 14px;font-size:24px;font-weight:900;color:#1e40af;cursor:pointer}
h1{font-size:24px;font-weight:900;text-align:center}
.level{font-size:16px;margin:5px 0 10px;color:#FEF9C3;font-weight:800;text-align:center}
.game-area{display:flex;flex-direction:column;align-items:center;width:100%;padding-bottom:20px}
.board{width:90vw;max-width:350px;height:90vw;max-height:350px;background:#fff;border-radius:30px;position:relative;margin-bottom:15px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.outline{position:absolute;border:3px dashed #22C55E;background:rgba(34,197,94,0.1);border-radius:10px}
.pieces-tray{width:90vw;max-width:350px;height:120px;background:rgba(255,255,255,0.2);border-radius:20px;position:relative;margin-bottom:15px;display:flex;align-items:center;justify-content:space-around;padding:10px}
.piece{position:absolute;cursor:grab;background:#FACC15;border:3px solid #1e293b;transition:all 0.1s;touch-action:none;z-index:5;border-radius:8px}
.piece:active{cursor:grabbing;transform:scale(1.05);z-index:10}
.piece.placed{border-color:#22C55E;background:#22C55E;cursor:default}
.buttons{display:flex;gap:10px;margin-bottom:10px}
.btn{background:#fff;color:#1e40af;border:0;padding:12px 20px;border-radius:15px;font-size:15px;font-weight:900;cursor:pointer}
.btn:active{transform:scale(0.95)}
.win{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;color:#1e40af;padding:30px;border-radius:25px;text-align:center;font-size:24px;font-weight:900;display:none;z-index:100}
.win.show{display:block}
</style>
</head>
<body>
<div class="header">
  <button class="back-btn" onclick="goBack()">←</button>
  <h1>🧩 4 Pieces Puzzle</h1>
</div>
<div class="level" id="levelText">Level 1 / 5 - T Shape</div>

<div class="game-area">
  <div class="board" id="board"></div>
  <div class="pieces-tray" id="tray"></div>
  <div class="buttons">
    <button class="btn" onclick="resetLevel()">🔄 Reset</button>
    <button class="btn" onclick="showHint()">💡 Hint</button>
    <button class="btn" onclick="nextLevel()">➡️ Next</button>
  </div>
</div>

<div class="win" id="winBox">Great Job! 🎉<br><button class="btn" onclick="nextLevel()" style="margin-top:15px">Next Level</button></div>

<script>
let currentLevel = 0;
let selected = null;
let offsetX = 0, offsetY = 0;
let hintUsed = false;

function goBack(){ location.href = './dashboard.html'; }

const levels = [
  {name:"T Shape", outline:{w:200,h:200,x:75,y:75}, pieces:[
    {w:100,h:50,targetX:75, targetY:75},{w:100,h:50,targetX:175, targetY:75},
    {w:50,h:100,targetX:125, targetY:125},{w:50,h:50,targetX:125, targetY:225}
  ]},
  {name:"Square", outline:{w:160,h:160,x:95,y:95}, pieces:[
    {w:80,h:80,targetX:95, targetY:95},{w:80,h:80,targetX:175, targetY:95},
    {w:80,h:80,targetX:95, targetY:175},{w:80,h:80,targetX:175, targetY:175}
  ]},
  {name:"House", outline:{w:160,h:160,x:95,y:95}, pieces:[
    {w:160,h:80,targetX:95, targetY:175},{w:160,h:80,targetX:95, targetY:95},
    {w:80,h:80,targetX:95, targetY:15},{w:80,h:80,targetX:175, targetY:15}
  ]},
  {name:"Cross", outline:{w:180,h:180,x:85,y:85}, pieces:[
    {w:60,h:180,targetX:145, targetY:85},{w:180,h:60,targetX:85, targetY:145},
    {w:60,h:60,targetX:145, targetY:205},{w:60,h:60,targetX:205, targetY:145}
  ]},
  {name:"L Shape", outline:{w:140,h:140,x:105,y:105}, pieces:[
    {w:140,h:40,targetX:105, targetY:105},{w:40,h:140,targetX:105, targetY:145},
    {w:40,h:40,targetX:145, targetY:105},{w:40,h:40,targetX:185, targetY:105}
  ]}
];

function loadLevel(){
  hintUsed = false;
  const board = document.getElementById('board');
  const tray = document.getElementById('tray');
  board.innerHTML = ''; tray.innerHTML = '';
  document.getElementById('levelText').textContent = `Level ${currentLevel+1} / 5 - ${levels[currentLevel].name}`;

  // Draw outline in board
  let outline = document.createElement('div');
  outline.className = 'outline';
  outline.style.width = levels[currentLevel].outline.w+'px';
  outline.style.height = levels[currentLevel].outline.h+'px';
  outline.style.left = levels[currentLevel].outline.x+'px';
  outline.style.top = levels[currentLevel].outline.y+'px';
  board.appendChild(outline);

  // Create pieces in TRAY - draggable
  levels[currentLevel].pieces.forEach((p,i)=>{
    let div = document.createElement('div');
    div.className = 'piece';
    div.style.width = p.w/2+'px'; // tray lo chinna ga
    div.style.height = p.h/2+'px';
    div.style.position = 'relative';
    div.style.left = '0px';
    div.style.top = '0px';
    div.dataset.targetX = p.targetX;
    div.dataset.targetY = p.targetY;
    div.dataset.w = p.w;
    div.dataset.h = p.h;
    tray.appendChild(div);
  });
}

function showHint(){
  if(hintUsed) return;
  hintUsed = true;
  [...document.getElementById('board').children].forEach((piece)=>{
    if(piece.classList.contains('piece')){
      piece.style.left = piece.dataset.targetX + 'px';
      piece.style.top = piece.dataset.targetY + 'px';
      piece.classList.add('placed');
    }
  });
}

function resetLevel(){ loadLevel(); }

function nextLevel(){
  document.getElementById('winBox').classList.remove('show');
  if(!checkWinManual()){ alert("Inka level complete cheyyaledu! 🤔"); return; }
  currentLevel = (currentLevel + 1) % levels.length;
  loadLevel();
}

function checkWinManual(){
  let correct = 0;
  [...document.getElementById('board').children].forEach((piece)=>{
    if(piece.classList.contains('piece') && piece.classList.contains('placed')) correct++;
  });
  return correct === 4;
}

function checkWin(){
  let correct = 0;
  [...document.getElementById('board').children].forEach((piece)=>{
    if(piece.classList.contains('piece')){
      let x = parseInt(piece.style.left);
      let y = parseInt(piece.style.top);
      let tx = parseInt(piece.dataset.targetX);
      let ty = parseInt(piece.dataset.targetY);
      if(Math.abs(x - tx) < 20 && Math.abs(y - ty) < 20){
        piece.classList.add('placed');
        piece.style.left = tx + 'px';
        piece.style.top = ty + 'px';
        correct++;
      }
    }
  });
  if(correct === 4 &&!hintUsed){ document.getElementById('winBox').classList.add('show'); }
}

// DRAG FROM TRAY TO BOARD
const board = document.getElementById('board');
document.addEventListener('mousedown', e=>{
  if(e.target.classList.contains('piece')){
    selected = e.target;
    let rect = selected.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    // Move piece to board
    if(selected.parentElement.id === 'tray'){
      board.appendChild(selected);
      selected.style.position = 'absolute';
      selected.style.width = selected.dataset.w + 'px';
      selected.style.height = selected.dataset.h + 'px';
    }
  }
});
document.addEventListener('mousemove', e=>{
  if(selected){
    let rect = board.getBoundingClientRect();
    selected.style.left = (e.clientX - rect.left - offsetX) + 'px';
    selected.style.top = (e.clientY - rect.top - offsetY) + 'px';
  }
});
document.addEventListener('mouseup', ()=>{if(selected){checkWin();} selected=null;});

// TOUCH
document.addEventListener('touchstart', e=>{
  if(e.target.classList.contains('piece')){
    selected = e.target;
    let touch = e.touches[0];
    let rect = selected.getBoundingClientRect();
    offsetX = touch.clientX - rect.left;
    offsetY = touch.clientY - rect.top;
    if(selected.parentElement.id === 'tray'){
      board.appendChild(selected);
      selected.style.position = 'absolute';
      selected.style.width = selected.dataset.w + 'px';
      selected.style.height = selected.dataset.h + 'px';
    }
  }
});
document.addEventListener('touchmove', e=>{
  if(selected){ e.preventDefault();
    let touch = e.touches[0];
    let rect = board.getBoundingClientRect();
    selected.style.left = (touch.clientX - rect.left - offsetX) + 'px';
    selected.style.top = (touch.clientY - rect.top - offsetY) + 'px';
  }
});
document.addEventListener('touchend', ()=>{if(selected){checkWin();} selected=null;});

loadLevel();
</script>
</body>
</html>

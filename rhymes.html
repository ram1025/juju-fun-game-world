<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rhymes - Juju</title>
<link rel="manifest" href="./manifest.json?v=128">
<meta name="theme-color" content="#A855F7">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation}
  body{font-family:'Nunito',sans-serif;background:#A855F7;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:15px;color:#fff}

.card{background:#fff;color:#1F2937;border-radius:25px;padding:25px;width:100%;max-width:400px;text-align:center;box-shadow:0 8px 0 rgba(0,0,0,.2)}

.rhyme-box{width:100%;min-height:200px;background:#F3E8FF;border-radius:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;margin-bottom:15px;padding:20px;transition:transform.1s}
.rhyme-box:active{transform:scale(.98)}
.rhyme-icon{font-size:60px;margin-bottom:10px}
.rhyme-title{font-size:24px;font-weight:900;color:#7C3AED;margin-bottom:10px}
.rhyme-text{font-size:18px;font-weight:700;color:#4B5563;line-height:1.6;white-space:pre-line}

.controls{display:flex;gap:12px;justify-content:center}
.btn{background:#A855F7;color:#fff;border:0;border-radius:12px;padding:12px 18px;font-size:16px;font-weight:900;font-family:Nunito;cursor:pointer;box-shadow:0 4px 0 #7C3AED;flex:1}
.btn:disabled{background:#9CA3AF;box-shadow:0 4px 0 #6B7280;cursor:not-allowed}
.btn.back{background:#6B7280;box-shadow:0 4px 0 #4B5563}

.counter{font-size:14px;font-weight:800;color:#6B7280;margin-top:10px}
</style>
</head>
<body>

  <div class="card">
    <div class="rhyme-box" id="rhymeBox">
      <div>
        <div class="rhyme-icon" id="rhymeIcon">🎵</div>
        <div class="rhyme-title" id="rhymeTitle">Twinkle Twinkle</div>
        <div class="rhyme-text" id="rhymeText">Twinkle, twinkle, little star,
How I wonder what you are!</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn back" onclick="location.href='./dashboard.html'">← Back</button>
      <button class="btn" id="nextBtn" onclick="nextRhyme()">Next ></button>
    </div>
    <div class="counter" id="counter">1 / 5</div>
  </div>

<script>
  // ===== 5 POPULAR RHYMES =====
  const rhymes = [
    {
      icon:'⭐',
      title:'Twinkle Twinkle',
      text:`Twinkle, twinkle, little star,
How I wonder what you are!`
    },
    {
      icon:'🐑',
      title:'Baa Baa Black Sheep',
      text:`Baa, baa, black sheep,
Have you any wool?
Yes sir, yes sir,
Three bags full.`
    },
    {
      icon:'🚌',
      title:'Wheels on the Bus',
      text:`The wheels on the bus go round and round,
Round and round, round and round.`
    },
    {
      icon:'☀️',
      title:'You Are My Sunshine',
      text:`You are my sunshine, my only sunshine,
You make me happy when skies are grey.`
    },
    {
      icon:'🐰',
      title:'Johnny Johnny',
      text:`Johnny, Johnny
Yes, Papa?
Eating sugar?
No, Papa.
Telling lies?
No, Papa.
Open your mouth.
Ha ha ha.`
    }
  ];

  let currentIndex = 0;
  const synth = window.speechSynthesis;

  const rhymeBox = document.getElementById('rhymeBox');
  const rhymeIcon = document.getElementById('rhymeIcon');
  const rhymeTitle = document.getElementById('rhymeTitle');
  const rhymeText = document.getElementById('rhymeText');
  const counter = document.getElementById('counter');
  const nextBtn = document.getElementById('nextBtn');

  function speak(text){
    if(synth.speaking){ synth.cancel(); }
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    utter.rate = 0.85;
    synth.speak(utter);
  }

  function loadRhyme(index){
    const rhyme = rhymes[index];
    rhymeIcon.textContent = rhyme.icon;
    rhymeTitle.textContent = rhyme.title;
    rhymeText.textContent = rhyme.text;
    counter.textContent = `${index + 1} / ${rhymes.length}`;

    if(index === rhymes.length - 1){
      nextBtn.disabled = true;
      nextBtn.textContent = 'Completed ✓';
    } else {
      nextBtn.disabled = false;
      nextBtn.textContent = 'Next >';
    }

    speak(rhyme.title + '. ' + rhyme.text); // Page open ayinappudu auto
  }

  function nextRhyme(){
    if(currentIndex < rhymes.length - 1){
      currentIndex++;
      loadRhyme(currentIndex);
    }
  }

  // Rhyme Box Touch -> Voice Repeat
  rhymeBox.addEventListener('click', ()=>{
    speak(rhymes[currentIndex].title + '. ' + rhymes[currentIndex].text);
    rhymeBox.style.transform = 'scale(0.98)';
    setTimeout(()=>rhymeBox.style.transform = 'scale(1)', 100);
  });

  // First Load
  loadRhyme(0);
</script>
</body>
</html>

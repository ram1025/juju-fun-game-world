<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Connect the Dots - Juju Fun World</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Baloo 2';background:#3B82F6;padding:12px; overscroll-behavior-y: auto}
.header{display:flex;justify-content:space-between;gap:6px;margin-bottom:10px;max-width:400px;margin:0 auto 10px}
.btn{background:white;border:none;padding:8px 12px;border-radius:12px;font-size:14px;font-weight:900;color:#F97316;cursor:pointer}
.btn:active{transform:scale(0.95)}
.container{background:#FFF7ED;padding:12px;border-radius:20px;max-width:400px;margin:0 auto;box-shadow:0 4px 0 #FDBA74}
.topbar{background:#3B82F6;color:white;padding:10px;border-radius:12px;font-size:18px;font-weight:900;margin-bottom:8px;text-align:center}
#canvas{background:#FFFFFF;border:2px solid #FDBA74;border-radius:12px;width:100%;height:270px; touch-action:none}
.title{font-size:17px;font-weight:900;color:#F97316;margin:8px 0;text-align:center}
.win{font-size:16px;color:#10B981;font-weight:900;margin-top:6px;text-align:center;display:none}
</style>
</head>
<body>
<div class="header">
    <button class="btn" onclick="location.href='./dashboard.html'">← Back</button>
    <button class="btn" onclick="prevFigure()">← Prev</button>
    <button class="btn" onclick="resetGame()">Reset</button>
    <button class="btn" onclick="nextFigure()">Next →</button>
</div>
<div class="container">
    <div class="topbar">Connect the Dots</div>
    <div class="title" id="titleText">Make a Fish 🐟</div>
    <canvas id="canvas"></canvas>
    <div class="win" id="winText">Great Job! 🎉</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let cw,ch;
let currentFigure=0;
let currentDot=0;
let drawing=false;
let drawnLines=[];

const figures=[
    {name:"Fish", emoji:"🐟", dots:[{x:60,y:135},{x:90,y:105},{x:130,y:95},{x:180,y:105},{x:220,y:135},{x:180,y:165},{x:130,y:175},{x:90,y:165}]},
    {name:"Star", emoji:"⭐", dots:[{x:180,y:65},{x:195,y:115},{x:250,y:115},{x:205,y:145},{x:220,y:195},{x:180,y:165},{x:140,y:195},{x:155,y:145},{x:110,y:115},{x:165,y:115}]},
    {name:"Heart", emoji:"❤️", dots:[{x:180,y:105},{x:145,y:85},{x:110,y:105},{x:110,y:140},{x:180,y:205},{x:250,y:140},{x:250,y:105},{x:215,y:85}]},
    {name:"Cat", emoji:"🐱", dots:[{x:120,y:95},{x:105,y:75},{x:135,y:70},{x:165,y:80},{x:195,y:70},{x:225,y:75},{x:210,y:95},{x:210,y:165},{x:120,y:165}]},
    {name:"Car", emoji:"🚗", dots:[{x:90,y:155},{x:90,y:125},{x:120,y:110},{x:220,y:110},{x:250,y:125},{x:250,y:155},{x:220,y:170},{x:120,y:170}]},
    {name:"Boat", emoji:"⛵", dots:[{x:100,y:175},{x:240,y:175},{x:200,y:145},{x:140,y:145},{x:170,y:115}]},
    {name:"Cap", emoji:"🧢", dots:[{x:110,y:135},{x:130,y:115},{x:150,y:105},{x:180,y:105},{x:210,y:115},{x:230,y:135},{x:210,y:155},{x:130,y:155}]},
    {name:"Moon", emoji:"🌙", dots:[{x:180,y:85},{x:210,y:95},{x:230,y:125},{x:210,y:155},{x:180,y:165},{x:150,y:155},{x:130,y:125},{x:150,y:95}]},
    {name:"Square", emoji:"🟦", dots:[{x:130,y:115},{x:230,y:115},{x:230,y:215},{x:130,y:215}]},
    {name:"Triangle", emoji:"🔺", dots:[{x:180,y:95},{x:120,y:205},{x:240,y:205}]},
    {name:"Hexagon", emoji:"⬡", dots:[{x:180,y:95},{x:220,y:115},{x:220,y:155},{x:180,y:175},{x:140,y:155},{x:140,y:115}]}
];

function init(){
    cw=canvas.width=canvas.offsetWidth; ch=270; canvas.height=ch;
    currentDot=0; drawing=false; drawnLines=[];
    const f=figures[currentFigure];
    document.getElementById('titleText').innerHTML=`Make a ${f.name} ${f.emoji}`;
    document.getElementById('winText').style.display='none';
    drawAll();
}

function drawAll(){
    ctx.clearRect(0,0,cw,ch);
    const dots=figures[currentFigure].dots;

    // Light dotted guide
    ctx.strokeStyle='rgba(180,180,180,0.4)';
    ctx.lineWidth=2;
    ctx.setLineDash([5,5]);
    ctx.beginPath();
    dots.forEach((d,i)=>{if(i===0)ctx.moveTo(d.x,d.y); else ctx.lineTo(d.x,d.y);});
    ctx.closePath();ctx.stroke();
    ctx.setLineDash([]);

    // User blue lines
    ctx.strokeStyle='#3B82F6';
    ctx.lineWidth=5;
    ctx.lineCap='round';
    drawnLines.forEach(line=>{
        ctx.beginPath();ctx.moveTo(line.x1,line.y1);ctx.lineTo(line.x2,line.y2);ctx.stroke();
    });

    // Dots: Black with white number. Current = Red
    dots.forEach((d,i)=>{
        ctx.fillStyle= i===currentDot? '#EF4444' : '#1F2937';
        ctx.beginPath();ctx.arc(d.x,d.y,8,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='white';
        ctx.font='800 11px Baloo 2';
        ctx.textAlign='center';
        ctx.fillText(i+1, d.x, d.y+3.5);
    });
}

function getPos(e){
    const rect=canvas.getBoundingClientRect();
    const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
    return {x,y};
}

canvas.addEventListener('touchstart',start,{passive:true});
canvas.addEventListener('mousedown',start);
canvas.addEventListener('touchmove',move,{passive:false});
canvas.addEventListener('mousemove',move);
canvas.addEventListener('touchend',end);
canvas.addEventListener('mouseup',end);

function start(e){
    const pos=getPos(e);
    const d=figures[currentFigure].dots[currentDot];
    if(Math.hypot(pos.x-d.x, pos.y-d.y) < 18){ drawing=true; }
}

function move(e){
    if(!drawing) return;
    const pos=getPos(e);
    const dots=figures[currentFigure].dots;
    const next=dots[currentDot+1];
    if(next && Math.hypot(pos.x-next.x, pos.y-next.y) < 25){
        const prev=dots[currentDot];
        drawnLines.push({x1:prev.x,y1:prev.y,x2:next.x,y2:next.y});
        currentDot++; drawAll();
        if(currentDot>=dots.length-1){
            drawing=false;
            // Fill shape
            ctx.fillStyle='rgba(59,130,246,0.2)';
            ctx.beginPath(); dots.forEach((d,i)=>{if(i===0)ctx.moveTo(d.x,d.y); else ctx.lineTo(d.x,d.y);});
            ctx.closePath();ctx.fill();
            // Win
            document.getElementById('winText').style.display='block';
            confetti();
        }
    }
}

function confetti(){
    for(let i=0;i<30;i++){
        setTimeout(()=>{
            const x = Math.random()*cw;
            const y = Math.random()*ch/2;
            ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`;
            ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
        }, i*50)
    }
}

function end(){ drawing=false; }
function resetGame(){ init(); }
function nextFigure(){ currentFigure=(currentFigure+1)%figures.length; init(); }
function prevFigure(){ currentFigure=(currentFigure-1+figures.length)%figures.length; init(); }
init();
</script>
</body>
</html>

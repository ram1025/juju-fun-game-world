<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Connect the Dots - Juju Fun World</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Baloo 2';background:#3B82F6;padding:12px; overscroll-behavior-y: auto}
.header{display:flex;justify-content:space-between;gap:6px;margin-bottom:10px;max-width:400px;margin:0 auto 10px}
.btn{background:white;border:none;padding:8px 12px;border-radius:12px;font-size:14px;font-weight:900;color:#F97316;cursor:pointer}
.btn:active{transform:scale(0.95)}
.container{background:#FFF7ED;padding:12px;border-radius:20px;max-width:400px;margin:0 auto;box-shadow:0 4px 0 #FDBA74}
.topbar{background:#3B82F6;color:white;padding:10px;border-radius:12px;font-size:18px;font-weight:900;margin-bottom:8px;text-align:center}
#canvas{background:#FFFFFF;border:2px solid #FDBA74;border-radius:12px;width:100%;height:270px; touch-action:none}
.title{font-size:17px;font-weight:900;color:#F97316;margin:8px 0;text-align:center}
.win{font-size:16px;color:#10B981;font-weight:900;margin-top:6px;text-align:center;display:none}
</style>
</head>
<body>
<div class="header">
    <button class="btn" onclick="location.href='./dashboard.html'">← Back</button>
    <button class="btn" onclick="prevFigure()">← Prev</button>
    <button class="btn" onclick="resetGame()">Reset</button>
    <button class="btn" onclick="nextFigure()">Next →</button>
</div>
<div class="container">
    <div class="topbar">Trace the Shape</div>
    <div class="title" id="titleText">Trace a Fish 🐟</div>
    <canvas id="canvas"></canvas>
    <div class="win" id="winText">Great Job! 🎉</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let cw,ch;
let currentFigure=0;
let currentPoint=0;
let drawing=false;
let drawnLines=[];

const figures=[
    {name:"Fish", emoji:"🐟", points:[{x:60,y:135},{x:90,y:105},{x:130,y:95},{x:180,y:105},{x:220,y:135},{x:180,y:165},{x:130,y:175},{x:90,y:165}]},
    {name:"Star", emoji:"⭐", points:[{x:180,y:65},{x:195,y:115},{x:250,y:115},{x:205,y:145},{x:220,y:195},{x:180,y:165},{x:140,y:195},{x:155,y:145},{x:110,y:115},{x:165,y:115}]},
    {name:"Heart", emoji:"❤️", points:[{x:180,y:105},{x:145,y:85},{x:110,y:105},{x:110,y:140},{x:180,y:205},{x:250,y:140},{x:250,y:105},{x:215,y:85}]},
    {name:"Boat", emoji:"⛵", points:[{x:100,y:175},{x:240,y:175},{x:200,y:145},{x:140,y:145},{x:170,y:115}]},
    {name:"Square", emoji:"🟦", points:[{x:130,y:115},{x:230,y:115},{x:230,y:215},{x:130,y:215}]},
    {name:"Triangle", emoji:"🔺", points:[{x:180,y:95},{x:120,y:205},{x:240,y:205}]},
    {name:"Hexagon", emoji:"⬡", points:[{x:180,y:95},{x:220,y:115},{x:220,y:155},{x:180,y:175},{x:140,y:155},{x:140,y:115}]},
    {name:"Moon", emoji:"🌙", points:[{x:180,y:85},{x:210,y:95},{x:230,y:125},{x:210,y:155},{x:180,y:165},{x:150,y:155},{x:130,y:125},{x:150,y:95}]}
];

function init(){
    cw=canvas.width=canvas.offsetWidth; ch=270; canvas.height=ch;
    currentPoint=0; drawing=false; drawnLines=[];
    const f=figures[currentFigure];
    document.getElementById('titleText').innerHTML=`Trace a ${f.name} ${f.emoji}`;
    document.getElementById('winText').style.display='none';
    drawAll();
}

function drawAll(){
    ctx.clearRect(0,0,cw,ch);
    const pts=figures[currentFigure].points;

    // 1. Light gray guide outline - dots lekunda
    ctx.strokeStyle='rgba(180,180,180,0.5)';
    ctx.lineWidth=4;
    ctx.setLineDash([8,6]);
    ctx.beginPath();
    pts.forEach((p,i)=>{if(i===0)ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y);});
    ctx.closePath();ctx.stroke();
    ctx.setLineDash([]);

    // 2. User drawn blue line
    ctx.strokeStyle='#3B82F6';
    ctx.lineWidth=6;
    ctx.lineCap='round';
    drawnLines.forEach(line=>{
        ctx.beginPath();ctx.moveTo(line.x1,line.y1);ctx.lineTo(line.x2,line.y2);ctx.stroke();
    });
}

function getPos(e){
    const rect=canvas.getBoundingClientRect();
    const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
    return {x,y};
}

canvas.addEventListener('touchstart',start,{passive:true});
canvas.addEventListener('mousedown',start);
canvas.addEventListener('touchmove',move,{passive:false});
canvas.addEventListener('mousemove',move);
canvas.addEventListener('touchend',end);
canvas.addEventListener('mouseup',end);

function start(e){
    drawing=true;
    const pos=getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x,pos.y);
}

function move(e){
    if(!drawing) return;
    const pos=getPos(e);
    const pts=figures[currentFigure].points;

    // Check if near next point
    const next=pts[currentPoint+1] || pts[0];
    if(Math.hypot(pos.x-next.x, pos.y-next.y) < 30){
        const prev=pts[currentPoint];
        drawnLines.push({x1:prev.x,y1:prev.y,x2:next.x,y2:next.y});
        currentPoint++;
        drawAll();

        if(currentPoint>=pts.length-1){
            drawing=false;
            // Fill shape
            ctx.fillStyle='rgba(59,130,246,0.25)';
            ctx.beginPath(); pts.forEach((p,i)=>{if(i===0)ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y);});
            ctx.closePath();ctx.fill();
            // Win
            document.getElementById('winText').style.display='block';
            confetti();
        }
    }
}

function confetti(){
    for(let i=0;i<30;i++){
        setTimeout(()=>{
            const x = Math.random()*cw;
            const y = Math.random()*ch/2;
            ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`;
            ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
        }, i*50)
    }
}

function end(){ drawing=false; }
function resetGame(){ init(); }
function nextFigure(){ currentFigure=(currentFigure+1)%figures.length; init(); }
function prevFigure(){ currentFigure=(currentFigure-1+figures.length)%figures.length; init(); }
init();
</script>
</body>
</html>

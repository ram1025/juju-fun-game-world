<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2563eb">
<title>Duck Puzzle - Juju Fun World</title>
<link rel="manifest" href="./manifest.json">
<style>
:root{--blue:#2563eb;--cream:#fef3c7;--card:#ffffff;--text:#1f2937;--green:#10b981;--shadow:0 12px 40px rgba(0,0,0,.2)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;background:var(--blue);font-family:system-ui,-apple-system}
.app{max-width:480px;margin:0 auto;min-height:100%;padding:16px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.btn{border:0;border-radius:16px;padding:10px 16px;font-weight:900;cursor:pointer}
.btn-back{background:#fff;color:#f97316;box-shadow:var(--shadow)}
.card{background:var(--cream);border-radius:24px;box-shadow:var(--shadow);padding:16px;text-align:center}
h1{margin:0 0 6px;font-size:22px;color:#f97316}
.sub{margin:0 0 14px;font-weight:700;color:var(--text)}
.puzzle-box{background:#fff;border:3px solid #fbbf24;border-radius:18px;padding:12px;margin-bottom:14px;position:relative;min-height:280px}
.puzzle-bg{width:100%;height:auto;display:block}
.missing-slot{position:absolute;left:20px;top:120px;width:110px;height:110px;border:2px dashed #9ca3af;border-radius:12px;background:rgba(255,255,255,.7)}
.piece-area{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.piece{width:90px;height:90px;background:#fff;border:2px solid #d1d5db;border-radius:12px;cursor:grab;display:grid;place-items:center;overflow:hidden}
.piece img{width:100%;height:100%;object-fit:cover}
.piece.dragging{opacity:.5}
.status{font-weight:800;margin:8px 0;color:var(--text)}
.btn-next{background:var(--green);color:#fff;width:100%;padding:14px;font-size:16px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <a href="./dashboard.html" class="btn btn-back">← Back</a>
  </div>

  <div class="card">
    <h1 id="puzzleTitle">1/10: Duck Puzzle</h1>
    <p class="sub">Find the Missing Piece</p>
    
    <div class="puzzle-box">
      <!-- 🔥 Duck Background Image -->
      <img class="puzzle-bg" src="https://i.imgur.com/8Q2zQ3p.png" alt="Duck Puzzle Background">
      <div class="missing-slot" id="dropZone" data-piece="duck-head"></div>
    </div>

    <div class="piece-area" id="pieceArea">
      <!-- 🔥 4 Options. Only 1 is correct -->
      <div class="piece" draggable="true" data-piece="grass"><img src="https://i.imgur.com/1a2b3c4.png" alt="Grass"></div>
      <div class="piece" draggable="true" data-piece="water"><img src="https://i.imgur.com/5d6e7f8.png" alt="Water"></div>
      <div class="piece" draggable="true" data-piece="duck-head"><img src="https://i.imgur.com/9g0h1i2.png" alt="Duck Head"></div>
      <div class="piece" draggable="true" data-piece="wing"><img src="https://i.imgur.com/3j4k5l6.png" alt="Wing"></div>
    </div>

    <div class="status" id="status">Drag the correct piece to the empty box</div>
    <button class="btn btn-next" id="nextBtn" disabled>Next →</button>
  </div>
</div>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js?v=11-2');} // 🔥 V11-2

const dropZone = document.getElementById('dropZone');
const pieceArea = document.getElementById('pieceArea');
const status = document.getElementById('status');
const nextBtn = document.getElementById('nextBtn');
let draggedPiece = null;

document.querySelectorAll('.piece').forEach(p => {
  p.addEventListener('dragstart', e => { draggedPiece = e.target; e.target.classList.add('dragging'); });
  p.addEventListener('dragend', e => { e.target.classList.remove('dragging'); });
});

dropZone.addEventListener('dragover', e => e.preventDefault());
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  if(!draggedPiece) return;
  
  const pieceType = draggedPiece.dataset.piece;
  const correctType = dropZone.dataset.piece;

  if(pieceType === correctType){
    dropZone.innerHTML = '';
    dropZone.appendChild(draggedPiece);
    draggedPiece.draggable = false;
    status.textContent = 'Super! Shape Complete'; // 🔥 English Voice
    status.style.color = 'var(--green)';
    nextBtn.disabled = false;
    speak('Super! Shape Complete');
  } else {
    status.textContent = 'Try Again! Wrong Piece';
    status.style.color = '#ef4444';
    speak('Try Again');
  }
  draggedPiece = null;
});

function speak(text){
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 1;
    window.speechSynthesis.speak(u);
  }
}
</script>
</body>
</html>

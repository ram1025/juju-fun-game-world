<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shape Studio Sample</title>
<style>
:root{
  --blue:#2563eb; --cream:#fef3c7; --card:#ffffff; --text:#1f2937; 
  --orange:#f97316; --brown:#92400e; --red:#ef4444; --btn-blue:#3b82f6; 
  --green:#10b981; --shadow:0 12px 40px rgba(0,0,0,.2)
}
*{box-sizing:border-box;touch-action:none}
html,body{height:100%;margin:0;background:var(--blue);font-family:system-ui}
.app{max-width:420px;margin:0 auto;height:100%;padding:16px;display:flex;flex-direction:column}
.topback{background:#fff;border-radius:16px;padding:10px 18px;border:0;box-shadow:0 4px 12px rgba(0,0,0,.15);font-weight:700;color:var(--orange);font-size:15px;cursor:pointer;margin-bottom:14px;width:fit-content}
.card{background:var(--cream);border-radius:28px;box-shadow:var(--shadow);padding:20px;display:flex;flex-direction:column;gap:14px}
.head{text-align:center}
.head h1{margin:0;color:var(--orange);font-size:22px;font-weight:900}
.head h2{margin:6px 0 4px;color:var(--text);font-size:16px;font-weight:700}
.head p{margin:0;color:var(--brown);font-size:13px}
.box{background:var(--card);border:3px solid #fbbf24;border-radius:20px;padding:20px;display:grid;place-items:center;min-height:220px}
.box svg{width:160px;height:160px}
.outline{fill:#fff;stroke:#374151;stroke-width:8}
.btns{display:flex;gap:10px}
.btn{flex:1;height:48px;border-radius:14px;border:0;font-weight:800;font-size:15px;color:#fff;cursor:pointer}
.btn.clear{background:var(--red)}
.btn.back{background:var(--btn-blue)}
.btn.next{background:var(--green)}
.colors{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.swatch{width:42px;height:42px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.2);cursor:pointer}
.swatch.active{border:4px solid #000}
</style>
</head>
<body>
<div class="app">
  <button class="topback" onclick="alert('Dashboard ki velthundi')">← Back</button>
  
  <div class="card">
    <div class="head">
      <h1>1/10: Square</h1>
      <h2>Color the Shape</h2>
    </div>

    <div class="box">
      <svg viewBox="0 0 200 200" id="shape">
        <path class="outline" id="shapePath" d="M40,40 L160,40 L160,160 L40,160 Z"/>
      </svg>
    </div>

    <div class="btns">
      <button class="btn clear" onclick="clearShape()">Clear</button>
      <button class="btn back" onclick="alert('Prev Shape')">← Back</button>
      <button class="btn next" onclick="alert('Next Shape')">Next →</button>
    </div>

    <div class="colors" id="colors"></div>
  </div>
</div>

<script>
const COLORS = ["#ef4444","#f97316","#f59e0b","#eab308","#10b981","#14b8a6","#3b82f6","#8b5cf6","#a855f7","#ec4899"];
let selectedColor = COLORS[0];

function renderColors(){
  const wrap = document.getElementById('colors');
  wrap.innerHTML = COLORS.map((c,i)=>`
    <div class="swatch ${c===selectedColor?'active':''}" style="background:${c}" onclick="selectColor('${c}')"></div>
  `).join('');
}
function selectColor(c){ 
  selectedColor=c; 
  renderColors(); 
  document.getElementById('shapePath').onclick = ()=>{
    document.getElementById('shapePath').style.fill = selectedColor;
  }
}
function clearShape(){ document.getElementById('shapePath').style.fill = '#fff'; }

renderColors();
selectColor(COLORS[0]);
</script>
</body>
</html>

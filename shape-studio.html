<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shape Studio</title>
<style>
:root{--bg:#0f1115;--panel:#161a21;--text:#e6e6e6;--line:#2a2f3a}
*{box-sizing:border-box;touch-action:none}html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:system-ui}
.app{max-width:800px;margin:0 auto;height:100%;display:flex;flex-direction:column}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--panel);border-bottom:1px solid var(--line)}
.header .back-btn{font-size:14px;padding:6px 10px;border-radius:10px;background:var(--line);border:1px solid #3a4f4a;color:var(--text);cursor:pointer}
.header h1{flex:1;text-align:center;font-size:14px;margin:0;font-weight:700}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:12px;background:#fff;flex-direction:column}
.shape-box{width:200px;height:200px;border:2px dashed #ccc;margin:12px auto;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#999}
.pieces{height:140px;background:var(--panel);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:center;gap:12px;padding:12px}
.piece{width:60px;height:60px;cursor:grab;filter:drop-shadow(0 3px 6px rgba(0,0,0,.4))}
.piece.dragging{opacity:.5;cursor:grabbing}
.controls{display:flex;gap:8px;padding:8px 12px;background:var(--panel);border-top:1px solid var(--line)}
.btn{flex:1;padding:8px;border-radius:8px;background:var(--line);border:1px solid #3a4f4a;color:var(--text);font-size:13px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <h1>Shape Studio</h1>
    <div style="width:40px"></div>
  </div>

  <div class="stage">
    <div style="font-size:16px;margin-bottom:8px"><span id="shape-index">1/10</span></div>
    <div class="shape-box">
      <svg viewBox="0 0 200 200" id="shape-svg">
        <!-- Shape outline loads here -->
      </svg>
    </div>
    <div class="pieces" id="pieces">
      <!-- Draggable pieces -->
    </div>
  </div>

  <div class="controls">
    <button class="btn" onclick="prevShape()">← Prev</button>
    <button class="btn" onclick="nextShape()">Next →</button>
  </div>
</div>

<script>
if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js?v=5'); }
const CACHE_NAME = 'juju-shape-v5'; // 🔥 v5 cache
const shapes=[{name:"Rocket",outline:"M100,20 L85,80 L115,80 Z M85,80 L100,140 L115,80 Z M85,140 L100,160 L115,140 Z M70,140 L85,140 L85,160 L70,160 Z M115,140 L130,140 L130,160 L115,160 Z"},{name:"Butterfly",outline:"M100,50 Q80,30 60,50 Q80,70 100,90 Q120,70 140,50 Q120,30 100,50"},{name:"Car",outline:"M50,120 L150,120 L160,140 L140,140 L140,160 L60,160 L60,140 L40,140 Z"},{name:"House",outline:"M50,100 L100,50 L150,100 L150,140 L50,140 Z"},{name:"Fish",outline:"M100,100 Q80,80 60,100 Q80,120 100,100 Q120,120 140,100 Q120,80 100,100"},{name:"Bird",outline:"M100,50 Q80,70 60,60 L60,100 L100,90 L140,100 L140,60 Q120,70 100,50"},{name:"Dog",outline:"M80,120 Q60,140 80,160 L100,140 L120,160 L140,140 Q120,120 100,140 Z"},{name:"Cat",outline:"M60,120 L100,80 L140,120 L120,140 L100,160 L80,140 Z"},{name:"Flower",outline:"M100,100 Q80,80 60,100 Q80,120 100,140 Q120,120 140,100 Q120,80 100,100"},{name:"Star",outline:"M100,50 L110,80 L140,90 L115,110 L120,140 L100,120 L80,140 L85,110 L60,90 L90,80 Z"}];
let current=0;
function loadShape(i){
  document.getElementById('shape-index').textContent=`${i+1}/${shapes.length}`;
  document.getElementById('shape-svg').innerHTML=`<path class="outline" d="${shapes[i].outline}" fill="none" stroke="#b0b7c3" stroke-width="4" stroke-dasharray="6 4"/>`;
  // TODO: Load pieces
}
loadShape(0);
function nextShape(){ if(current<shapes.length-1){ current++; loadShape(current); } }
function prevShape(){ if(current>0){ current--; loadShape(current); } }
function goBack(){ window.location='index.html'; }
let dragging=null,offsetX=0,offsetY=0;
document.querySelectorAll('.piece').forEach(p=>{
  p.addEventListener('pointerdown', e=>{
    dragging=p; p.classList.add('dragging');
    const rect=p.getBoundingClientRect();
    offsetX=e.clientX-rect.left; offsetY=e.clientY-rect.top;
    p.style.position='fixed'; p.style.zIndex=1000;
    movePiece(e);
  });
});
document.addEventListener('pointermove', e=>{ if(dragging) movePiece(e); });
document.addEventListener('pointerup', e=>{
  if(dragging){ dragging.classList.remove('dragging'); dragging.style.position=''; dragging.style.zIndex=''; dragging=null; }
});
function movePiece(e){
  if(!dragging) return;
  dragging.style.left=(e.clientX-offsetX)+'px';
  dragging.style.top=(e.clientY-offsetY)+'px';
}
</script>
</body>
</html>

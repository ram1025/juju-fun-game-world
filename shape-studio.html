<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2563eb">
<title>Shape Studio</title>
<link rel="manifest" href="./manifest.json">
<style>
:root{
  --blue:#2563eb; --cream:#fef3c7; --card:#ffffff; --text:#1f2937;
  --orange:#f97316; --blue-btn:#3b82f6; --green:#10b981;
  --shadow:0 12px 40px rgba(0,0,0,.2)
}
*{box-sizing:border-box;touch-action:none;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;background:var(--blue);font-family:system-ui,-apple-system}
.app{max-width:480px;margin:0 auto;height:100%;padding:16px;display:flex;flex-direction:column}
.topback{background:#fff;border-radius:16px;padding:10px 18px;border:0;box-shadow:0 4px 12px rgba(0,0,0,.15);font-weight:800;color:var(--orange);font-size:15px;cursor:pointer;margin-bottom:14px;width:fit-content}
.card{background:var(--cream);border-radius:28px;box-shadow:var(--shadow);padding:20px;display:flex;flex-direction:column;gap:14px}
.head{text-align:center}
.head h1{margin:0;color:var(--orange);font-size:22px;font-weight:900}
.head h2{margin:6px 0 0;color:var(--text);font-size:16px;font-weight:700}
.box{background:var(--card);border:3px solid #fbbf24;border-radius:20px;padding:20px;display:grid;place-items:center;min-height:220px;position:relative}
.box svg{width:180px;height:180px}
.outline{fill:none;stroke:#d1d5db;stroke-width:6;stroke-dasharray:8 6}
.pieces{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:10px;min-height:70px}
.piece{width:64px;height:64px;background:#fff;border:2px solid #e5e7eb;border-radius:14px;display:grid;place-items:center;cursor:grab;box-shadow:0 4px 10px rgba(0,0,0,.1)}
.piece.dragging{position:fixed;z-index:999;opacity:.7;pointer-events:none}
.nav{display:flex;gap:12px;margin-top:6px}
.btn{flex:1;height:52px;border-radius:16px;border:0;font-weight:800;font-size:16px;color:#fff;cursor:pointer}
.btn.back{background:var(--blue-btn)}
.btn.next{background:var(--green)}
.msg{text-align:center;font-weight:700;color:var(--text);min-height:22px;font-size:15px}
</style>
</head>
<body>
<div class="app">
  <!-- Top Left Back -> Dashboard.html -->
  <button class="topback" onclick="goDashboard()">← Back</button>

  <div class="card">
    <div class="head">
      <h1><span id="idx">1</span>/10: <span id="name">Rocket</span></h1>
      <h2>Complete the Shape</h2>
    </div>

    <div class="box">
      <svg viewBox="0 0 200 200" id="board"></svg>
    </div>

    <div class="pieces" id="tray"></div>
    <div class="msg" id="msg">Drag pieces to complete the shape</div>

    <!-- Buttons Bottom Lo -->
    <div class="nav">
      <button class="btn back" onclick="prevShape()">← Back</button>
      <button class="btn next" onclick="nextShape()">Next →</button>
    </div>
  </div>
</div>

<script>
// 🔥 PWA Cache v9
if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js?v=9'); }
const CACHE_NAME = 'juju-shape-v9';

// 10 Shapes: Outline + 2 Missing Pieces
const SHAPES = [
  {name:"Rocket", outline:"M100,20 L85,80 L115,80 Z M85,80 L100,140 L115,80 Z M85,140 L100,160 L115,140 Z", pieces:[{d:"M70,140 L85,140 L85,160 L70,160 Z",c:"#ef4444",x:10,y:10},{d:"M115,140 L130,140 L130,160 L115,160 Z",c:"#3b82f6",x:90,y:10}]},
  {name:"House", outline:"M50,100 L100,50 L150,100 L150,140 L50,140 Z", pieces:[{d:"M80,120 L80,140 L120,140 L120,120 Z",c:"#f59e0b",x:10,y:10},{d:"M100,50 L150,100 L100,100 Z",c:"#22c55e",x:90,y:10}]},
  {name:"Butterfly", outline:"M100,50 Q70,30 50,50 Q70,70 100,90 Q130,70 150,50 Q130,30 100,50", pieces:[{d:"M100,90 L100,140",c:"#a855f7",x:10,y:10},{d:"M100,50 Q130,70 100,90",c:"#ec4899",x:90,y:10}]},
  {name:"Car", outline:"M50,120 L150,120 L160,140 L140,140 L140,160 L60,160 L60,140 L40,140 Z", pieces:[{d:"M70,160 A15,15 0 1,1 70,159.9",c:"#374151",x:10,y:10},{d:"M130,160 A15,15 0 1,1 130,159.9",c:"#374151",x:90,y:10}]},
  {name:"Fish", outline:"M100,100 Q80,80 60,100 Q80,120 100,100 Q120,120 140,100 Q120,80 100,100", pieces:[{d:"M140,100 L160,90 L160,110 Z",c:"#f97316",x:10,y:10},{d:"M60,100 Q80,80 100,100",c:"#3b82f6",x:90,y:10}]},
  {name:"Star", outline:"M100,50 L110,80 L140,90 L115,110 L120,140 L100,120 L80,140 L85,110 L60,90 L90,80 Z", pieces:[{d:"M60,90 L85,110 L60,110 Z",c:"#f59e0b",x:10,y:10},{d:"M140,90 L115,110 L140,110 Z",c:"#a855f7",x:90,y:10}]},
  {name:"Cat", outline:"M60,120 L100,80 L140,120 L120,140 L100,160 L80,140 Z", pieces:[{d:"M75,95 L85,105",c:"#000",x:10,y:10},{d:"M115,95 L105,105",c:"#000",x:90,y:10}]},
  {name:"Dog", outline:"M80,120 Q60,140 80,160 L100,140 L120,160 L140,140 Q120,120 100,140 Z", pieces:[{d:"M70,110 A10,10 0 1,1 70,109.9",c:"#000",x:10,y:10},{d:"M130,110 A10,10 0 1,1 130,109.9",c:"#000",x:90,y:10}]},
  {name:"Flower", outline:"M100,100 Q80,80 60,100 Q80,120 100,140 Q120,120 140,100 Q120,80 100,100", pieces:[{d:"M100,100 A20,20 0 1,1 100,99.9",c:"#eab308",x:10,y:10},{d:"M80,100 Q100,80 100,100",c:"#ec4899",x:90,y:10}]},
  {name:"Bird", outline:"M100,50 Q80,70 60,60 L60,100 L100,90 L140,100 L140,60 Q120,70 100,50", pieces:[{d:"M120,70 A5,5 0 1,1 120,69.9",c:"#000",x:10,y:10},{d:"M60,60 L60,100 L100,90",c:"#22c55e",x:90,y:10}]}
];

let cur = 0;
let placed = [];
let dragging = null, offsetX=0, offsetY=0;

const board = document.getElementById('board');
const tray = document.getElementById('tray');
const idx = document.getElementById('idx');
const nameEl = document.getElementById('name');
const msg = document.getElementById('msg');

function render(){
  placed = [];
  idx.textContent = cur+1;
  nameEl.textContent = SHAPES[cur].name;
  board.innerHTML = `<path class="outline" d="${SHAPES[cur].outline}"/>`;
  tray.innerHTML = SHAPES[cur].pieces.map((p,i)=>`
    <div class="piece" data-i="${i}">
      <svg viewBox="0 0 60 60"><path fill="${p.c}" d="${p.d}"/></svg>
    </div>`).join('');
  msg.textContent = "Drag pieces to complete the shape";
  enableDrag();
}
render();

function enableDrag(){
  document.querySelectorAll('.piece').forEach(el=>{
    el.addEventListener('pointerdown', e=>{
      dragging = el; el.classList.add('dragging');
      const rect = el.getBoundingClientRect();
      offsetX = e.clientX-rect.left; offsetY = e.clientY-rect.top;
      move(e);
    });
  });
  document.addEventListener('pointermove', e=>{ if(dragging) move(e); });
  document.addEventListener('pointerup', e=>{ if(dragging) drop(e); });
}

function move(e){
  dragging.style.left = (e.clientX-offsetX)+'px';
  dragging.style.top = (e.clientY-offsetY)+'px';
}

function drop(e){
  const box = document.querySelector('.box').getBoundingClientRect();
  const i = +dragging.dataset.i;
  const pieceData = SHAPES[cur].pieces[i];

  if(e.clientX>box.left && e.clientX<box.right && e.clientY>box.top && e.clientY<box.bottom){
    board.innerHTML += `<path fill="${pieceData.c}" d="${pieceData.d}"/>`;
    dragging.remove();
    placed.push(i);
    if(placed.length === SHAPES[cur].pieces.length){
      msg.textContent = "Super! ✅ Shape Complete";
    }
  }
  dragging.classList.remove('dragging');
  dragging.style.position=''; dragging.style.left=''; dragging.style.top='';
  dragging=null;
}

function nextShape(){ if(cur<SHAPES.length-1){cur++;render();} }
function prevShape(){ if(cur>0){cur--;render();} }

// 🔥 Dashboard.html ki velthundi
function goDashboard(){
  window.location='dashboard.html#shape-studio';
}
</script>
</body>
</html>

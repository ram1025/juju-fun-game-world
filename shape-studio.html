<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shape Studio</title>
<style>
:root{
  --bg1:#6366f1; --bg2:#a855f7; --card:#ffffff; --text:#1f2937; --muted:#6b7280;
  --accent:#22c55e; --line:#e5e7eb; --shadow:0 8px 30px rgba(0,0,0,.12)
}
*{box-sizing:border-box;touch-action:none;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg1),var(--bg2));font-family:system-ui}
.app{max-width:520px;margin:0 auto;height:100%;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 16px;color:#fff}
.back{width:40px;height:40px;border-radius:14px;background:rgba(255,255,255,.2);border:0;display:grid;place-items:center;font-size:20px;color:#fff;cursor:pointer}
.counter{flex:1;text-align:center;font-weight:800;font-size:16px;letter-spacing:.5px}
.title{font-size:12px;opacity:.9}
.wrap{flex:1;background:#f7f8fb;border-radius:28px 28px 0 0;padding:16px;display:flex;flex-direction:column;gap:12px}
.card{background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:14px}
.stage{aspect-ratio:1/1;display:grid;place-items:center}
svg{width:100%;height:100%;max-width:300px}
.outline{fill:none;stroke:#d1d5db;stroke-width:6;stroke-dasharray:8 6;stroke-linecap:round}
.tray{display:flex;gap:10px;overflow-x:auto;padding:8px 4px}
.piece{width:64px;height:64px;flex:0 0 64px;border-radius:16px;background:var(--card);display:grid;place-items:center;box-shadow:0 4px 12px rgba(0,0,0,.08);cursor:grab;transition:.15s}
.piece:active{transform:scale(1.08);box-shadow:0 8px 20px rgba(0,0,0,.15)}
.piece svg{width:48px;height:48px}
.nav{display:flex;gap:12px}
.btn{flex:1;height:52px;border-radius:16px;border:0;font-weight:800;font-size:15px;cursor:pointer}
.btn.prev{background:#fff;color:var(--text);box-shadow:var(--shadow)}
.btn.next{background:var(--accent);color:#fff;box-shadow:0 8px 20px rgba(34,197,94,.35)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="back" onclick="goDashboard()">←</button>
    <div>
      <div class="counter"><span id="idx">1</span>/10</div>
      <div class="title">Shape Studio</div>
    </div>
    <div style="width:40px"></div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="stage">
        <svg viewBox="0 0 200 200" id="board"></svg>
      </div>
    </div>

    <div class="card">
      <div class="tray" id="tray"></div>
    </div>

    <div class="nav">
      <button class="btn prev" onclick="prevShape()">← Prev</button>
      <button class="btn next" onclick="nextShape()">Next →</button>
    </div>
  </div>
</div>

<script>
if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js?v=6'); }
const CACHE_NAME = 'juju-shape-v6'; // 🔥 v6 cache

const SHAPES = [
  {name:"Rocket", d:"M100,20 L85,80 L115,80 Z M85,80 L100,140 L115,80 Z M85,140 L100,160 L115,140 Z M70,140 L85,140 L85,160 L70,160 Z M115,140 L130,140 L130,160 L115,160 Z", pieces:[{c:"#ef4444",p:"M30,5 5,55 55,55"},{c:"#3b82f6",p:"M30,5 5,55 55,55"},{c:"#22c55e",p:"M30,5 55,30 30,55 5,30"}]},
  {name:"Butterfly", d:"M100,50 Q70,30 50,50 Q70,70 100,90 Q130,70 150,50 Q130,30 100,50", pieces:[{c:"#f59e0b",p:"M30,5 5,55 55,55"},{c:"#a855f7",p:"M30,5 55,30 30,55 5,30"},{c:"#ec4899",p:"M30,5 5,55 55,55"}]},
  {name:"Car", d:"M50,120 L150,120 L160,140 L140,140 L140,160 L60,160 L60,140 L40,140 Z", pieces:[{c:"#ef4444",p:"M30,5 55,30 30,55 5,30"},{c:"#3b82f6",p:"M30,5 5,55 55,55"}]},
  {name:"House", d:"M50,100 L100,50 L150,100 L150,140 L50,140 Z", pieces:[{c:"#f59e0b",p:"M30,5 5,55 55,55"},{c:"#22c55e",p:"M30,5 55,30 30,55 5,30"}]},
  {name:"Fish", d:"M100,100 Q80,80 60,100 Q80,120 100,100 Q120,120 140,100 Q120,80 100,100", pieces:[{c:"#3b82f6",p:"M30,5 55,30 30,55 5,30"},{c:"#22c55e",p:"M30,5 5,55 55,55"}]},
  {name:"Bird", d:"M100,50 Q80,70 60,60 L60,100 L100,90 L140,100 L140,60 Q120,70 100,50", pieces:[{c:"#f59e0b",p:"M30,5 5,55 55,55"},{c:"#a855f7",p:"M30,5 55,30 30,55 5,30"}]},
  {name:"Dog", d:"M80,120 Q60,140 80,160 L100,140 L120,160 L140,140 Q120,120 100,140 Z", pieces:[{c:"#a855f7",p:"M30,5 5,55 55,55"},{c:"#ec4899",p:"M30,5 55,30 30,55 5,30"}]},
  {name:"Cat", d:"M60,120 L100,80 L140,120 L120,140 L100,160 L80,140 Z", pieces:[{c:"#ec4899",p:"M30,5 5,55 55,55"},{c:"#ef4444",p:"M30,5 55,30 30,55 5,30"}]},
  {name:"Flower", d:"M100,100 Q80,80 60,100 Q80,120 100,140 Q120,120 140,100 Q120,80 100,100", pieces:[{c:"#22c55e",p:"M30,5 5,55 55,55"},{c:"#f59e0b",p:"M30,5 55,30 30,55 5,30"}]},
  {name:"Star", d:"M100,50 L110,80 L140,90 L115,110 L120,140 L100,120 L80,140 L85,110 L60,90 L90,80 Z", pieces:[{c:"#f59e0b",p:"M30,5 5,55 55,55"},{c:"#3b82f6",p:"M30,5 55,30 30,55 5,30"},{c:"#a855f7",p:"M30,5 5,55 55,55"}]}
];

let cur = 0;
const board = document.getElementById('board');
const tray = document.getElementById('tray');
const idx = document.getElementById('idx');

function render(){
  idx.textContent = cur+1;
  board.innerHTML = `<path class="outline" d="${SHAPES[cur].d}"/>`;
  tray.innerHTML = SHAPES[cur].pieces.map((p,i)=>`
    <div class="piece" draggable="true" data-i="${i}">
      <svg viewBox="0 0 60 60"><polygon fill="${p.c}" points="${p.p}"/></svg>
    </div>`).join('');
  enableDrag();
}
render();

function nextShape(){ if(cur<SHAPES.length-1){cur++;render();} }
function prevShape(){ if(cur>0){cur--;render();} }
function goDashboard(){ window.location='index.html'; }

function enableDrag(){
  document.querySelectorAll('.piece').forEach(el=>{
    el.addEventListener('pointerdown', e=>{
      el.setPointerCapture(e.pointerId);
      const startX=e.clientX, startY=e.clientY;
      const rect=el.getBoundingClientRect();
      el.style.position='fixed'; el.style.left=rect.left+'px'; el.style.top=rect.top+'px'; el.style.zIndex=999;
      const move=(ev)=>{el.style.left=(ev.clientX-(startX-rect.left))+'px'; el.style.top=(ev.clientY-(startY-rect.top))+'px';}
      const up=()=>{document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); el.style.position=''; el.style.zIndex='';}
      document.addEventListener('pointermove',move); document.addEventListener('pointerup',up);
    });
  });
}
</script>
</body>
</html>

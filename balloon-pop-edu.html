<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Balloon Pop ABC 123</title>
<style>
:root{--sky:#87ceeb;--grass:#90ee90}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;background:linear-gradient(var(--sky) 0 70%,var(--grass) 70% 100%);overflow:hidden;font-family:system-ui}
.hud-top{position:absolute;top:12px;left:12px;z-index:20}
.back{background:#fff;color:#1e40af;border:0;border-radius:12px;padding:8px 14px;font-weight:900;font-size:16px;box-shadow:0 4px 10px rgba(0,0,0,.2);text-decoration:none}
.score{position:absolute;top:12px;left:50%;transform:translateX(-50%);color:#fff;font-weight:900;font-size:20px;text-shadow:0 2px 6px #000;z-index:20}

.hud-bottom{position:absolute;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:20px;z-index:20}
.mode-btn{background:#fff;color:#1e40af;border:0;border-radius:20px;padding:14px 28px;font-weight:900;font-size:18px;box-shadow:0 6px 15px rgba(0,0,0,.3)}
.mode-btn.active{background:#1e40af;color:#fff}

.balloons{position:absolute;inset:0;padding:120px 10px 130px 10px} /* 🔥 Top 120px, Bottom 130px - green deggara varaku */
.balloon{position:absolute;width:70px;height:90px;cursor:pointer;user-select:none;transition:transform .15s;pointer-events:auto;z-index:1}
.balloon:active{transform:scale(.9)}
.balloon svg{width:100%;height:100%;filter:drop-shadow(0 6px 10px rgba(0,0,0,.3));pointer-events:none}
.balloon-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);font-size:28px;font-weight:900;color:#fff;text-shadow:0 2px 6px #000;pointer-events:none}
.pop{animation:pop .2s forwards}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15);opacity:1}100%{transform:scale(0);opacity:0}}
</style>
</head>
<body>
<div class="hud-top">
  <a href="./dashboard.html" class="back">← Back</a>
</div>
<div class="score" id="score">Score: 0</div>

<div class="balloons" id="balloons"></div>

<div class="hud-bottom">
  <button class="mode-btn active" id="abcBtn" onclick="setMode('ABC')">ABC</button>
  <button class="mode-btn" id="numBtn" onclick="setMode('123')">123</button>
</div>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js?v=12.11');}

const colors = ['#ef4444','#3b82f6','#10b981','#f59e0b','#a855f7','#ec4899','#06b6d4','#f97316'];
const ABC = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const NUM = Array.from({length:20},(_,i)=>i+1);
let mode = 'ABC';
let score = 0;
let used = [];

function setMode(m){
  mode = m;
  used = [];
  document.getElementById('balloons').innerHTML = '';
  score = 0;
  updateScore();
  document.getElementById('abcBtn').classList.toggle('active', m==='ABC');
  document.getElementById('numBtn').classList.toggle('active', m==='123');
  spawnBalloons();
}

function updateScore(){
  document.getElementById('score').textContent = `Score: ${score}`;
}

function getRandomItem(){
  const pool = mode === 'ABC' ? ABC : NUM;
  if(used.length >= pool.length) used = [];
  let item;
  do{ item = pool[Math.floor(Math.random()*pool.length)]; }while(used.includes(item));
  used.push(item);
  return item;
}

function spawnBalloons(){
  const count = mode === 'ABC' ? 26 : 20;
  const container = document.getElementById('balloons');
  container.innerHTML = '';
  
  const balloonW = 70;
  const balloonH = 90;
  const cols = 4; 
  const rows = Math.ceil(count / cols);
  
  const w = window.innerWidth;
  const h = window.innerHeight - 250; /* 🔥 340 -> 250 chesam. Inka kindhaki space icham */
  
  const gapX = (w - (cols * balloonW)) / (cols + 1);
  const gapY = (h - (rows * balloonH)) / (rows + 1);

  for(let i=0; i<count; i++){
    const b = document.createElement('div');
    b.className = 'balloon';
    const color = colors[Math.floor(Math.random()*colors.length)];
    const text = getRandomItem();
    
    const col = i % cols;
    const row = Math.floor(i / cols);
    
    const left = gapX + col * (balloonW + gapX);
    const top = gapY + row * (balloonH + gapY);
    
    b.style.left = left + 'px';
    b.style.top = top + 'px';
    
    b.innerHTML = `
      <svg viewBox="0 0 80 100">
        <ellipse cx="40" cy="40" rx="35" ry="40" fill="${color}"/>
        <path d="M40 80 L34 95 L46 95 Z" fill="${color}"/>
      </svg>
      <div class="balloon-text">${text}</div>
    `;
    
    b.onclick = () => popBalloon(b, text);
    container.appendChild(b);
  }
}

function popBalloon(el, text){
  if(el.classList.contains('pop')) return;
  el.classList.add('pop');
  score += 10;
  updateScore();
  speak(text);
  setTimeout(()=>el.remove(), 200);
}

function speak(t){
  if('speechSynthesis' in window){
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'en-US';
    u.rate = 0.9;
    if(mode === 'ABC' && typeof t === 'string' && t.length === 1){
      u.text = t.toLowerCase(); 
    }
    speechSynthesis.speak(u);
  }
}

spawnBalloons();
</script>
</body>
</html>

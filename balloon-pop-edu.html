<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Balloon Pop ABC 123</title>
<style>
:root{--sky:#87ceeb}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;background:linear-gradient(#87ceeb 0 60%,#90ee90 60% 100%);overflow:hidden;font-family:system-ui}
.hud{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;z-index:10;gap:8px}
.btn{background:#fff;color:#1e40af;border:0;border-radius:12px;padding:8px 14px;font-weight:900;font-size:14px;box-shadow:0 4px 10px rgba(0,0,0,.2)}
.score{color:#fff;font-weight:900;font-size:18px;text-shadow:0 2px 4px #000}
.balloons{position:absolute;inset:0}
.balloon{position:absolute;width:70px;height:90px;cursor:pointer;user-select:none;animation:float 6s ease-in-out infinite;transition:transform .2s}
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-15px)}100%{transform:translateY(0)}}
.balloon svg{width:100%;height:100%;filter:drop-shadow(0 6px 10px rgba(0,0,0,.3))}
.balloon-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);font-size:28px;font-weight:900;color:#fff;text-shadow:0 2px 6px #000;pointer-events:none}
.pop{animation:pop .3s forwards}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3);opacity:1}100%{transform:scale(0);opacity:0}}
</style>
</head>
<body>
<div class="hud">
  <button class="btn" onclick="setMode('ABC')">ABC</button>
  <div class="score" id="score">Score: 0</div>
  <button class="btn" onclick="setMode('123')">123</button>
</div>
<div class="balloons" id="balloons"></div>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js?v=1.0');}

const colors = ['#ef4444','#3b82f6','#10b981','#f59e0b','#a855f7','#ec4899','#06b6d4'];
const ABC = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const NUM = Array.from({length:20},(_,i)=>i+1);
let mode = 'ABC';
let score = 0;
let used = [];

function setMode(m){
  mode = m;
  used = [];
  document.getElementById('balloons').innerHTML = '';
  score = 0;
  updateScore();
  spawnBalloons();
}

function updateScore(){
  document.getElementById('score').textContent = `Score: ${score}`;
}

function getRandomItem(){
  const pool = mode === 'ABC' ? ABC : NUM;
  if(used.length >= pool.length) used = []; // Reset ayipothe malli
  let item;
  do{
    item = pool[Math.floor(Math.random()*pool.length)];
  }while(used.includes(item));
  used.push(item);
  return item;
}

function spawnBalloons(){
  const count = mode === 'ABC' ? 26 : 20;
  const container = document.getElementById('balloons');
  container.innerHTML = '';
  
  for(let i=0; i<count; i++){
    const b = document.createElement('div');
    b.className = 'balloon';
    const color = colors[Math.floor(Math.random()*colors.length)];
    const text = getRandomItem();
    
    b.style.left = Math.random()*80 + 5 + '%';
    b.style.top = Math.random()*60 + 20 + '%';
    b.style.animationDelay = Math.random()*5 + 's';
    
    b.innerHTML = `
      <svg viewBox="0 0 70 90">
        <ellipse cx="35" cy="35" rx="30" ry="35" fill="${color}"/>
        <path d="M35 70 L30 85 L40 85 Z" fill="${color}"/>
      </svg>
      <div class="balloon-text">${text}</div>
    `;
    
    b.onclick = () => popBalloon(b, text);
    container.appendChild(b);
  }
}

function popBalloon(el, text){
  if(el.classList.contains('pop')) return;
  el.classList.add('pop');
  score += 10;
  updateScore();
  speak(text); // 🔥 Letter/Number chaduvutundi
  setTimeout(()=>el.remove(), 300);
}

function speak(t){
  if('speechSynthesis' in window){
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'en-US';
    u.rate = 0.9;
    speechSynthesis.speak(u);
  }
}

// Start with ABC
spawnBalloons();
</script>
</body>
</html>

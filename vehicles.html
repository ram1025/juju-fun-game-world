<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vehicles - Juju</title>
<link rel="manifest" href="./manifest.json?v=120">
<meta name="theme-color" content="#3B82F6">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation}
  body{font-family:'Nunito',sans-serif;background:#3B82F6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:15px;color:#fff}

.card{background:#fff;color:#1F2937;border-radius:25px;padding:25px;width:100%;max-width:400px;text-align:center;box-shadow:0 8px 0 rgba(0,0,0,.2)}

.vehicle-box{width:100%;aspect-ratio:1/1;background:#DBEAFE;border-radius:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;margin-bottom:15px;transition:transform.1s}
.vehicle-box:active{transform:scale(.95)}
.vehicle-emoji{font-size:120px;line-height:1;pointer-events:none} /* BIG EMOJI */

.vehicle-name{font-size:28px;font-weight:900;color:#1D4ED8;margin-bottom:20px;min-height:40px}

.controls{display:flex;gap:12px;justify-content:center}
.btn{background:#3B82F6;color:#fff;border:0;border-radius:12px;padding:12px 18px;font-size:16px;font-weight:900;font-family:Nunito;cursor:pointer;box-shadow:0 4px 0 #1D4ED8;flex:1}
.btn:disabled{background:#9CA3AF;box-shadow:0 4px 0 #6B7280;cursor:not-allowed}
.btn.back{background:#6B7280;box-shadow:0 4px 0 #4B5563}

.counter{font-size:14px;font-weight:800;color:#6B7280;margin-top:10px}
</style>
</head>
<body>

  <div class="card">
    <div class="vehicle-box" id="vehicleBox">
      <div class="vehicle-emoji" id="vehicleEmoji">🚗</div>
    </div>
    <div class="vehicle-name" id="vehicleName">Car</div>

    <div class="controls">
      <button class="btn back" onclick="location.href='./dashboard.html'">← Back</button>
      <button class="btn" id="nextBtn" onclick="nextVehicle()">Next ></button>
    </div>
    <div class="counter" id="counter">1 / 10</div>
  </div>

<script>
  // ===== 10 VEHICLES EMOJI LIST =====
  const vehicles = [
  {name:'Car', emoji:'🚗'},
  {name:'Bus', emoji:'🚌'},
  {name:'Truck', emoji:'🚚'},
  {name:'Train', emoji:'🚂'}, // 🚂 or 🚆
  {name:'Airplane', emoji:'✈️'},
  {name:'Boat', emoji:'⛵'},
  {name:'Bike', emoji:'🏍️'},
  {name:'Tractor', emoji:'🚜'},
  {name:'Ambulance', emoji:'🚑'},
  {name:'Police Car', emoji:'🚓'}
];

  let currentIndex = 0;
  const synth = window.speechSynthesis;

  const vehicleBox = document.getElementById('vehicleBox');
  const vehicleEmoji = document.getElementById('vehicleEmoji');
  const vehicleName = document.getElementById('vehicleName');
  const counter = document.getElementById('counter');
  const nextBtn = document.getElementById('nextBtn');

  function speak(text){
    if(synth.speaking){ synth.cancel(); }
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    utter.rate = 0.9;
    synth.speak(utter);
  }

  function loadVehicle(index){
    const vehicle = vehicles[index];
    vehicleEmoji.textContent = vehicle.emoji;
    vehicleName.textContent = vehicle.name;
    counter.textContent = `${index + 1} / ${vehicles.length}`;

    if(index === vehicles.length - 1){
      nextBtn.disabled = true;
      nextBtn.textContent = 'Completed ✓';
    } else {
      nextBtn.disabled = false;
      nextBtn.textContent = 'Next >';
    }

    speak(vehicle.name); // Page open ayinappudu auto chepthundi
  }

  function nextVehicle(){
    if(currentIndex < vehicles.length - 1){
      currentIndex++;
      loadVehicle(currentIndex);
    }
  }

  // Vehicle Box Touch -> Voice
  vehicleBox.addEventListener('click', ()=>{
    speak(vehicles[currentIndex].name);
    vehicleBox.style.transform = 'scale(0.95)';
    setTimeout(()=>vehicleBox.style.transform = 'scale(1)', 100);
  });

  // First Load
  loadVehicle(0);
</script>
</body>
</html>

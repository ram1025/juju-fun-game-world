<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fruits - Juju</title>
<link rel="manifest" href="./manifest.json?v=115">
<meta name="theme-color" content="#F97316">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation}
  body{font-family:'Nunito',sans-serif;background:#F97316;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:15px;color:#fff}

 .card{background:#fff;color:#1F2937;border-radius:25px;padding:25px;width:100%;max-width:400px;text-align:center;box-shadow:0 8px 0 rgba(0,0,0,.2)}

 .fruit-box{width:100%;aspect-ratio:1/1;background:#FEF3C7;border-radius:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;margin-bottom:15px;transition:transform.1s}
 .fruit-box:active{transform:scale(.95)}
 .fruit-emoji{font-size:120px;line-height:1;pointer-events:none} /* BIG EMOJI */

 .fruit-name{font-size:28px;font-weight:900;color:#F97316;margin-bottom:20px;min-height:40px}

 .controls{display:flex;gap:12px;justify-content:center}
 .btn{background:#F97316;color:#fff;border:0;border-radius:12px;padding:12px 18px;font-size:16px;font-weight:900;font-family:Nunito;cursor:pointer;box-shadow:0 4px 0 #EA580C;flex:1}
 .btn:disabled{background:#9CA3AF;box-shadow:0 4px 0 #6B7280;cursor:not-allowed}
 .btn.back{background:#6B7280;box-shadow:0 4px 0 #4B5563}

 .counter{font-size:14px;font-weight:800;color:#6B7280;margin-top:10px}
</style>
</head>
<body>

  <div class="card">
    <div class="fruit-box" id="fruitBox">
      <div class="fruit-emoji" id="fruitEmoji">🍎</div>
    </div>
    <div class="fruit-name" id="fruitName">Apple</div>

    <div class="controls">
      <button class="btn back" onclick="location.href='./dashboard.html'">← Back</button>
      <button class="btn" id="nextBtn" onclick="nextFruit()">Next ></button>
    </div>
    <div class="counter" id="counter">1 / 10</div>
  </div>

<script>
  // ===== 10 FRUITS EMOJI LIST =====
  const fruits = [
    {name:'Apple', emoji:'🍎'},
    {name:'Banana', emoji:'🍌'},
    {name:'Orange', emoji:'🍊'},
    {name:'Grapes', emoji:'🍇'},
    {name:'Watermelon', emoji:'🍉'},
    {name:'Strawberry', emoji:'🍓'},
    {name:'Pineapple', emoji:'🍍'},
    {name:'Mango', emoji:'🥭'},
    {name:'Lemon', emoji:'🍋'},
    {name:'Cherry', emoji:'🍒'}
  ];

  let currentIndex = 0;
  const synth = window.speechSynthesis;

  const fruitBox = document.getElementById('fruitBox');
  const fruitEmoji = document.getElementById('fruitEmoji');
  const fruitName = document.getElementById('fruitName');
  const counter = document.getElementById('counter');
  const nextBtn = document.getElementById('nextBtn');

  function speak(text){
    if(synth.speaking){ synth.cancel(); }
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    utter.rate = 0.9;
    synth.speak(utter);
  }

  function loadFruit(index){
    const fruit = fruits[index];
    fruitEmoji.textContent = fruit.emoji;
    fruitName.textContent = fruit.name;
    counter.textContent = `${index + 1} / ${fruits.length}`;

    if(index === fruits.length - 1){
      nextBtn.disabled = true;
      nextBtn.textContent = 'Completed ✓';
    } else {
      nextBtn.disabled = false;
      nextBtn.textContent = 'Next >';
    }

    speak(fruit.name); // Page open ayinappudu auto chepthundi
  }

  function nextFruit(){
    if(currentIndex < fruits.length - 1){
      currentIndex++;
      loadFruit(currentIndex);
    }
  }

  // Fruit Box Touch -> Voice
  fruitBox.addEventListener('click', ()=>{
    speak(fruits[currentIndex].name);
    fruitBox.style.transform = 'scale(0.95)';
    setTimeout(()=>fruitBox.style.transform = 'scale(1)', 100);
  });

  // First Load
  loadFruit(0);
</script>
</body>
</html>

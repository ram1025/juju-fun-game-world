<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wild Animals - Juju</title>
<link rel="manifest" href="./manifest.json?v=157"> <!-- 🔥 version bump -->
<meta name="theme-color" content="#F97316">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation}
  body{font-family:'Nunito',sans-serif;background:#F97316;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:15px;color:#fff;justify-content:center}

.header{width:100%;max-width:400px;display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:10px}
.back-btn{position:absolute;left:0;background:#fff;color:#C2410C;border:0;border-radius:12px;padding:10px 14px;font-size:18px;font-weight:900;font-family:Nunito;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2)}
.back-btn:active{transform:scale(.95)}
.page-heading{display:none}

.card{background:#fff;color:#1F2937;border-radius:25px;padding:20px;width:100%;max-width:400px;text-align:center;box-shadow:0 8px 0 rgba(0,0,0,.2);display:flex;flex-direction:column;justify-content:center;margin-top:10px}

.card-heading{color:#C2410C;font-size:20px;font-weight:900;padding:8px 0;margin-bottom:15px;text-align:center} /* 🔥 Plain text, no bg, no emoji */

.animal-box{width:100%;aspect-ratio:1/1;background:#FFEDD5;border-radius:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;margin-bottom:15px;transition:transform.1s}
.animal-box:active{transform:scale(.95)}
.animal-emoji{font-size:120px;line-height:1;pointer-events:none}
.animal-name{font-size:28px;font-weight:900;color:#C2410C;margin-bottom:20px;min-height:40px}
.controls{display:flex;gap:12px;justify-content:center}
.btn{flex:1;background:#F97316;color:#fff;border:0;border-radius:12px;padding:14px 18px;font-size:16px;font-weight:900;font-family:Nunito;cursor:pointer;box-shadow:0 4px 0 #C2410C}
.btn:active{transform:scale(.97)}
.btn:disabled{background:#9CA3AF;box-shadow:0 4px 0 #6B7280;cursor:not-allowed}
.counter{font-size:14px;font-weight:800;color:#6B7280;margin-top:10px;text-align:center}
</style>
</head>
<body>

  <div class="header">
    <button class="back-btn" onclick="location.href='./dashboard.html#wild-animals'">←</button>
  </div>

  <div class="card">
    <div class="card-heading" id="cardHeading">Wild Animals</div> <!-- 🔥 Plain text -->

    <div class="animal-box" id="animalBox"><div class="animal-emoji" id="animalEmoji">🦁</div></div>
    <div class="animal-name" id="animalName">Lion</div>
    <div class="controls">
      <button class="btn" id="prevBtn" onclick="prevAnimal()">← Previous</button>
      <button class="btn" id="nextBtn" onclick="nextAnimal()">Next →</button>
    </div>
    <div class="counter" id="counter">1 / 10</div>
  </div>

<script>
  const animals = [
    {name:'Lion', emoji:'🦁'},{name:'Tiger', emoji:'🐯'},{name:'Elephant', emoji:'🐘'},
    {name:'Monkey', emoji:'🐒'},{name:'Giraffe', emoji:'🦒'},{name:'Zebra', emoji:'🦓'},
    {name:'Bear', emoji:'🐻'},{name:'Wolf', emoji:'🐺'},{name:'Fox', emoji:'🦊'},{name:'Crocodile', emoji:'🐊'}
  ];

  let currentIndex = 0;
  const synth = window.speechSynthesis;
  const animalBox = document.getElementById('animalBox');
  const animalEmoji = document.getElementById('animalEmoji');
  const animalName = document.getElementById('animalName');
  const cardHeading = document.getElementById('cardHeading');
  const counter = document.getElementById('counter');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  function speak(text){
    if(synth.speaking){ synth.cancel(); }
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    utter.rate = 0.9;
    synth.speak(utter);
  }

  function loadAnimal(index){
    const animal = animals[index];
    animalEmoji.textContent = animal.emoji;
    animalName.textContent = animal.name;
    cardHeading.textContent = `Wild Animals`; // 🔥 Fixed: emoji + name teesesam, static ga "Wild Animals"
    counter.textContent = `${index + 1} / ${animals.length}`;
    prevBtn.disabled = index === 0;
    nextBtn.disabled = index === animals.length - 1;
    nextBtn.textContent = index === animals.length - 1? 'Completed ✓' : 'Next →';
  }

  function prevAnimal(){
    if(currentIndex > 0){
      currentIndex--;
      loadAnimal(currentIndex);
    }
  }

  function nextAnimal(){
    if(currentIndex < animals.length - 1){
      currentIndex++;
      loadAnimal(currentIndex);
    }
  }

  animalBox.addEventListener('click', ()=>{
    speak(animals[currentIndex].name);
    animalBox.style.transform = 'scale(0.95)';
    setTimeout(()=>animalBox.style.transform = 'scale(1)', 100);
  });

  loadAnimal(0);
</script>
</body>
</html>

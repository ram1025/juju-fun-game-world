<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spell It! - Juju Fun World</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(135deg,#8B5CF6,#A78BFA);font-family:'Nunito',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.game-card{background:#fff;border-radius:35px;padding:25px 20px;box-shadow:0 15px 40px rgba(0,0,0,.25);width:100%;max-width:380px;display:flex;flex-direction:column;gap:15px;text-align:center}
.topbar{display:flex;align-items:center;justify-content:space-between}.back-btn{background:#E5E7EB;border:0;border-radius:12px;padding:8px 14px;color:#374151;font-weight:800;font-size:15px;font-family:Nunito;cursor:pointer}
.title{font-size:24px;font-weight:900;color:#7C3AED}.progress{font-size:16px;font-weight:800;color:#6B7280;margin-top:-5px}
.img-wrap{background:#FEFCE8;border-radius:25px;padding:20px;min-height:160px;display:flex;align-items:center;justify-content:center}.emoji-box{font-size:100px;line-height:1}
.boxes{display:flex;gap:10px;justify-content:center;margin-top:5px;flex-wrap:wrap;min-height:50px}.box{width:50px;height:50px;background:#F3F4F6;border:2px dashed #D1D5DB;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#7C3AED;transition:.2s}
.box.filled{background:#EDE9FE;border:2px solid #7C3AED}.box.shake{animation:shake.3s}
.letters{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:5px;min-height:50px}.letter-btn{width:50px;height:50px;background:#fff;border:2px solid #E5E7EB;border-radius:15px;color:#7C3AED;font-size:26px;font-weight:900;font-family:Nunito;cursor:pointer;box-shadow:0 3px 8px rgba(0,0,0,.08)}
.letter-btn:active{transform:scale(.9)}.letter-btn:disabled{opacity:.3;box-shadow:none;background:#F3F4F6}
.bottom-nav{display:flex;gap:12px;margin-top:10px}.nav-btn{flex:1;border:0;border-radius:15px;padding:14px;font-size:16px;font-weight:800;font-family:Nunito;cursor:pointer;color:#fff}
.btn-prev{background:#6B7280}.btn-next{background:#8B5CF6}.nav-btn:disabled{opacity:.4;cursor:not-allowed}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
</style>
</head>
<body>
<div class="game-card">
  <div class="topbar"><button class="back-btn" id="backBtn">← Back</button><div class="title">Spell-It 🧩</div><div style="width:70px"></div></div>
  <div class="progress" id="progress">1 / 10</div>
  <div class="img-wrap"><div class="emoji-box" id="emojiBox"></div></div>
  <div class="boxes" id="boxes"></div><div class="letters" id="letters"></div>
  <div class="bottom-nav"><button class="nav-btn btn-prev" id="prevBtn">← Previous</button><button class="nav-btn btn-next" id="nextBtn">Next ></button></div>
</div>
<script>
const words=[{emoji:'🍎',word:'APPLE'},{emoji:'⚽',word:'BALL'},{emoji:'🐱',word:'CAT'},{emoji:'🐶',word:'DOG'},{emoji:'🐟',word:'FISH'},{emoji:'🥭',word:'MANGO'},{emoji:'☀️',word:'SUN'},{emoji:'🌳',word:'TREE'},{emoji:'🚗',word:'CAR'},{emoji:'📚',word:'BOOK'}];
let page=0,currentBoxes=[];
document.getElementById('backBtn').onclick=()=>{location.href='./dashboard.html';};
const prevBtn=document.getElementById('prevBtn');const nextBtn=document.getElementById('nextBtn');
function speak(text){const u=new SpeechSynthesisUtterance(text);u.lang='en-US';speechSynthesis.speak(u);}
function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}
function updateNavBtns(){prevBtn.disabled=page===0;nextBtn.disabled=page===words.length-1;}

function loadPage(){
  const w=words; // ✅ 1. FIX
  document.getElementById('progress').textContent=`${page+1} / 10`;
  document.getElementById('emojiBox').textContent=w.emoji;
  const boxesDiv=document.getElementById('boxes');boxesDiv.innerHTML='';
  currentBoxes=Array(w.word.length).fill('');
  w.word.split('').forEach((_,i)=>{const div=document.createElement('div');div.className='box';div.id='box'+i;boxesDiv.appendChild(div);});
  const lettersDiv=document.getElementById('letters');lettersDiv.innerHTML='';
  shuffle(w.word.split('')).forEach(l=>{const btn=document.createElement('button');btn.className='letter-btn';btn.textContent=l;btn.onclick=()=>fillLetter(l,btn);lettersDiv.appendChild(btn);});
  updateNavBtns();
}

prevBtn.onclick=()=>{if(page>0){page--;loadPage();}};
nextBtn.onclick=()=>{if(page<words.length-1){page++;loadPage();}};

function fillLetter(l,btn){
  const emptyIndex=currentBoxes.indexOf('');if(emptyIndex==-1)return;
  currentBoxes[emptyIndex]=l;document.getElementById('box'+emptyIndex).textContent=l;document.getElementById('box'+emptyIndex).classList.add('filled');btn.disabled=true;
  if(!currentBoxes.includes('')){
    const word=currentBoxes.join('');
    if(word===words.word){ // ✅ 2. FIX
      speak(word);document.querySelectorAll('.box').forEach(b=>b.style.background='#D1FAE5');
      setTimeout(()=>{if(page<words.length-1){page++;loadPage();}else{alert('All Done! 🎉')}},1200);
    }else{
      document.querySelectorAll('.box').forEach(b=>b.classList.add('shake'));
      setTimeout(()=>{currentBoxes=Array(words.word.length).fill('');loadPage();},800); // ✅ 3. FIX
    }
  }
}
loadPage();
</script>
</body>
</html>

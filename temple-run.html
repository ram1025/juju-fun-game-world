<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Temple Run Kids</title>
<style>
body{margin:0;overflow:hidden;background:#87ceeb;font-family:system-ui}
canvas{display:block;background:linear-gradient(#87ceeb 0 70%, #90ee90 70% 100%)}
.hud{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;color:#fff;font-weight:900;font-size:20px;text-shadow:0 2px 4px #000;z-index:10}
.back{background:#fff;color:#1e40af;border:0;border-radius:12px;padding:8px 14px;font-weight:900;font-size:16px;text-decoration:none}
.instructions{position:absolute;bottom:20px;width:100%;text-align:center;color:#fff;font-weight:900;font-size:14px;text-shadow:0 2px 4px #000}
.gameover{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;border-radius:20px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.4);display:none;z-index:20}
.gameover button{background:#1e40af;color:#fff;border:0;padding:10px 20px;border-radius:12px;font-weight:900;font-size:16px;margin-top:10px}
</style>
</head>
<body>
<div class="hud">
  <a href="./dashboard.html" class="back">← Back</a>
  <div id="score">Score: 0</div>
</div>
<canvas id="game"></canvas>
<div class="instructions">Left = Left Lane | Middle = Jump | Right = Right Lane</div>

<div class="gameover" id="gameover">
  <h2>Game Over!</h2>
  <p id="finalScore">Score: 0</p>
  <button onclick="restartGame()">Play Again</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {x: canvas.width/2, y: canvas.height-200, lane: 1, jumping: false, jumpY: 0};
let obstacles = []; let coins = []; let score = 0; let speed = 4; let gameRunning = true; // Speed tagginchanu
let lanes = [canvas.width/2 - 100, canvas.width/2, canvas.width/2 + 100];
let lastSpawn = 0; // Box spawn gap kosam

const kidImg = new Image();
kidImg.src = './kid.png';

function drawPlayer(){
  if(kidImg.complete && kidImg.naturalWidth > 0){
    ctx.drawImage(kidImg, lanes[player.lane]-30, player.y + player.jumpY - 40, 60, 80);
  } else {
    ctx.fillStyle = '#3b82f6';
    ctx.fillRect(lanes[player.lane]-20, player.y + player.jumpY - 40, 40, 60);
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath();
    ctx.arc(lanes[player.lane], player.y + player.jumpY - 50, 15, 0, Math.PI*2);
    ctx.fill();
  }
}

function gameLoop(time){
  if(!gameRunning) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = '#555';
  ctx.fillRect(canvas.width/2 - 150, 0, 300, canvas.height);
  ctx.strokeStyle = '#fff'; ctx.setLineDash([20,20]); ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();

  if(player.jumping){player.jumpY -= 10; if(player.jumpY < -120) player.jumping = false;} else {if(player.jumpY < 0) player.jumpY += 10;}
  drawPlayer();

  obstacles.forEach((o,i)=>{
    o.y += speed;
    ctx.fillStyle = '#8b4513'; ctx.fillRect(o.x-20, o.y, 40, 40);
    if(o.y > canvas.height) obstacles.splice(i,1);
    if(Math.abs(o.x - lanes[player.lane]) < 30 && Math.abs(o.y - player.y) < 40 &&!player.jumping){endGame();}
  });

  coins.forEach((c,i)=>{
    c.y += speed;
    ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(c.x, c.y, 15, 0, Math.PI*2); ctx.fill();
    if(c.y > canvas.height) coins.splice(i,1);
    if(Math.abs(c.x - lanes[player.lane]) < 30 && Math.abs(c.y - player.y) < 40){score += 10; document.getElementById('score').textContent = 'Score: ' + score; coins.splice(i,1); speed += 0.1;} // Score tho speed penchadam
  });

  // FIX 1: Boxes takkuva cheyyadaniki gap pettanu
  if(time - lastSpawn > 800){ // 800ms gap
    lastSpawn = time;
    if(Math.random() < 0.4) obstacles.push({x: lanes[Math.floor(Math.random()*3)], y: -50});
    if(Math.random() < 0.3) coins.push({x: lanes[Math.floor(Math.random()*3)], y: -50});
  }

  requestAnimationFrame(gameLoop);
}

function endGame(){
  if(!gameRunning) return;
  gameRunning = false;
  document.getElementById('finalScore').textContent = 'Score: ' + score;
  document.getElementById('gameover').style.display = 'block';
}

function restartGame(){
  score = 0; obstacles = []; coins = []; player.lane = 1; player.jumpY = 0; speed = 4;
  document.getElementById('score').textContent = 'Score: 0';
  document.getElementById('gameover').style.display = 'none';
  gameRunning = true; gameLoop();
}

// FIX 2: Touch instant ga respond ayyela
document.addEventListener('touchstart', e=>{
  if(!gameRunning) return;
  let x = e.touches[0].clientX;
  if(x < canvas.width/3){ if(player.lane > 0) player.lane--; } // Instant lane change
  else if(x > canvas.width*2/3){ if(player.lane < 2) player.lane++; }
  else{ player.jumping = true; }
});

gameLoop();
</script>
</body>
</html>

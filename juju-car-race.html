<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3b82f6">
<title>Juju Car Race</title>
<link rel="manifest" href="./manifest.json">
<style>
:root{--blue:#3b82f6;--road:#1f2937;--text:#fff;--shadow:0 12px 40px rgba(0,0,0,.2)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;background:var(--blue);font-family:system-ui;overflow:hidden}
.app{max-width:480px;margin:0 auto;min-height:100%;padding:16px;display:flex;flex-direction:column}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.btn{border:0;border-radius:16px;padding:10px 16px;font-weight:900;cursor:pointer}
.btn-back{background:#fff;color:var(--blue);box-shadow:var(--shadow)}
.score{color:#fff;font-weight:900;font-size:20px;text-shadow:0 2px 4px rgba(0,0,0,.3)}
.road{flex:1;background:repeating-linear-gradient(0deg,var(--road) 0 40px,#374151 40px 80px);border-radius:24px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.car{position:absolute;bottom:20px;left:50%;width:60px;height:90px;transform:translateX(-50%);transition:left .15s;font-size:60px}
.controls{display:flex;gap:12px;margin-top:12px}
.ctrl{flex:1;background:#fff;color:var(--blue);border:0;border-radius:16px;padding:16px;font-size:28px;font-weight:900;box-shadow:var(--shadow)}
.obs{position:absolute;width:60px;height:90px;border-radius:12px;animation:fall 3s linear forwards;font-size:60px;display:flex;align-items:center;justify-content:center}
@keyframes fall{0%{top:-100px}100%{top:110%}}
.info{text-align:center;color:#fff;margin:10px 0;font-weight:800}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <a href="./dashboard.html" class="btn btn-back">← Back</a>
    <div class="score" id="score">Score: 0</div>
  </div>
  <div class="road" id="road"></div>
  <div class="info">Tap ⬅️ ➡️ to dodge! 🚗</div>
  <div class="controls">
    <button class="ctrl" onclick="moveCar('left')">⬅️</button>
    <button class="ctrl" onclick="moveCar('right')">➡️</button>
  </div>
</div>
<audio id="vroom" src="data:audio/wav;base64,UklGRlIAAABXQVZFZm10IBAAAAABAAEAESsAABErAAABAAgAZGF0YQYAAAD//v//f///"></audio>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js?v=11-4');}
const road = document.getElementById('road');
const scoreEl = document.getElementById('score');
const vroom = document.getElementById('vroom');
let score = 0; let carPos = 50; 
const lanes = [25, 50, 75];

function moveCar(dir){
  if(dir==='left' && carPos>25) carPos-=25;
  if(dir==='right' && carPos<75) carPos+=25;
  document.querySelector('.car').style.left = carPos + '%';
  vroom.currentTime = 0; vroom.play();
  speak('Vroom!');
}

function spawnCar(){
  road.innerHTML = `<div class="car">🚗</div>`;
}
spawnCar();

function spawnObs(){
  const o = document.createElement('div');
  o.className = 'obs';
  o.style.left = lanes[Math.floor(Math.random()*3)] + '%';
  o.style.transform = 'translateX(-50%)';
  o.textContent = '🚙';
  road.appendChild(o);
  setTimeout(()=>o.remove(), 3000);
}
setInterval(spawnObs, 900);
setInterval(()=>{score+=5; scoreEl.textContent=`Score: ${score}`}, 1000);

function speak(t){ if('speechSynthesis' in window){speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.lang='en-US'; u.rate=1.3; u.pitch=1.2; speechSynthesis.speak(u);}}
</script>
</body>
</html>

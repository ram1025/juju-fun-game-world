<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Juju Car Race</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0f172a;overflow:hidden;font-family:system-ui;touch-action:none}
canvas{display:block;width:100%;height:100%}
.hud{position:absolute;top:0;left:0;right:0;height:60px;display:flex;justify-content:space-between;align-items:center;padding:0 12px;z-index:5;background:rgba(0,0,0,.4)}
.btn{background:#fff;color:#1e40af;border:0;border-radius:12px;padding:8px 14px;font-weight:900;font-size:16px;text-decoration:none}
.score{color:#fff;font-weight:900;font-size:24px}
.game-area{position:absolute;top:60px;bottom:0;left:0;right:0}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;z-index:999!important; /* 🔥 FORCE TOP */}
.vehicle-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:20px 0}
.vehicle-btn{background:#1f2937;border:3px solid #374151;border-radius:20px;padding:15px}
.vehicle-btn.active{border-color:#10b981;background:#064e3b}
.vehicle-btn div{font-size:45px}
.start-btn{background:#10b981;color:#fff;border:0;padding:18px 50px;border-radius:15px;font-weight:900;font-size:22px}
.instructions{position:absolute;bottom:20px;width:100%;text-align:center;color:#fff;font-weight:900;font-size:14px}
</style>
</head>
<body>
<div class="hud">
  <a href="./dashboard.html" class="btn">← Back</a>
  <div class="score" id="score">0</div>
</div>

<div class="game-area">
  <canvas id="game"></canvas>
  <div class="instructions">Tap Left = Left | Tap Right = Right | Tap Middle = Horn</div>
</div>

<!-- 🔥 FORCE SHOW ON LOAD -->
<div class="overlay" id="startScreen" style="display:flex">
  <h1>🏎️ JUJU CAR RACE</h1>
  <div class="vehicle-grid">
    <div class="vehicle-btn active" id="carBtn" onclick="selectVehicle('car')"><div>🚗</div><p>CAR</p></div>
    <div class="vehicle-btn" id="bikeBtn" onclick="selectVehicle('bike')"><div>🏍️</div><p>BIKE</p></div>
    <div class="vehicle-btn" id="truckBtn" onclick="selectVehicle('truck')"><div>🚚</div><p>TRUCK</p></div>
    <div class="vehicle-btn" id="busBtn" onclick="selectVehicle('bus')"><div>🚌</div><p>BUS</p></div>
  </div>
  <button class="start-btn" onclick="startGame()">START</button>
</div>

<div class="overlay" id="gameOver" style="display:none">
  <h1>💥 CRASHED!</h1>
  <p id="finalScore" style="font-size:24px;font-weight:900">Score: 0</p>
  <button class="start-btn" onclick="restartGame()">PLAY AGAIN</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const gameArea = document.querySelector('.game-area');
canvas.width = gameArea.clientWidth;
canvas.height = gameArea.clientHeight;

let gameRunning = false, gameStarted = false;
let audioCtx, engineOsc;
let selectedVehicle = 'car';
let player = {lane: 1, x: 0, y: 0};
let lanes = [], enemies = [], coins = [];
let score = 0, speed = 8, baseSpeed = 8, lastSpawn = 0;

function initLanes(){
  const roadWidth = Math.min(canvas.width * 0.7, 400);
  const laneWidth = roadWidth / 3;
  const startX = (canvas.width - roadWidth) / 2 + laneWidth / 2;
  lanes = [startX, startX + laneWidth, startX + laneWidth * 2];
  player.x = lanes[1]; player.y = canvas.height - 150;
}

function selectVehicle(type){
  selectedVehicle = type;
  document.querySelectorAll('.vehicle-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(type + 'Btn').classList.add('active');
}

function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  engineOsc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.setValueAtTime(100, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
  engineOsc.connect(gain).connect(audioCtx.destination);
  engineOsc.start();
}

function drawRoad(){
  const roadWidth = Math.min(canvas.width * 0.7, 400);
  const roadX = (canvas.width - roadWidth) / 2;
  ctx.fillStyle = '#166534'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#1f2937'; ctx.fillRect(roadX, 0, roadWidth, canvas.height);
  ctx.fillStyle = '#fbbf24'; ctx.fillRect(roadX - 10, 0, 10, canvas.height);
  ctx.fillRect(roadX + roadWidth, 0, 10, canvas.height);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.setLineDash([30, 30]);
  ctx.lineDashOffset = -Date.now() / 20 * speed;
  for(let i = 1; i < 3; i++){
    ctx.beginPath();
    ctx.moveTo(roadX + (roadWidth / 3) * i, 0);
    ctx.lineTo(roadX + (roadWidth / 3) * i, canvas.height);
    ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawVehicle(x, y, type, color='#ef4444'){
  ctx.save(); ctx.translate(x, y);
  if(type === 'car'){ctx.fillStyle=color;ctx.fillRect(-25,-45,50,90);ctx.fillStyle='#1e3a8a';ctx.fillRect(-20,-35,40,20);ctx.fillRect(-20,15,40,20);ctx.fillStyle='#000';ctx.fillRect(-28,-30,6,15);ctx.fillRect(22,-30,6,15);ctx.fillRect(-28,15,6,15);ctx.fillRect(22,15,6,15);}
  if(type === 'bike'){ctx.fillStyle=color;ctx.fillRect(-8,-30,16,60);ctx.fillStyle='#000';ctx.beginPath();ctx.arc(0,-20,15,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(-18,20,12,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(18,20,12,0,Math.PI*2);ctx.fill();}
  if(type === 'truck'){ctx.fillStyle=color;ctx.fillRect(-30,-60,60,120);ctx.fillStyle='#1e3a8a';ctx.fillRect(-25,-55,50,30);ctx.fillStyle='#000';ctx.fillRect(-35,-40,10,20);ctx.fillRect(25,-40,10,20);ctx.fillRect(-35,20,10,20);ctx.fillRect(25,20,10,20);}
  if(type === 'bus'){ctx.fillStyle=color;ctx.fillRect(-28,-50,56,100);ctx.fillStyle='#1e3a8a';for(let i=0;i<3;i++){ctx.fillRect(-25,-45+i*25,15,15);ctx.fillRect(10,-45+i*25,15,15);}ctx.fillStyle='#000';ctx.fillRect(-32,-30,8,15);ctx.fillRect(24,-30,8,15);ctx.fillRect(-32,15,8,15);ctx.fillRect(24,15,8,15);}
  ctx.restore();
}

function spawnTrafficWave(){
  if(!gameStarted) return;
  const types = ['car','bike','truck','bus'], colors = ['#3b82f6','#10b981','#a855f7','#f59e0b'];
  let count = Math.random() < 0.3?1:Math.random()<0.8?2:3, used=[];
  for(let i=0;i<count;i++){
    let lane; do{lane=Math.floor(Math.random()*3);}while(used.includes(lane)); used.push(lane);
    enemies.push({lane,x:lanes,y:-120-i*100,type:types[Math.floor(Math.random()*4)],color:colors[Math.floor(Math.random()*4)]});
  }
}

function update(){
  if(!gameRunning||!gameStarted) return;
  speed=baseSpeed;
  if(Date.now()-lastSpawn>1200){lastSpawn=Date.now();if(Math.random()<0.7)spawnTrafficWave();}
  enemies.forEach((e,i)=>{e.y+=speed;if(e.y>canvas.height+120)enemies.splice(i,1);if(Math.abs(e.x-player.x)<45&&Math.abs(e.y-player.y)<80)endGame();});
  score++;document.getElementById('score').textContent=score;
}

function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawRoad();enemies.forEach(e=>drawVehicle(e.x,e.y,e.type,e.color));
  if(gameStarted){player.x+=(lanes[player.lane]-player.x)*0.15;drawVehicle(player.x,player.y,selectedVehicle,'#ef4444');}
}

function gameLoop(){update();render();requestAnimationFrame(gameLoop);}

function startGame(){
  initAudio();
  gameStarted=true; gameRunning=true;
  document.getElementById('startScreen').style.display='none';
  score=0; document.getElementById('score').textContent=0; // Reset score
  initLanes();
}

function endGame(){
  gameRunning=false; gameStarted=false;
  document.getElementById('finalScore').textContent=`Score: ${score}`;
  document.getElementById('gameOver').style.display='flex';
}

function restartGame(){
  enemies=[]; score=0; baseSpeed=8;
  player.lane=1; player.x=lanes[1];
  document.getElementById('gameOver').style.display='none';
  gameStarted=true; gameRunning=true;
}

canvas.addEventListener('touchstart',e=>{e.preventDefault();if(!gameRunning||!gameStarted)return;let x=e.touches[0].clientX;if(x<canvas.width/3){if(player.lane>0)player.lane--;}else if(x>canvas.width*2/3){if(player.lane<2)player.lane++;}},{passive:false});

gameLoop();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e3a8a">
<title>Juju Car Race</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0f172a;overflow:hidden;font-family:system-ui}
canvas{display:block;width:100%;height:100vh;background:linear-gradient(#1e40af 0%, #0f172a 40%)}
.hud{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;align-items:center;z-index:10}
.btn{background:#fff;color:#1e40af;border:0;border-radius:12px;padding:8px 14px;font-weight:900;font-size:16px;text-decoration:none;box-shadow:0 4px 10px rgba(0,0,0,.3)}
.score{color:#fff;font-weight:900;font-size:24px;text-shadow:0 2px 6px #000}
.controls{position:absolute;bottom:20px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 20px;z-index:10}
.control-btn{background:rgba(255,255,255,.95);border:0;border-radius:50%;width:70px;height:70px;font-size:30px;box-shadow:0 6px 15px rgba(0,0,0,.4);transition:transform.1s}
.control-btn:active{transform:scale(.9)}
.boost{background:#10b981;color:#fff;width:80px;height:80px;font-size:35px;box-shadow:0 0 25px #10b981}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;z-index:30;text-align:center;padding:20px}
.overlay h1{font-size:32px;margin-bottom:10px}
.overlay p{font-size:16px;opacity:.9}
.overlay button{background:#10b981;color:#fff;border:0;padding:15px 30px;border-radius:15px;font-weight:900;font-size:18px;margin-top:20px}
.speedometer{position:absolute;bottom:110px;right:20px;background:rgba(0,0,0,.6);color:#10b981;padding:8px 15px;border-radius:20px;font-weight:900;font-size:14px;z-index:10}
</style>
</head>
<body>
<div class="hud">
  <a href="./dashboard.html" class="btn">← Back</a>
  <div class="score" id="score">0</div>
</div>
<div class="speedometer" id="speedo">Speed: 100</div>
<canvas id="game"></canvas>
<div class="controls">
  <button class="control-btn" id="leftBtn">⬅️</button>
  <button class="control-btn" id="hornBtn">📢</button>
  <button class="control-btn boost" id="boostBtn">🚀</button>
  <button class="control-btn" id="rightBtn">➡️</button>
</div>

<div class="overlay" id="startScreen">
  <h1>🏎️ JUJU CAR RACE</h1>
  <p>Swipe Left/Right or use buttons<br>Collect coins, avoid cars!</p>
  <button onclick="startGame()">START GAME</button>
</div>

<div class="overlay" id="gameOver" style="display:none">
  <h1>💥 CRASHED!</h1>
  <p id="finalScore">Score: 0</p>
  <button onclick="restartGame()">PLAY AGAIN</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameRunning = false;
let audioCtx, engineOsc, engineGain;

// Game state
let player = {lane: 1, x: 0, y: 0, w: 50, h: 90, targetLane: 1};
let lanes = [];
let enemies = [];
let coins = [];
let roadLines = [];
let score = 0;
let speed = 8;
let baseSpeed = 8;
let lastSpawn = 0;
let boosting = false;

// Init lanes - 3 lanes like Subway Surf
function initLanes(){
  const roadWidth = Math.min(canvas.width * 0.7, 400);
  const laneWidth = roadWidth / 3;
  const startX = (canvas.width - roadWidth) / 2 + laneWidth / 2;
  lanes = [startX, startX + laneWidth, startX + laneWidth * 2];
  player.x = lanes[1];
  player.y = canvas.height - 150;
}

// Audio setup
function initAudio(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  engineOsc = audioCtx.createOscillator();
  engineGain = audioCtx.createGain();
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.setValueAtTime(100, audioCtx.currentTime);
  engineGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
  engineOsc.connect(engineGain).connect(audioCtx.destination);
  engineOsc.start();
}

function playHorn(){
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.3);
}

function playCrash(){
  if(!audioCtx) return;
  engineOsc.stop();
  const noise = audioCtx.createBufferSource();
  const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  noise.buffer = buffer;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
  noise.connect(gain).connect(audioCtx.destination);
  noise.start();
}

// Draw functions
function drawRoad(){
  const roadWidth = Math.min(canvas.width * 0.7, 400);
  const roadX = (canvas.width - roadWidth) / 2;

  // Grass
  ctx.fillStyle = '#166534';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Road
  ctx.fillStyle = '#1f2937';
  ctx.fillRect(roadX, 0, roadWidth, canvas.height);

  // Yellow borders
  ctx.fillStyle = '#fbbf24';
  ctx.fillRect(roadX - 10, 0, 10, canvas.height);
  ctx.fillRect(roadX + roadWidth, 0, 10, canvas.height);

  // Lane lines
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 5;
  ctx.setLineDash([30, 30]);
  ctx.lineDashOffset = -Date.now() / 20 * speed;
  for(let i = 1; i < 3; i++){
    ctx.beginPath();
    ctx.moveTo(roadX + (roadWidth / 3) * i, 0);
    ctx.lineTo(roadX + (roadWidth / 3) * i, canvas.height);
    ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawPlayer(){
  ctx.save();
  ctx.translate(player.x, player.y);
  // Smooth lane change
  player.x += (lanes[player.lane] - player.x) * 0.15;

  // Car body
  ctx.fillStyle = '#ef4444';
  ctx.fillRect(-25, -45, 50, 90);
  // Windows
  ctx.fillStyle = '#1e3a8a';
  ctx.fillRect(-20, -35, 40, 25);
  ctx.fillRect(-20, 10, 40, 25);
  // Wheels
  ctx.fillStyle = '#000';
  ctx.fillRect(-28, -30, 6, 15);
  ctx.fillRect(22, -30, 6, 15);
  ctx.fillRect(-28, 15, 6, 15);
  ctx.fillRect(22, 15, 6, 15);
  ctx.restore();
}

function drawEnemy(enemy){
  ctx.save();
  ctx.translate(enemy.x, enemy.y);
  ctx.fillStyle = enemy.color;
  ctx.fillRect(-25, -45, 50, 90);
  ctx.fillStyle = '#000';
  ctx.fillRect(-20, -35, 40, 25);
  ctx.restore();
}

function drawCoin(coin){
  ctx.save();
  ctx.translate(coin.x, coin.y);
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath();
  ctx.arc(0, 0, 20, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#f59e0b';
  ctx.font = 'bold 20px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('$', 0, 0);
  ctx.restore();
}

// Game logic
function spawnEnemy(){
  const lane = Math.floor(Math.random() * 3);
  enemies.push({
    lane: lane,
    x: lanes[lane],
    y: -100,
    w: 50,
    h: 90,
    color: ['#3b82f6', '#10b981', '#a855f7', '#f59e0b'][Math.floor(Math.random() * 4)]
  });
}

function spawnCoin(){
  const lane = Math.floor(Math.random() * 3);
  coins.push({
    x: lanes[lane],
    y: -100,
    w: 40,
    h: 40
  });
}

function update(){
  if(!gameRunning) return;

  // Speed control
  speed = boosting? baseSpeed * 1.8 : baseSpeed;
  document.getElementById('speedo').textContent = `Speed: ${Math.floor(speed * 12.5)}`;
  if(engineOsc) engineOsc.frequency.setValueAtTime(100 + speed * 5, audioCtx.currentTime);

  // Spawn logic - FIXED: Less clutter
  if(Date.now() - lastSpawn > 1000){
    lastSpawn = Date.now();
    if(Math.random() < 0.6) spawnEnemy();
    if(Math.random() < 0.4) spawnCoin();
  }

  // Update enemies
  enemies.forEach((enemy, i) => {
    enemy.y += speed;
    if(enemy.y > canvas.height + 100) enemies.splice(i, 1);

    // Collision
    if(Math.abs(enemy.x - player.x) < 45 && Math.abs(enemy.y - player.y) < 80){
      endGame();
    }
  });

  // Update coins
  coins.forEach((coin, i) => {
    coin.y += speed;
    if(coin.y > canvas.height + 50) coins.splice(i, 1);

    // Collect
    if(Math.abs(coin.x - player.x) < 40 && Math.abs(coin.y - player.y) < 60){
      score += 10;
      baseSpeed += 0.05; // Increase difficulty slowly
      document.getElementById('score').textContent = score;
      coins.splice(i, 1);
    }
  });

  score++;
  document.getElementById('score').textContent = score;
}

function render(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawRoad();
  coins.forEach(drawCoin);
  enemies.forEach(drawEnemy);
  drawPlayer();
}

function gameLoop(){
  update();
  render();
  if(gameRunning) requestAnimationFrame(gameLoop);
}

function startGame(){
  if(!audioCtx) initAudio();
  document.getElementById('startScreen').style.display = 'none';
  gameRunning = true;
  initLanes();
  gameLoop();
}

function endGame(){
  gameRunning = false;
  playCrash();
  document.getElementById('finalScore').textContent = `Score: ${score}`;
  document.getElementById('gameOver').style.display = 'flex';
}

function restartGame(){
  enemies = [];
  coins = [];
  score = 0;
  speed = 8;
  baseSpeed = 8;
  player.lane = 1;
  player.x = lanes[1];
  document.getElementById('gameOver').style.display = 'none';
  gameRunning = true;
  initAudio();
  gameLoop();
}

// Controls
document.getElementById('leftBtn').addEventListener('touchstart', e => {e.preventDefault(); if(player.lane > 0) player.lane--});
document.getElementById('rightBtn').addEventListener('touchstart', e => {e.preventDefault(); if(player.lane < 2) player.lane++});
document.getElementById('boostBtn').addEventListener('touchstart', e => {e.preventDefault(); boosting = true});
document.getElementById('boostBtn').addEventListener('touchend', e => {e.preventDefault(); boosting = false});
document.getElementById('hornBtn').addEventListener('touchstart', e => {e.preventDefault(); playHorn()});

// Swipe controls
let touchStartX = 0;
canvas.addEventListener('touchstart', e => {touchStartX = e.touches[0].clientX});
canvas.addEventListener('touchend', e => {
  let diff = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(diff) > 50){
    if(diff > 0 && player.lane < 2) player.lane++;
    else if(diff < 0 && player.lane > 0) player.lane--;
  }
});

initLanes();
</script>
</body>
</html>

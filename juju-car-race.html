<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Juju Car Race</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0f172a;overflow:hidden;font-family:system-ui}
canvas{display:block;width:100%;height:100vh;background:linear-gradient(#1e40af 0%, #0f172a 40%)}
.hud{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;align-items:center;z-index:10}
.btn{background:#fff;color:#1e40af;border:0;border-radius:12px;padding:8px 14px;font-weight:900;font-size:16px;text-decoration:none}
.score{color:#fff;font-weight:900;font-size:24px;text-shadow:0 2px 6px #000}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;z-index:30;text-align:center;padding:20px}
.overlay h1{font-size:28px;margin-bottom:15px}
.vehicle-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px}
.vehicle-btn{background:#1f2937;border:3px solid #374151;border-radius:20px;padding:15px;cursor:pointer;transition:.2s}
.vehicle-btn.active{border-color:#10b981;background:#064e3b;transform:scale(1.05)}
.vehicle-btn div{font-size:45px;margin-bottom:8px}
.vehicle-btn p{font-weight:900;font-size:16px}
.overlay button{background:#10b981;color:#fff;border:0;padding:15px 40px;border-radius:15px;font-weight:900;font-size:20px}
.score-popup{position:absolute;color:#fbbf24;font-weight:900;font-size:20px;animation:floatUp 1s forwards;pointer-events:none;z-index:5}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}
.instructions{position:absolute;bottom:20px;width:100%;text-align:center;color:#fff;font-weight:900;font-size:14px;text-shadow:0 2px 4px #000;z-index:10}
</style>
</head>
<body>
<div class="hud">
  <a href="./dashboard.html" class="btn">← Back</a>
  <div class="score" id="score">0</div>
</div>

<canvas id="game"></canvas>
<div class="instructions">Tap Left = Left Lane | Tap Right = Right Lane | Tap Middle = Horn</div>

<div class="overlay" id="startScreen">
  <h1>🏎️ CHOOSE YOUR VEHICLE</h1>
  <div class="vehicle-grid">
    <div class="vehicle-btn active" id="carBtn" onclick="selectVehicle('car')"><div>🚗</div><p>CAR</p></div>
    <div class="vehicle-btn" id="bikeBtn" onclick="selectVehicle('bike')"><div>🏍️</div><p>BIKE</p></div>
    <div class="vehicle-btn" id="truckBtn" onclick="selectVehicle('truck')"><div>🚚</div><p>TRUCK</p></div>
    <div class="vehicle-btn" id="busBtn" onclick="selectVehicle('bus')"><div>🚌</div><p>BUS</p></div>
  </div>
  <button onclick="startGame()">START GAME</button>
</div>

<div class="overlay" id="gameOver" style="display:none">
  <h1>💥 CRASHED!</h1>
  <p id="finalScore" style="font-size:24px;font-weight:900">Score: 0</p>
  <button onclick="restartGame()">PLAY AGAIN</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameRunning = false;
let audioCtx, engineOsc, coinSound;
let selectedVehicle = 'car';

let player = {lane: 1, x: 0, y: 0};
let lanes = [];
let enemies = [];
let coins = [];
let score = 0;
let speed = 8;
let baseSpeed = 8;
let lastSpawn = 0;

function initLanes(){
  const roadWidth = Math.min(canvas.width * 0.7, 400);
  const laneWidth = roadWidth / 3;
  const startX = (canvas.width - roadWidth) / 2 + laneWidth / 2;
  lanes = [startX, startX + laneWidth, startX + laneWidth * 2];
  player.x = lanes[1];
  player.y = canvas.height - 150;
}

function selectVehicle(type){
  selectedVehicle = type;
  document.querySelectorAll('.vehicle-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(type + 'Btn').classList.add('active');
}

function initAudio(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  engineOsc = audioCtx.createOscillator();
  const engineGain = audioCtx.createGain();
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.setValueAtTime(100, audioCtx.currentTime);
  engineGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
  engineOsc.connect(engineGain).connect(audioCtx.destination);
  engineOsc.start();

  coinSound = () => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
  }
}

function playHorn(){
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.3);
}

function showScorePopup(x, y, text){
  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = text;
  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 1000);
}

function drawRoad(){
  const roadWidth = Math.min(canvas.width * 0.7, 400);
  const roadX = (canvas.width - roadWidth) / 2;
  ctx.fillStyle = '#166534'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#1f2937'; ctx.fillRect(roadX, 0, roadWidth, canvas.height);
  ctx.fillStyle = '#fbbf24'; ctx.fillRect(roadX - 10, 0, 10, canvas.height);
  ctx.fillRect(roadX + roadWidth, 0, 10, canvas.height);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.setLineDash([30, 30]);
  ctx.lineDashOffset = -Date.now() / 20 * speed;
  for(let i = 1; i < 3; i++){
    ctx.beginPath();
    ctx.moveTo(roadX + (roadWidth / 3) * i, 0);
    ctx.lineTo(roadX + (roadWidth / 3) * i, canvas.height);
    ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawVehicle(x, y, type, color='#ef4444'){
  ctx.save();
  ctx.translate(x, y);

  if(type === 'car'){
    ctx.fillStyle = color; ctx.fillRect(-25, -45, 50, 90);
    ctx.fillStyle = '#1e3a8a'; ctx.fillRect(-20, -35, 40, 25); ctx.fillRect(-20, 10, 40, 25);
    ctx.fillStyle = '#000'; ctx.fillRect(-28, -30, 6, 15); ctx.fillRect(22, -30, 6, 15);
    ctx.fillRect(-28, 15, 6, 15); ctx.fillRect(22, 15, 6, 15);
  }
  if(type === 'bike'){
    ctx.fillStyle = color; ctx.fillRect(-8, -30, 16, 60);
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(0, -20, 15, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(-18, 20, 12, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(18, 20, 12, 0, Math.PI * 2); ctx.fill();
  }
  if(type === 'truck'){
    ctx.fillStyle = color; ctx.fillRect(-30, -60, 60, 120);
    ctx.fillStyle = '#1e3a8a'; ctx.fillRect(-25, -55, 50, 30);
    ctx.fillStyle = '#000'; ctx.fillRect(-35, -40, 10, 20); ctx.fillRect(25, -40, 10, 20);
    ctx.fillRect(-35, 20, 10, 20); ctx.fillRect(25, 20, 10, 20);
  }
  if(type === 'bus'){
    ctx.fillStyle = color; ctx.fillRect(-28, -50, 56, 100);
    ctx.fillStyle = '#1e3a8a';
    for(let i=0; i<3; i++){ ctx.fillRect(-25, -45 + i*25, 15, 15); ctx.fillRect(10, -45 + i*25, 15, 15); }
    ctx.fillStyle = '#000'; ctx.fillRect(-32, -30, 8, 15); ctx.fillRect(24, -30, 8, 15);
    ctx.fillRect(-32, 15, 8, 15); ctx.fillRect(24, 15, 8, 15);
  }
  ctx.restore();
}

function drawCoin(coin){
  ctx.save();
  ctx.translate(coin.x, coin.y);
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#f59e0b'; ctx.font = 'bold 20px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('$', 0, 0);
  ctx.restore();
}

// 🔥 MULTI VEHICLE SPAWN LOGIC
function spawnTrafficWave(){
  const types = ['car', 'bike', 'truck', 'bus'];
  const colors = ['#3b82f6', '#10b981', '#a855f7', '#f59e0b', '#ef4444'];

  // 30% chance: 1 vehicle, 50% chance: 2 vehicles, 20% chance: 3 vehicles
  let vehicleCount = Math.random() < 0.3? 1 : Math.random() < 0.8? 2 : 3;
  let usedLanes = [];

  for(let i = 0; i < vehicleCount; i++){
    let lane;
    do{ lane = Math.floor(Math.random() * 3); } while(usedLanes.includes(lane));
    usedLanes.push(lane);

    enemies.push({
      lane: lane,
      x: lanes,
      y: -120 - i * 100, // gap between vehicles
      type: types[Math.floor(Math.random() * 4)],
      color: colors[Math.floor(Math.random() * 5)]
    });
  }
}

function spawnCoin(){
  const lane = Math.floor(Math.random() * 3);
  coins.push({x: lanes, y: -100});
}

function update(){
  if(!gameRunning) return;
  speed = baseSpeed;
  if(engineOsc) engineOsc.frequency.setValueAtTime(100 + speed * 5, audioCtx.currentTime);

  // Spawn logic - Traffic wave
  if(Date.now() - lastSpawn > 1200){
    lastSpawn = Date.now();
    if(Math.random() < 0.7) spawnTrafficWave(); // Multi vehicles
    if(Math.random() < 0.4) spawnCoin();
  }

  enemies.forEach((enemy, i) => {
    enemy.y += speed;
    if(enemy.y > canvas.height + 120) enemies.splice(i, 1);
    if(Math.abs(enemy.x - player.x) < 45 && Math.abs(enemy.y - player.y) < 80){ endGame(); }
  });

  coins.forEach((coin, i) => {
    coin.y += speed;
    if(coin.y > canvas.height + 50) coins.splice(i, 1);
    if(Math.abs(coin.x - player.x) < 40 && Math.abs(coin.y - player.y) < 60){
      score += 10;
      baseSpeed += 0.05;
      document.getElementById('score').textContent = score;
      showScorePopup(coin.x, coin.y, '+10');
      coinSound();
      coins.splice(i, 1);
    }
  });

  score++;
  document.getElementById('score').textContent = score;
}

function render(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawRoad();
  coins.forEach(drawCoin);
  enemies.forEach(e => drawVehicle(e.x, e.y, e.type, e.color));
  drawVehicle(player.x, player.y, selectedVehicle, '#ef4444');
}

function gameLoop(){
  update();
  render();
  if(gameRunning) requestAnimationFrame(gameLoop);
}

function startGame(){
  if(!audioCtx) initAudio();
  document.getElementById('startScreen').style.display = 'none';
  gameRunning = true;
  initLanes();
  gameLoop();
}

function endGame(){
  gameRunning = false;
  document.getElementById('finalScore').textContent = `Score: ${score}`;
  document.getElementById('gameOver').style.display = 'flex';
}

function restartGame(){
  enemies = []; coins = []; score = 0; speed = 8; baseSpeed = 8;
  player.lane = 1; player.x = lanes[1];
  document.getElementById('gameOver').style.display = 'none';
  gameRunning = true; initAudio(); gameLoop();
}

// Touch Controls
canvas.addEventListener('touchstart', e => {
  if(!gameRunning) return;
  let x = e.touches[0].clientX;
  if(x < canvas.width / 3){ if(player.lane > 0) player.lane--; }
  else if(x > canvas.width * 2 / 3){ if(player.lane < 2) player.lane++; }
  else{ playHorn(); }
});
</script>
</body>
</html>

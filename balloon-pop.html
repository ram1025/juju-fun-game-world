<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ec4899">
<title>Balloon Pop - Juju Fun World</title>
<link rel="manifest" href="./manifest.json">
<style>
:root{--pink:#ec4899;--cream:#fef3c7;--text:#1f2937;--shadow:0 12px 40px rgba(0,0,0,.2)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;background:var(--pink);font-family:system-ui,-apple-system;overflow:hidden}
.app{max-width:480px;margin:0 auto;min-height:100%;padding:16px;display:flex;flex-direction:column}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.btn{border:0;border-radius:16px;padding:10px 16px;font-weight:900;cursor:pointer}
.btn-back{background:#fff;color:var(--pink);box-shadow:var(--shadow)}
.score{color:#fff;font-weight:900;font-size:20px;text-shadow:0 2px 4px rgba(0,0,0,.3)}
.game-area{flex:1;background:linear-gradient(180deg,#a855f7 0%,#ec4899 100%);border-radius:24px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.balloon{position:absolute;width:70px;height:90px;cursor:pointer;animation:floatUp 6s linear forwards;user-select:none}
.balloon svg{width:100%;height:100%;filter:drop-shadow(0 4px 6px rgba(0,0,0,.3))}
@keyframes floatUp{0%{bottom:-100px}100%{bottom:110%}}
.pop{animation:pop .2s ease-out forwards}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(0);opacity:0}}
.info{text-align:center;color:#fff;margin:10px 0;font-weight:800;font-size:16px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <a href="./dashboard.html" class="btn btn-back">← Back</a>
    <div class="score" id="score">Score: 0</div>
  </div>

  <div class="game-area" id="gameArea"></div>
  <div class="info">Tap the balloons! 🎈</div>
</div>

<!-- 🔥 Pop Sound - No file needed -->
<audio id="popSound" src="data:audio/wav;base64,UklGRlIAAABXQVZFZm10IBAAAAABAAEAESsAABErAAABAAgAZGF0YQYAAAD//v//f///"></audio>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js?v=11-3');} // 🔥 V11-3

const gameArea = document.getElementById('gameArea');
const scoreEl = document.getElementById('score');
const popSound = document.getElementById('popSound');
let score = 0;
const colors = ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#a855f7','#ec4899'];

function createBalloon(){
  const b = document.createElement('div');
  b.className = 'balloon';
  b.style.left = Math.random() * (gameArea.clientWidth - 70) + 'px';
  const color = colors[Math.floor(Math.random() * colors.length)];
  
  b.innerHTML = `
    <svg viewBox="0 0 70 90">
      <ellipse cx="35" cy="40" rx="30" ry="35" fill="${color}"/>
      <path d="M35 75 L32 85 L38 85 Z" fill="${color}"/>
      <ellipse cx="25" cy="25" rx="8" ry="10" fill="rgba(255,255,255,.4)"/>
    </svg>
  `;
  
  b.addEventListener('click', () => popBalloon(b));
  gameArea.appendChild(b);
  
  setTimeout(() => b.remove(), 6000); // 6s tarvata auto remove
}

function popBalloon(b){
  if(b.classList.contains('pop')) return; // Double tap avoid
  b.classList.add('pop');
  popSound.currentTime = 0; 
  popSound.play(); // 🔥 English Pop Sound
  score += 10;
  scoreEl.textContent = `Score: ${score}`;
  speak('Pop!'); // 🔥 English Voice
  setTimeout(() => b.remove(), 200);
}

function speak(text){
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 1.2; u.pitch = 1.5; // Cute kid voice
    window.speechSynthesis.speak(u);
  }
}

// 🔥 Every 800ms oka balloon create
setInterval(createBalloon, 800);
</script>
</body>
</html>

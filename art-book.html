<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Book 1/1: Parrot</title>
<style>
  body{margin:0;font-family:system-ui;background:#4f8cff;display:flex;justify-content:center;padding:16px}
  .wrap{background:#fff7d6;border-radius:24px;padding:16px;max-width:420px;width:100%;box-shadow:0 8px 24px rgba(0,0,0,.15)}
  h2{text-align:center;color:#f97316;margin:4px 0 8px;font-size:24px}
  h3{text-align:center;margin:0 0 12px;font-size:18px}
  .box{background:#fff;border:3px solid #fbbf24;border-radius:20px;padding:12px;position:relative}
  canvas{width:100%;height:300px;touch-action:none;border-radius:12px;display:block}
  .row{display:flex;gap:8px;margin-top:12px}
  .btn{flex:1;padding:12px;border:0;border-radius:12px;color:#fff;font-weight:700;font-size:16px}
  .red{background:#ef4444}.green{background:#22c55e}.blue{background:#3b82f6}.orange{background:#f97316}
  .topback{display:inline-block;background:#fff;padding:8px 14px;border-radius:12px;text-decoration:none;color:#f97316;font-weight:700;margin-bottom:8px;box-shadow:0 4px 10px rgba(0,0,0,.1)}
  .ref{position:absolute;top:12px;left:12px;width:60px;height:60px;border:2px solid #f97316;border-radius:8px;background:#fff;padding:4px}
  .ref div{width:12px;height:12px;display:inline-block;margin:2px;border-radius:3px}
</style>
</head>
<body>
<div class="wrap">
  <a href="./dashboard.html" class="topback">← Back</a>
  <h2>1/1: Parrot</h2>
  <h3>Color the Picture</h3>
  
  <div class="box">
    <div class="ref">
      <div style="background:#22c55e"></div><div style="background:#3b82f6"></div>
      <div style="background:#f97316"></div>
    </div>
    <canvas id="c"></canvas>
  </div>

  <div class="row">
    <button class="btn red" onclick="clearC()">Clear</button>
    <button class="btn green" onclick="pick('#22c55e')">Green</button>
    <button class="btn blue" onclick="pick('#3b82f6')">Blue</button>
    <button class="btn orange" onclick="pick('#f97316')">Orange</button>
  </div>
</div>

<script>
const c=document.getElementById('c'), x=c.getContext('2d');
c.width=300; c.height=300;
let color="#22c55e"; // Default Green

const parrot = new Path2D("M140,40 C130,30 110,30 100,40 C90,50 90,70 100,80 L110,120 C110,150 120,180 140,200 C160,180 170,150 170,120 L180,80 C190,70 190,50 180,40 C170,30 150,30 140,40 Z M140,80 L140,120 M140,120 C120,130 110,150 110,180 M140,120 C160,130 170,150 170,180 M140,200 L140,230 M160,130 L190,120 L200,100 M130,60 A10,10 0 1,1 131,60");

function draw(){
  x.clearRect(0,0,c.width,c.height);
  x.strokeStyle="#d1d5db"; x.lineWidth=3; // Grey solid line
  x.stroke(parrot);
}
draw();

function pick(co){color=co} // Color select
c.onclick = (e) => {
  if(x.isPointInPath(parrot, e.offsetX, e.offsetY)){
    x.fillStyle=color;
    x.fill(parrot);
    x.strokeStyle="#d1d5db"; x.lineWidth=3;
    x.stroke(parrot);
  }
};
function clearC(){draw()}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Book Kids</title>
<style>
  :root{--bg:#f0f8ff;--card:#fff;--accent:#3b82f6}
  body{margin:0;font-family:system-ui;background:var(--bg);display:flex;flex-direction:column;height:100vh}
  header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--card);box-shadow:0 2px 4px #0001}
  header button{background:none;border:0;font-size:18px;font-weight:700;color:var(--accent);cursor:pointer}
  header h1{font-size:16px;margin:0}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:12px}
  #canvas-wrap{position:relative;width:95vw;max-width:420px;aspect-ratio:1/1;border:3px solid #333;border-radius:20px;background:white;touch-action:none}
  #canvas-wrap svg{width:100%;height:100%}
 .color-area{fill:none;stroke:#aaa;stroke-width:2.5;stroke-dasharray:5 5;cursor:pointer;transition:fill.2s}
 .color-area.filled{stroke:#333;stroke-width:2;stroke-dasharray:none}
  footer{background:var(--card);padding:10px}
  #controls{display:flex;align-items:center;justify-content:space-between;gap:8px}
  #controls button{padding:10px 14px;border:0;border-radius:12px;background:var(--accent);color:white;font-weight:700;cursor:pointer}
  #controls button:disabled{background:#ccc}
  #palette{display:flex;gap:6px;overflow-x:auto;padding:4px 0}
 .swatch{width:38px;height:38px;border-radius:50%;border:3px solid #fff;box-shadow:0 1px 3px #0003;flex-shrink:0;cursor:pointer}
 .swatch.active{border:3px solid #000;transform:scale(1.15)}
</style>
</head>
<body>

<header>
  <button onclick="location.href='dashboard.html'">← Back</button>
  <h1 id="pageTitle">Art Book 1/10</h1>
  <span></span>
</header>

<main>
  <div id="canvas-wrap">
    <svg id="svgCanvas" viewBox="0 0 400 400"></svg>
  </div>
</main>

<footer>
  <div id="controls">
    <button id="prevBtn">← Prev</button>
    <div id="palette"></div>
    <button id="nextBtn">Next →</button>
  </div>
</footer>

<script>
/* === 10 Simple Pages Data === */
const pages = [
  { name: 'Table', num: '1/10', colors: ['#a0522d','#8b4513','#d2b48c','#f5deb3'],
    svg: `<rect id="top" class="color-area" x="100" y="120" width="200" height="30" rx="4"/>
          <rect id="leg1" class="color-area" x="120" y="150" width="20" height="120"/>
          <rect id="leg2" class="color-area" x="260" y="150" width="20" height="120"/>` },

  { name: 'Chair', num: '2/10', colors: ['#a0522d','#8b4513','#d2b48c','#ffdead'],
    svg: `<rect id="back" class="color-area" x="150" y="100" width="100" height="100" rx="8"/>
          <rect id="seat" class="color-area" x="120" y="200" width="160" height="30" rx="4"/>
          <rect id="leg1" class="color-area" x="130" y="230" width="15" height="70"/>
          <rect id="leg2" class="color-area" x="255" y="230" width="15" height="70"/>` },

  { name: 'Car', num: '3/10', colors: ['#ef4444','#3b82f6','#1f2937','#ffffff'],
    svg: `<path id="body" class="color-area" d="M80 200 h240 l-20 60 h-200 z"/>
          <circle id="w1" class="color-area" cx="140" cy="270" r="25"/>
          <circle id="w2" class="color-area" cx="260" cy="270" r="25"/>` },

  { name: 'Tree', num: '4/10', colors: ['#22c55e','#166534','#8b4513','#a0522d'],
    svg: `<rect id="trunk" class="color-area" x="185" y="220" width="30" height="100"/>
          <circle id="leaves" class="color-area" cx="200" cy="180" r="80"/>` },

  { name: 'Cone', num: '5/10', colors: ['#f97316','#ef4444','#fbbf24','#ffffff'],
    svg: `<polygon id="cone" class="color-area" points="200,80 120,320 280,320"/>` },

  { name: 'Mango', num: '6/10', colors: ['#fbbf24','#f97316','#22c55e','#166534'],
    svg: `<ellipse id="mango" class="color-area" cx="200" cy="200" rx="80" ry="110" transform="rotate(-20 200 200)"/>
          <rect id="stem" class="color-area" x="195" y="80" width="10" height="20"/>` },

  { name: 'Orange', num: '7/10', colors: ['#f97316','#fb923c','#ef4444','#22c55e'],
    svg: `<circle id="orange" class="color-area" cx="200" cy="200" r="90"/>
          <path id="leaf" class="color-area" d="M200 110 q20 -20 30 0 q-10 10 -30 0 z"/>` },

  { name: 'Airplane', num: '8/10', colors: ['#ffffff','#3b82f6','#ef4444','#1f2937'],
    svg: `<path id="body" class="color-area" d="M80 200 h260 l-40 20 h-180 z"/>
          <polygon id="wing" class="color-area" points="200,200 160,280 240,280"/>` },

  { name: 'Bus', num: '9/10', colors: ['#fbbf24','#ef4444','#1f2937','#3b82f6'],
    svg: `<rect id="body" class="color-area" x="80" y="150" width="240" height="120" rx="10"/>
          <rect id="win" class="color-area" x="100" y="170" width="80" height="40"/>
          <rect id="win2" class="color-area" x="220" y="170" width="80" height="40"/>
          <circle id="w1" class="color-area" cx="140" cy="280" r="25"/>
          <circle id="w2" class="color-area" cx="260" cy="280" r="25"/>` },

  { name: 'Parrot', num: '10/10', colors: ['#22c55e','#fbbf24','#f97316','#ef4444'],
    svg: `<path id="body" class="color-area" d="M200 100 C220 90, 260 100, 270 130 C265 180, 240 240, 210 280 C190 300, 170 340 L170 340 Z"/>
          <path id="beak" class="color-area" d="M270 130 L290 125 L285 140 Z"/>
          <circle cx="235" cy="115" r="6" fill="#333"/>` }
];

let currentPage = 0;
let activeColor = '';

const svgCanvas = document.getElementById('svgCanvas');
const pageTitle = document.getElementById('pageTitle');
const palette = document.getElementById('palette');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

function loadPage(i){
  const page = pages[i];
  pageTitle.textContent = `Art Book ${page.num}`;
  svgCanvas.innerHTML = page.svg;

  palette.innerHTML = '';
  activeColor = page.colors[0];
  page.colors.forEach(c=>{
    const d=document.createElement('div');
    d.className='swatch'; d.style.background=c;
    if(c===activeColor) d.classList.add('active');
    d.onclick=()=>{document.querySelector('.swatch.active')?.classList.remove('active');d.classList.add('active');activeColor=c;}
    palette.appendChild(d);
  });

  svgCanvas.querySelectorAll('.color-area').onpointerdown = null; // reset
  svgCanvas.querySelectorAll('.color-area').forEach(area=>{
    area.onclick=()=>{ if(activeColor){ area.style.fill=activeColor; area.classList.add('filled'); } }
  });

  prevBtn.disabled = i===0;
  nextBtn.disabled = i===pages.length-1;
}

prevBtn.onclick=()=>{ if(currentPage>0){currentPage--; loadPage(currentPage);} }
nextBtn.onclick=()=>{ if(currentPage<pages.length-1){currentPage++; loadPage(currentPage);} }

loadPage(0);
</script>
</body>
</html>

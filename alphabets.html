<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alphabets - Juju Fun World</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Nunito',sans-serif;background:#3B82F6;min-height:100vh;padding:20px}
        .back-btn{background:#fff;color:#F97316;border:none;padding:10px 20px;border-radius:15px;font-weight:800;font-size:16px;margin-bottom:20px;cursor:pointer}
        .container{background:#fff;padding:20px;border-radius:30px;max-width:400px;margin:0 auto}
        h1{color:#EC4899;font-weight:900;font-size:32px;text-align:center;margin-bottom:20px}
        h1 span{background:#DBEAFE;color:#3B82F6;padding:4px 8px;border-radius:8px;font-size:20px;margin-left:8px}
        .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
        .letter-box{background:#FCE7F3;border:3px solid #F9A8D4;border-radius:15px;padding:15px;text-align:center;cursor:pointer;transition:all .2s}
        .letter-box:active{transform:scale(.95);background:#FBCFE8}
        .letter{color:#DB2777;font-weight:900;font-size:32px;line-height:1}
        .word{color:#831843;font-weight:700;font-size:14px;margin-top:4px}
        .emoji{font-size:24px;margin-top:4px}
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='./dashboard.html'">← Back</button>
    <div class="container">
        <h1>Alphabets <span>abc</span></h1>
        <div class="grid" id="alphaGrid"></div>
    </div>

    <script>
        const alphabets = [
            {l:'A',w:'Apple',e:'🍎'}, {l:'B',w:'Ball',e:'⚽'}, {l:'C',w:'Cat',e:'🐱'},
            {l:'D',w:'Dog',e:'🐶'}, {l:'E',w:'Elephant',e:'🐘'}, {l:'F',w:'Fish',e:'🐟'},
            {l:'G',w:'Goat',e:'🐐'}, {l:'H',w:'Hat',e:'👒'}, {l:'I',w:'Ice',e:'🍦'},
            {l:'J',w:'Jug',e:'🏺'}, {l:'K',w:'Kite',e:'🪁'}, {l:'L',w:'Lion',e:'🦁'},
            {l:'M',w:'Monkey',e:'🐵'}, {l:'N',w:'Nest',e:'🪺'}, {l:'O',w:'Orange',e:'🍊'},
            {l:'P',w:'Parrot',e:'🦜'}, {l:'Q',w:'Queen',e:'👸'}, {l:'R',w:'Rabbit',e:'🐰'},
            {l:'S',w:'Sun',e:'☀️'}, {l:'T',w:'Tiger',e:'🐯'}, {l:'U',w:'Umbrella',e:'☂️'},
            {l:'V',w:'Van',e:'🚐'}, {l:'W',w:'Watch',e:'⌚'}, {l:'X',w:'Xylophone',e:'🎼'},
            {l:'Y',w:'Yak',e:'🐂'}, {l:'Z',w:'Zebra',e:'🦓'}
        ];

        const grid = document.getElementById('alphaGrid');
        
        function speak(text){
            if('speechSynthesis' in window){
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.rate = 0.9;
                msg.pitch = 1.1;
                window.speechSynthesis.speak(msg);
            }
        }

        alphabets.forEach(item => {
            const box = document.createElement('div');
            box.className = 'letter-box';
            box.innerHTML = `
                <div class="letter">${item.l}</div>
                <div class="word">${item.w}</div>
                <div class="emoji">${item.e}</div>
            `;
            box.onclick = () => speak(`${item.l}, ${item.l} for ${item.w}`);
            grid.appendChild(box);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Juju Fun World</title>
    <link rel="icon" type="image/png" href="./icon-192.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #3B82F6;
            min-height: 100vh; padding: 20px;
        }
        .back-btn {
            background: #fff; color: #F97316; border: none;
            padding: 12px 24px; border-radius: 15px; font-weight: 800;
            font-size: 16px; margin-bottom: 20px; cursor: pointer;
            box-shadow: 0 4px 0 #EA580C;
        }
        .back-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #EA580C; }
        .container {
            background: #fff; padding: 30px 20px; border-radius: 30px;
            max-width: 400px; margin: 0 auto; text-align: center;
        }
        h1 {
            color: #EC4899; font-weight: 900; font-size: 32px;
            margin-bottom: 30px;
        }
        .avatar-wrapper {
            position: relative; width: 150px; height: 150px;
            margin: 0 auto 20px;
        }
        .avatar {
            width: 150px; height: 150px; border-radius: 50%;
            border: 5px solid #EC4899; object-fit: cover;
            background: #E5E7EB; display: flex; align-items: center;
            justify-content: center; font-size: 60px;
        }
        .camera-btn {
            position: absolute; bottom: 5px; right: 5px;
            background: #F97316; color: white; border: 3px solid white;
            width: 45px; height: 45px; border-radius: 50%;
            font-size: 22px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .camera-btn:active { transform: scale(0.9); }
        #fileInput { display: none; }
        .input-group {
            margin-bottom: 20px; text-align: left;
        }
        label {
            display: block; color: #1F2937; font-weight: 800;
            font-size: 16px; margin-bottom: 8px;
        }
        input {
            width: 100%; padding: 15px; border: 3px solid #E5E7EB;
            border-radius: 15px; font-size: 18px; font-weight: 700;
            font-family: 'Nunito', sans-serif;
        }
        input:focus {
            outline: none; border-color: #3B82F6;
        }
        .save-btn {
            width: 100%; background: linear-gradient(135deg, #10B981, #34D399);
            color: white; border: none; padding: 18px; border-radius: 20px;
            font-size: 20px; font-weight: 900; cursor: pointer;
            box-shadow: 0 6px 0 #059669; margin-top: 10px;
        }
        .save-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #059669; }
        .success-msg {
            background: #D1FAE5; color: #065F46; padding: 12px;
            border-radius: 12px; font-weight: 800; margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='./dashboard.html'">← Back</button>
    <div class="container">
        <h1>👤 Your Profile</h1>
        
        <div class="avatar-wrapper">
            <div class="avatar" id="avatarPreview">🐒</div>
            <button class="camera-btn" onclick="document.getElementById('fileInput').click()">📷</button>
            <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">
        </div>

        <div class="input-group">
            <label>Your Name</label>
            <input type="text" id="nameInput" placeholder="Enter your name" maxlength="20">
        </div>

        <button class="save-btn" onclick="saveProfile()">💾 Save Profile</button>
        <div class="success-msg" id="successMsg">✅ Saved Successfully!</div>
    </div>

    <script>
        let currentPic = null;

        // Load existing data
        window.addEventListener('load', () => {
            const name = localStorage.getItem('playerName');
            const pic = localStorage.getItem('playerPic');
            
            if (name) document.getElementById('nameInput').value = name;
            if (pic) {
                currentPic = pic;
                document.getElementById('avatarPreview').innerHTML = `<img src="${pic}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
            }
        });

        // Preview image
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentPic = e.target.result;
                    document.getElementById('avatarPreview').innerHTML = `<img src="${currentPic}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
                };
                reader.readAsDataURL(file);
            }
        }

        // Save profile
        function saveProfile() {
            const name = document.getElementById('nameInput').value.trim();
            
            if (!name) {
                alert('Please enter your name');
                return;
            }

            localStorage.setItem('playerName', name);
            if (currentPic) localStorage.setItem('playerPic', currentPic);
            
            const msg = document.getElementById('successMsg');
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
                location.href = './dashboard.html';
            }, 1500);
        }
    </script>
</body>
</html>

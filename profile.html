<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Juju Fun World</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #3B82F6;
            min-height: 100vh;
            padding: 20px;
        }
       .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
       .back-btn {
            background: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            font-size: 24px;
            font-weight: 900;
            cursor: pointer;
        }
       .header-title {
            font-size: 28px;
            font-weight: 900;
            color: white;
        }
       .container {
            background: white;
            padding: 30px;
            border-radius: 30px;
            max-width: 400px;
            margin: 0 auto;
        }
       .avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
        }
       .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #EC4899;
            object-fit: cover;
            background: #E5E7EB;
        }
       .camera-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #F97316;
            color: white;
            border: 3px solid white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #fileInput { display: none; }
        label {
            display: block;
            font-size: 16px;
            font-weight: 800;
            color: #1F2937;
            margin-bottom: 8px;
        }
        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            margin-bottom: 18px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3B82F6;
        }
       .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
       .save-btn {
            width: 100%;
            background: linear-gradient(135deg, #10B981, #059669);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 6px 0 #047857;
            margin-top: 10px;
        }
       .save-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #047857;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="location.href='./dashboard.html'">←</button>
        <div class="header-title">My Profile 🦁</div>
    </div>

    <div class="container">
        <div class="avatar-wrapper">
            <img src="./icon-192.png" class="avatar" id="profileAvatar">
            <button class="camera-btn" onclick="document.getElementById('fileInput').click()">📷</button>
            <input type="file" id="fileInput" accept="image/*" onchange="updateAvatar(event)">
        </div>

        <label>Full Name *</label>
        <input type="text" id="fullName" placeholder="JUJU" maxlength="20">

        <div class="row">
            <div>
                <label>Nick Name / Kid ID</label>
                <input type="text" id="nickname" placeholder="Nickname">
            </div>
            <div>
                <label>Date of Birth</label>
                <input type="date" id="dob">
            </div>
        </div>

        <label>Email</label>
        <input type="email" id="email" placeholder="parent@email.com">

        <div class="row">
            <div>
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="9876543210" maxlength="10">
            </div>
            <div>
                <label>Blood Group</label>
                <select id="bloodGroup">
                    <option value="">Select</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>
        </div>

        <label>Father's Name</label>
        <input type="text" id="fatherName" placeholder="Father's name">

        <button class="save-btn" onclick="saveProfile()">Save Profile ✅</button>
    </div>

    <script>
        let currentAvatar = localStorage.getItem('jujuAvatar') || './icon-192.png';

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('profileAvatar').src = currentAvatar;
            document.getElementById('fullName').value = localStorage.getItem('jujuName') || '';
            document.getElementById('nickname').value = localStorage.getItem('jujuNickname') || '';
            document.getElementById('dob').value = localStorage.getItem('jujuDob') || '';
            document.getElementById('email').value = localStorage.getItem('jujuEmail') || '';
            document.getElementById('phone').value = localStorage.getItem('jujuPhone') || '';
            document.getElementById('bloodGroup').value = localStorage.getItem('jujuBlood') || '';
            document.getElementById('fatherName').value = localStorage.getItem('jujuFather') || '';
        });

        function updateAvatar(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentAvatar = e.target.result;
                    document.getElementById('profileAvatar').src = currentAvatar;
                }
                reader.readAsDataURL(file);
            }
        }

        function saveProfile() {
            const name = document.getElementById('fullName').value.trim();
            if (!name) {
                alert('Please enter Full Name!');
                return;
            }
            localStorage.setItem('jujuAvatar', currentAvatar);
            localStorage.setItem('jujuName', name);
            localStorage.setItem('jujuNickname', document.getElementById('nickname').value.trim());
            localStorage.setItem('jujuDob', document.getElementById('dob').value);
            localStorage.setItem('jujuEmail', document.getElementById('email').value.trim());
            localStorage.setItem('jujuPhone', document.getElementById('phone').value.trim());
            localStorage.setItem('jujuBlood', document.getElementById('bloodGroup').value);
            localStorage.setItem('jujuFather', document.getElementById('fatherName').value.trim());
            alert('Profile saved! 🎉');
            location.href = './dashboard.html';
        }
    </script>
</body>
</html>

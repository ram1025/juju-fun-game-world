<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numbers 1-20 - Juju Fun World</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #3B82F6;
            min-height: 100vh;
            padding: 20px;
        }
      .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
      .back-btn {
            background: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            font-size: 24px;
            font-weight: 900;
            cursor: pointer;
        }
      .header-title {
            font-size: 28px;
            font-weight: 900;
            color: white;
        }
      .container {
            background: white;
            padding: 25px 20px;
            border-radius: 30px;
            max-width: 400px;
            margin: 0 auto;
        }
      .title {
            font-size: 28px;
            font-weight: 900;
            color: #3B82F6;
            text-align: center;
            margin-bottom: 20px;
      }
      .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
      .num-btn {
            aspect-ratio: 1;
            background: white;
            border: 3px solid #3B82F6;
            border-radius: 15px;
            font-size: 28px;
            font-weight: 900;
            color: #3B82F6;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
      .num-btn:active {
            transform: scale(0.9);
            background: #3B82F6;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="location.href='./dashboard.html'">←</button>
        <div class="header-title">Numbers 1-20</div>
    </div>

    <div class="container">
        <div class="title">Numbers 1-20</div>
        <div class="grid" id="numbersGrid"></div>
    </div>

    <script>
        const grid = document.getElementById('numbersGrid');
        for(let i = 1; i <= 20; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.textContent = i;
            btn.onclick = () => playSound(i);
            grid.appendChild(btn);
        }

        function playSound(num) {
            const audio = new Audio(`./assets/audio/number-${num}.mp3`);
            audio.play().catch(e => console.log('Audio error:', e));
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numbers - Juju Fun World</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Nunito',sans-serif;background:#3B82F6;min-height:100vh;padding:20px}
        .back-btn{background:#fff;color:#F97316;border:none;padding:10px 20px;border-radius:15px;font-weight:800;font-size:16px;margin-bottom:20px;cursor:pointer}
        .container{background:#fff;padding:20px;border-radius:30px;max-width:400px;margin:0 auto}
        h1{color:#2563EB;font-weight:900;font-size:32px;text-align:center;margin-bottom:20px}
        h1 span{background:#DBEAFE;color:#3B82F6;padding:4px 8px;border-radius:8px;font-size:18px;margin-left:8px}
        .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
        .num-box{background:#DBEAFE;border:3px solid #93C5FD;border-radius:15px;padding:20px;text-align:center;cursor:pointer;transition:all .2s}
        .num-box:active{transform:scale(.95);background:#BFDBFE}
        .num{color:#1D4ED8;font-weight:900;font-size:28px}
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='./dashboard.html'">← Back</button>
    <div class="container">
        <h1>Numbers 1-20 <span>1 2<br>3 4</span></h1>
        <div class="grid" id="numGrid"></div>
    </div>

    <script>
        const grid = document.getElementById('numGrid');
        
        function speak(text){
            if('speechSynthesis' in window){
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.rate = 0.9;
                msg.pitch = 1.2;
                window.speechSynthesis.speak(msg);
            }
        }

        for(let i=1; i<=20; i++){
            const box = document.createElement('div');
            box.className = 'num-box';
            box.innerHTML = `<div class="num">${i}</div>`;
            box.onclick = () => speak(i.toString());
            grid.appendChild(box);
        }
    </script>
</body>
</html>

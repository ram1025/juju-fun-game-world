<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juju Fun World</title><link rel="manifest" href="./manifest.json?v=24"><meta name="theme-color" content="#3D8BFF">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#3D8BFF;font-family:'Nunito',sans-serif;overflow:hidden}

/* 1. SPLASH */
#splash{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#3D8BFF; /* Image Blue */
  display:flex;justify-content:center;align-items:center;
  z-index:9999;animation:fadeOut 0.5s 2.2s forwards
}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}

.squircle{
  width:260px;height:260px;
  background: #C49FFF; /* Image Purple */
  border-radius: 32%; /* Squircle shape - square kadu, blob kadu */
  display:flex;justify-content:center;align-items:center;
  box-shadow: 0 30px 70px rgba(0,0,0,0.25), inset 0 10px 25px rgba(255,255,255,0.35);
  animation:zoomIn 1s ease-out, float 2.5s ease-in-out infinite 1s
}
@keyframes zoomIn{0%{transform:scale(0.3)}100%{transform:scale(1)}}
@keyframes float {0%,100%{transform: translateY(0px)}50%{transform: translateY(-15px)}}
.logo{width:200px; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.2));}

/* 2. WELCOME NOTE PAGE */
#welcome{
  display:none;
  background:#3D8BFF;
  height:100vh;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  text-align:center;
  animation:popIn 0.5s
}
@keyframes popIn{0%{opacity:0}100%{opacity:1}}
#welcome h1{color:#fff;font-size:42px;margin:0;font-weight:900}
#welcome p{color:#E0E7FF;font-size:20px;margin:15px 0 40px;font-weight:700}
.btn{
  background:#fff;color:#3D8BFF;border:none;padding:20px 60px;
  border-radius:25px;font-size:22px;font-weight:900;cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,0.2)
}
</style>
</head>
<body>

<!-- 1. SPLASH SCREEN -->
<div id="splash">
  <div class="squircle">
    <img src="./icon-512.png" class="logo">
  </div>
</div>

<!-- 2. WELCOME NOTE PAGE -->
<div id="welcome">
  <h1 id="welcomeText">Welcome! 👋</h1>
  <p>Let's Learn & Play</p>
  <button class="btn" onclick="goNext()">Start Adventure! 🎮</button>
</div>

<script>
function loadWelcome(){
 let p = JSON.parse(localStorage.getItem('jujuProfile') || '{}');
 if(p.name){ document.getElementById('welcomeText').innerText = `Welcome ${p.name}! 👋`; }
 
 setTimeout(()=>{
   document.getElementById('welcome').style.display = 'flex';
 }, 2500); 
}

function goNext(){
  let p = JSON.parse(localStorage.getItem('jujuProfile') || '{}');
  if(p.name){ 
    window.location.href = 'dashboard.html';
  } else {
    window.location.href = 'profile.html';
  }
}

loadWelcome();
if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js'); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juju Fun World</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#FF9800">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FFE082 0%, #FF9800 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
      .container {
            background: white; padding: 40px 30px; border-radius: 30px;
            border: 5px solid #FFC107; box-shadow: 0 10px 0 #E65100;
            max-width: 400px; width: 100%; text-align: center;
        }
      .logo { font-size: 80px; margin-bottom: 10px; }
        h1 { color: #E65100; font-weight: 900; font-size: 32px; margin-bottom: 10px; }
        p { color: #666; font-weight: 700; margin-bottom: 25px; font-size: 18px; }
        input {
            width: 100%; padding: 15px; border: 3px solid #FFC107;
            border-radius: 15px; font-size: 18px; font-weight: 700;
            margin-bottom: 15px; font-family: 'Nunito', sans-serif; text-align: center;
        }
      .avatar-upload {
            width: 100px; height: 100px; border-radius: 50%;
            border: 4px dashed #FFC107; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; cursor: pointer; overflow: hidden;
        }
      .avatar-upload img { width: 100%; height: 100%; object-fit: cover; }
      .btn {
            width: 100%; background: #4CAF50; color: white; border: none;
            padding: 18px; border-radius: 15px; font-weight: 900;
            font-size: 20px; cursor: pointer; border: 3px solid #2E7D32;
            box-shadow: 0 6px 0 #1B5E20; margin-bottom: 15px;
        }
      .btn:active { transform: translateY(6px); box-shadow: none; }
      .install-btn {
            background: #FF9800; border-color: #E65100; box-shadow: 0 6px 0 #BF360C;
        }
      .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container" id="welcomeContainer">
        <div class="logo">🦁</div>
        <h1>Juju Fun World</h1>
        <p>What's your name, Cub?</p>

        <div class="avatar-upload" id="avatarUpload">
            <span id="uploadIcon">📷</span>
            <img id="previewImg" class="hidden" alt="Avatar">
        </div>
        <input type="file" id="picInput" accept="image/*" class="hidden">

        <input type="text" id="nameInput" placeholder="Enter your name" maxlength="20">
        <button class="btn" onclick="startGame()">Let's Play!</button>
        <button class="btn install-btn" id="installBtn">📲 Install Juju App</button>
    </div>

    <script>
        // AUTO-LOGIN: Already data unte direct dashboard
        window.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('playerName');
            const savedPic = localStorage.getItem('playerPic');

            if(savedName && savedPic) {
                // Welcome skip chesi direct dashboard
                location.href = './dashboard.html';
                return;
            }
        });

        // PWA Install Logic
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Already installed aa check chey
            if(localStorage.getItem('juju_installed')!== 'true') {
                installBtn.style.display = 'block';
            }
        });

        installBtn.addEventListener('click', async () => {
            if(deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            localStorage.setItem('juju_installed', 'true');
            installBtn.style.display = 'none';
        });

        // Hide install button if already installed
        window.addEventListener('load', () => {
            if(localStorage.getItem('juju_installed') === 'true') {
                installBtn.style.display = 'none';
            }
        });

        // Avatar Upload
        document.getElementById('avatarUpload').onclick = () => {
            document.getElementById('picInput').click();
        };

        document.getElementById('picInput').onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('previewImg').classList.remove('hidden');
                    document.getElementById('uploadIcon').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        // Start Game - Save Profile
        function startGame() {
            const name = document.getElementById('nameInput').value.trim() || 'Cub';
            const picFile = document.getElementById('picInput').files[0];

            localStorage.setItem('playerName', name);

            if(picFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    localStorage.setItem('playerPic', e.target.result);
                    location.href = './dashboard.html';
                };
                reader.readAsDataURL(picFile);
            } else {
                // Default avatar
                localStorage.setItem('playerPic', 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><text y="75" font-size="75">🦁</text></svg>');
                location.href = './dashboard.html';
            }
        }

        // Service Worker
        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js');
        }
    </script>
</body>
</html>

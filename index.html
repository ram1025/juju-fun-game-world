<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juju Fun World</title>
    <link rel="icon" type="image/png" href="./icon-192.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #3B82F6;
            min-height: 100vh; display: flex; align-items: center;
            justify-content: center; padding: 20px;
        }
 .splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #3B82F6; display: flex; align-items: center;
            justify-content: center; z-index: 9999;
            animation: fadeOut 0.5s ease 2s forwards;
        }
 .splash img {
            width: 200px; height: 200px; border-radius: 30px;
            animation: zoomIn 1s ease;
        }
        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }
        
 .container {
            background: #fff; padding: 40px 30px; border-radius: 30px;
            max-width: 400px; width: 100%; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
 .welcome-view { display: none; }
 .login-view { display: none; }
        
 .avatar-bounce {
            width: 140px; height: 140px; border-radius: 50%;
            border: 6px solid #EC4899; margin: 0 auto 20px;
            object-fit: cover; background: #E5E7EB;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            animation: bounce 2s infinite;
        }
        .avatar-bounce img {
    width: 100%; 
    height: 100%; 
    border-radius: 50%; 
    object-fit: cover;
}
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
 .welcome-name {
            font-size: 36px; font-weight: 900; color: #EC4899;
            margin-bottom: 10px;
        }
 .welcome-text {
            font-size: 20px; font-weight: 700; color: #6B7280;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #EC4899; font-weight: 900; font-size: 36px;
            margin-bottom: 10px;
        }
 .subtitle {
            color: #6B7280; font-size: 18px; font-weight: 700;
            margin-bottom: 30px;
        }
        
 .avatar-wrapper {
            position: relative; width: 120px; height: 120px;
            margin: 0 auto 25px;
        }
 .avatar {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid #EC4899; object-fit: cover;
            background: #E5E7EB; display: flex; align-items: center;
            justify-content: center; font-size: 50px;
        }
 .camera-btn {
            position: absolute; bottom: 0; right: 0;
            background: #F97316; color: white; border: 3px solid white;
            width: 40px; height: 40px; border-radius: 50%;
            font-size: 18px; cursor: pointer;
        }
        #fileInput { display: none; }
        
        input {
            width: 100%; padding: 15px; border: 3px solid #E5E7EB;
            border-radius: 15px; font-size: 18px; font-weight: 700;
            font-family: 'Nunito', sans-serif; margin-bottom: 20px;
            text-align: center;
        }
        input:focus {
            outline: none; border-color: #3B82F6;
        }
        
 .btn {
            width: 100%; color: white; border: none; padding: 18px;
            border-radius: 20px; font-size: 20px; font-weight: 900;
            cursor: pointer; margin-bottom: 12px; box-shadow: 0 6px 0 #EA580C;
        }
 .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #EA580C; }
 .install-btn { background: #10B981; box-shadow: 0 6px 0 #059669; display: none; }
 .install-btn:active { box-shadow: 0 3px 0 #059669; }
 .play-btn { background: linear-gradient(135deg, #F97316, #FB923C); }
 .hidden { display: none; }
    </style>
</head>
<body>
    <div class="splash" id="splash">
        <img src="./icon-192.png" alt="Juju">
    </div>

    <div class="container">
        <div class="welcome-view" id="welcomeView">
    <div class="avatar-bounce">
        <img src="./icon-192.png" id="welcomeAvatar" alt="Avatar">
    </div>
    <div class="welcome-name" id="welcomeName">Juju</div>
    <div class="welcome-text">Welcome back! 🎉</div>
    <button class="btn play-btn" onclick="location.href='./dashboard.html'">Touch to Play! 🎮</button>
</div>

        <div class="login-view" id="loginView">
            <h1>🦁 Juju Fun World</h1>
            <p class="subtitle">Let's get started!</p>
            
            <div class="avatar-wrapper">
                <div class="avatar" id="avatarPreview"><img src="./icon-192.png" style="width:100%;height:100%;border-radius:50%;object-fit:cover;"></div>
                <button class="camera-btn" onclick="document.getElementById('fileInput').click()">📷</button>
                <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">
            </div>

            <input type="text" id="nameInput" placeholder="Enter your name" maxlength="20">
            <button class="btn install-btn" id="installBtn">📱 Install Juju App</button>
            <button class="btn play-btn" onclick="saveLogin()">Start Adventure! 🎮</button>
        </div>
    </div>

    <script>
        let currentPic = './icon-192.png';
        let deferredPrompt;

        function isInstalled() {
            return window.matchMedia('(display-mode: standalone)').matches || 
                   window.navigator.standalone === true;
        }

        setTimeout(() => {
            const savedName = localStorage.getItem('jujuName');
            const savedPic = localStorage.getItem('jujuAvatar');
            
            if (savedName) {
                document.getElementById('welcomeView').style.display = 'block';
                document.getElementById('loginView').style.display = 'none';
                document.getElementById('welcomeName').textContent = savedName;
                document.getElementById('welcomeAvatar').src = savedPic || './icon-192.png';
            } else {
                document.getElementById('welcomeView').style.display = 'none';
                document.getElementById('loginView').style.display = 'block';
                if (!isInstalled()) {
                    document.getElementById('installBtn').style.display = 'block';
                }
            }
        }, 2000);

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (!isInstalled()) {
                document.getElementById('installBtn').style.display = 'block';
            }
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if(deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                if(outcome === 'accepted') {
                    document.getElementById('installBtn').style.display = 'none';
                }
            } else {
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                if(isIOS) {
                    alert('iPhone: Share button 📤 → Add to Home Screen');
                } else {
                    alert('Browser Menu ⋮ → Install app');
                }
            }
        });

        window.addEventListener('appinstalled', () => {
            document.getElementById('installBtn').style.display = 'none';
        });

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentPic = e.target.result;
                    document.getElementById('avatarPreview').innerHTML = `<img src="${currentPic}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
                };
                reader.readAsDataURL(file);
            }
        }

        function saveLogin() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) {
                alert('Please enter your name');
                return;
            }
            localStorage.setItem('jujuName', name);
            localStorage.setItem('jujuAvatar', currentPic);
            location.href = './dashboard.html';
        }

        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js');
        }
    </script>
</body>
</html>

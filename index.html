<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juju Fun World</title>
    <link rel="icon" type="image/png" href="./icon-192.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #3B82F6;
            min-height: 100vh; display: flex; align-items: center;
            justify-content: center; padding: 20px;
        }
       /* SPLASH SCREEN */
      .splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #3B82F6; display: flex; align-items: center;
            justify-content: center; z-index: 9999;
            animation: fadeOut 0.5s ease 2s forwards;
        }
      .splash img {
            width: 200px; height: 200px; border-radius: 30px;
            animation: zoomIn 1s ease;
        }
        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }
        
      .container {
            background: #fff; padding: 40px 30px; border-radius: 30px;
            max-width: 400px; width: 100%; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
      .welcome-view { display: none; }
      .login-view { display: none; }
        
      .avatar-bounce {
            width: 140px; height: 140px; border-radius: 50%;
            border: 6px solid #EC4899; margin: 0 auto 20px;
            object-fit: cover; background: #E5E7EB;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
      .welcome-name {
            font-size: 36px; font-weight: 900; color: #EC4899;
            margin-bottom: 10px;
        }
      .welcome-text {
            font-size: 20px; font-weight: 700; color: #6B7280;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #EC4899; font-weight: 900; font-size: 36px;
            margin-bottom: 10px;
        }
      .subtitle {
            color: #6B7280; font-size: 18px; font-weight: 700;
            margin-bottom: 30px;
        }
        
      .avatar-wrapper {
            position: relative; width: 120px; height: 120px;
            margin: 0 auto 25px;
        }
      .avatar {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid #EC4899; object-fit: cover;
            background: #E5E7EB; display: flex; align-items: center;
            justify-content: center; font-size: 50px;
        }
      .camera-btn {
            position: absolute; bottom: 0; right: 0;
            background: #F97316; color: white; border: 3px solid white;
            width: 40px; height: 40px; border-radius: 50%;
            font-size: 18px; cursor: pointer;
        }
        #fileInput { display: none; }
        
        input {
            width: 100%; padding: 15px; border: 3px solid #E5E7EB;
            border-radius: 15px; font-size: 18px; font-weight: 700;
            font-family: 'Nunito', sans-serif; margin-bottom: 20px;
            text-align: center;
        }
        input:focus {
            outline: none; border-color: #3B82F6;
        }
        
      .btn {
            width: 100%; color: white; border: none; padding: 18px;
            border-radius: 20px; font-size: 20px; font-weight: 900;
            cursor: pointer; margin-bottom: 12px; box-shadow: 0 6px 0 #EA580C;
        }
      .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #EA580C; }
      .install-btn { background: #10B981; box-shadow: 0 6px 0 #059669; }
      .install-btn:active { box-shadow: 0 3px 0 #059669; }
      .play-btn { background: linear-gradient(135deg, #F97316, #FB923C); }
      .hidden { display: none; }
    </style>
</head>
<body>
    <!-- SPLASH SCREEN -->
    <div class="splash" id="splash">
        <img src="./icon-512.png" alt="Juju">
    </div>

    <div class="container">
        <!-- Welcome Back View -->
        <div class="welcome-view" id="welcomeView">
            <img src="" class="avatar-bounce" id="welcomeAvatar" alt="Avatar">
            <div class="welcome-name" id="welcomeName">Juju</div>
            <div class="welcome-text">Welcome back! 🎉</div>
            <button class="btn play-btn" onclick="location.href='./dashboard.html'">Let's Play! 🚀</button>
        </div>

        <!-- First Time Login View -->
        <div class="login-view" id="loginView">
            <h1>🦁 Juju Fun World</h1>
            <p class="subtitle">Let's get started!</p>
            
            <div class="avatar-wrapper">
                <div class="avatar" id="avatarPreview">🐒</div>
                <button class="camera-btn" onclick="document.getElementById('fileInput').click()">📷</button>
                <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">
            </div>

            <input type="text" id="nameInput" placeholder="Enter your name" maxlength="20">
            <button class="btn install-btn hidden" id="installBtn">📱 Install Juju App</button>
            <button class="btn play-btn" onclick="saveLogin()">Start Adventure! 🎮</button>
        </div>
    </div>

    <script>
        let currentPic = null;
        let deferredPrompt;

        // Splash + Check login after 2sec
        setTimeout(() => {
            const savedName = localStorage.getItem('playerName');
            const savedPic = localStorage.getItem('playerPic');
            
            if (savedName) {
                // Show welcome view with bounce
                document.getElementById('welcomeView').style.display = 'block';
                document.getElementById('loginView').style.display = 'none';
                document.getElementById('welcomeName').textContent = savedName;
                if (savedPic) document.getElementById('welcomeAvatar').src = savedPic;
            } else {
                // Show login view
                document.getElementById('welcomeView').style.display = 'none';
                document.getElementById('loginView').style.display = 'block';
            }
        }, 2000);

        // PWA Install Logic
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if(localStorage.getItem('juju_installed')!== 'true') {
                document.getElementById('installBtn').classList.remove('hidden');
            }
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if(deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            localStorage.setItem('juju_installed', 'true');
            document.getElementById('installBtn').classList.add('hidden');
        });

        // Preview image
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentPic = e.target.result;
                    document.getElementById('avatarPreview').innerHTML = `<img src="${currentPic}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
                };
                reader.readAsDataURL(file);
            }
        }

        // Save login
        function saveLogin() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) {
                alert('Please enter your name');
                return;
            }
            localStorage.setItem('playerName', name);
            if (currentPic) {
                localStorage.setItem('playerPic', currentPic);
            } else {
                localStorage.setItem('playerPic', 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="50" fill="%23F97316"/%3E%3Ctext x="50" y="65" font-size="50" text-anchor="middle" fill="white"%3E🦁%3C/text%3E%3C/svg%3E');
            }
            location.href = './dashboard.html';
        }

        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js');
        }
    </script>
</body>
</html>

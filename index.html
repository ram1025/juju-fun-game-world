<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juju Fun World</title>
  <link rel="manifest" href="/juju-fun-game-world/manifest.json?v=47">
  <meta name="theme-color" content="#3D8BFF">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    /* All styles same */
  </style>
  <script>
    // 1. SW Register
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/juju-fun-game-world/service-worker.js?v=47')
          .then(reg => console.log('SW Registered:', reg.scope))
          .catch(err => console.log('SW Failed:', err));
      });
    }

    // 2. Pull to refresh
    let startY = 0;
    document.addEventListener('touchstart', e => { startY = e.touches[0].pageY; });
    document.addEventListener('touchmove', e => {
      if(startY < 10 && window.scrollY === 0) {
        location.href = '/juju-fun-game-world/index.html?skipSplash=true&v='+Date.now();
      }
    }, {passive:false});
  </script>
</head>
<body>
  <div id="splash"><div class="squircle"><img src="./icon-512.png" class="logo"></div></div>
  <div id="welcome">
    <div class="card">
      <img id="welcomeLogo" src="./icon-512.png" onclick="goDashboard()">
      <h2 id="welcomeName">JUJU</h2>
      <p>Let's get started!</p>
      <button class="btn btn-orange" onclick="goDashboard()">Start Adventure! 🎮</button>
      <button class="btn btn-blue" id="installBtn" style="display:none">📲 Install App</button>
    </div>
  </div>
  <script>
    let deferredPrompt;

    function loadWelcome(){
      const urlParams = new URLSearchParams(window.location.search);
      const skipSplash = urlParams.get('skipSplash');

      if(skipSplash !== 'true'){
        localStorage.removeItem('lastDashboardPage');
      }

      let p = JSON.parse(localStorage.getItem('jujuProfile') || '{}');
      if(p && p.name){
        document.getElementById('welcomeName').innerText = p.name;
        document.getElementById('welcomeLogo').src = p.image || './icon-512.png';
      }

      if(skipSplash === 'true'){
        goDashboard();
      } else {
        setTimeout(()=>{
          document.getElementById('splash').style.display = 'none';
          document.getElementById('welcome').style.display = 'flex';
        }, 1200);
      }
    }

    function goDashboard(){
      window.location.assign('./dashboard.html');
    }

    // Install button
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').style.display = 'flex';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        document.getElementById('installBtn').style.display = 'none';
      }
    });

    loadWelcome();
  </script>
</body>
</html>

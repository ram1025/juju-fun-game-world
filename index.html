<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Juju Fun World</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #3B82F6, #8B5CF6); 
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #fff;
            padding: 15px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .header img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid #EC4899;
            object-fit: cover;
        }
        
        .header-info h2 {
            color: #EC4899;
            font-size: 20px;
            font-weight: 900;
        }
        
        .header-info p {
            color: #6B7280;
            font-size: 14px;
            font-weight: 700;
        }
        
        .profile-btn {
            margin-left: auto;
            background: #3B82F6;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .game-card {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .game-card:active {
            transform: scale(0.95);
        }
        
        .game-card .emoji {
            font-size: 50px;
            margin-bottom: 10px;
        }
        
        .game-card h3 {
            color: #EC4899;
            font-weight: 900;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img id="dashAvatar" src="./icon-192.png" alt="Avatar">
        <div class="header-info">
            <h2 id="dashName">Welcome Toddler! 🐒</h2>
            <p>Let's Play & Learn 🎨</p>
        </div>
        <button class="profile-btn" onclick="location.href='./profile.html'">👤 Profile</button>
    </div>
    
    <div class="games-grid">
        <div class="game-card" onclick="alert('Paint Letters Coming Soon! 🎨')">
            <div class="emoji">🎨</div>
            <h3>Paint Letters</h3>
        </div>
        <div class="game-card" onclick="alert('Draw & Learn Coming Soon! ✏️')">
            <div class="emoji">✏️</div>
            <h3>Draw & Learn</h3>
        </div>
        <div class="game-card" onclick="alert('Memory Game Coming Soon! 🧠')">
            <div class="emoji">🧠</div>
            <h3>Memory Game</h3>
        </div>
        <div class="game-card" onclick="alert('Counting Coming Soon! 🔢')">
            <div class="emoji">🔢</div>
            <h3>Counting</h3>
        </div>
    </div>
    
    <script>
        // Load saved user data
        const savedName = localStorage.getItem('jujuName') || 'Toddler! 🐒';
        const savedPic = localStorage.getItem('jujuAvatar') || './icon-192.png';
        
        document.getElementById('dashName').textContent = savedName;
        document.getElementById('dashAvatar').src = savedPic;
        
        // Register SW
        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js');
        }
    </script>
</body>
</html>

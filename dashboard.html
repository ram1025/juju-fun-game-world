<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dashboard - Juju Fun World</title>
<link rel="manifest" href="./manifest.json?v=144">
<meta name="theme-color" content="#3B82F6">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;background:#3B82F6;min-height:100vh;padding:20px;overflow-x:hidden}
.hamburger{position:fixed;top:20px;left:20px;background:#fff;border:0;border-radius:12px;padding:12px;box-shadow:0 4px 10px rgba(0,0,0,.2);cursor:pointer;z-index:100}
.hamburger span{display:block;width:25px;height:3px;background:#1F2937;margin:5px 0;border-radius:2px}
.sidebar{position:fixed;top:0;left:0;width:280px;height:100%;background:#fff;box-shadow:4px 0 20px rgba(0,0,0,.3);transform:translateX(-100%);transition:transform.3s;z-index:99;padding:80px 20px 20px}
.sidebar.active{transform:translateX(0)}
.sidebar-btn{width:100%;text-align:left;padding:15px;border:0;background:#F3F4F6;border-radius:12px;font-size:18px;font-weight:800;margin-bottom:10px;cursor:pointer;font-family:Nunito}
.profile-section{text-align:center;padding:40px 20px 20px}
.avatar{width:80px;height:80px;border-radius:50%;border:3px solid #fff;margin:0 auto 15px;object-fit:cover}
.name{font-size:24px;font-weight:900;color:#fff;margin-bottom:5px}
.sub{font-size:18px;font-weight:700;color:#FEF3C7;margin-bottom:15px}

.carousel-wrapper{max-width:450px;margin:0 auto;overflow:hidden}
.carousel-track{display:flex}
.carousel-page{width:100%;flex-shrink:0;padding:0 5px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}

.card{border-radius:25px;padding:25px 15px;text-align:center;cursor:pointer;box-shadow:0 6px 15px rgba(0,0,0,.2);min-height:140px;display:flex;flex-direction:column;justify-content:center;user-select:none}
.card:active{transform:scale(.95)}
.card-icon{width:60px;height:60px;background:rgba(255,255,255,.3);border-radius:15px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:32px;pointer-events:none}
.card-title{font-size:18px;font-weight:900;color:#fff;pointer-events:none}
.pink{background:linear-gradient(135deg,#EC4899,#F472B6)}
.blue{background:linear-gradient(135deg,#3B82F6,#60A5FA)}
.orange{background:linear-gradient(135deg,#F97316,#FB923C)}
.purple{background:linear-gradient(135deg,#A855F7,#C084FC)}
.green{background:linear-gradient(135deg,#10B981,#34D399)}
.yellow{background:linear-gradient(135deg,#F59E0B,#FBBF24)}
.violet{background:linear-gradient(135deg,#8B5CF6,#A78BFA)}
.grey{background:linear-gradient(135deg,#6B7280,#9CA3AF)}

.dots{display:flex;gap:8px;justify-content:center;margin-top:20px}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.4);transition:all.3s}
.dot.active{background:#fff;transform:scale(1.2)}
</style>
</head>
<body>
  <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span></button>
  <div class="sidebar" id="sidebar">
    <button class="sidebar-btn" onclick="location.href='./profile.html'">👤 Profile</button>
    <button class="sidebar-btn" id="logoutBtn" style="color:#EF4444;">🚪 Logout</button>
  </div>
  <div class="profile-section">
    <img src="./icon-192.png?v=144" class="avatar" id="avatar">
    <div class="name" id="name">JUJU</div>
    <div class="sub">Swipe Left/Right 👉</div>

    <div class="carousel-wrapper" id="carousel">
      <div class="carousel-track" id="track">

        <!-- ===== SLIDE 1: A B C D ===== -->
        <div class="carousel-page"><div class="grid">
          <div class="card blue" onclick="location.href='./alphabets.html'"><div class="card-icon">abc</div><div class="card-title">Alphabets</div></div>
          <div class="card yellow" onclick="location.href='./body-parts.html'"><div class="card-icon">👂</div><div class="card-title">Body Parts</div></div>
          <div class="card green" onclick="location.href='./colors.html'"><div class="card-icon">🎨</div><div class="card-title">Colors</div></div>
          <div class="card purple" onclick="location.href='./color-mixing.html'"><div class="card-icon">🧪</div><div class="card-title">Color Mix</div></div>
        </div></div>

        <!-- ===== SLIDE 2: D F M N ===== -->
        <div class="carousel-page"><div class="grid">
          <div class="card pink" onclick="location.href='./drag-drop.html'"><div class="card-icon">🖐️</div><div class="card-title">Drag & Drop</div></div>
          <div class="card orange" onclick="location.href='./fruits.html'"><div class="card-icon">🍎</div><div class="card-title">Fruits</div></div>
          <div class="card green" onclick="location.href='./matching.html'"><div class="card-icon">🧩</div><div class="card-title">Matching</div></div>
          <div class="card green" onclick="location.href='./numbers.html'"><div class="card-icon">🔢</div><div class="card-title">Numbers</div></div>
        </div></div>

        <!-- ===== SLIDE 3: P R S V ===== -->
        <div class="carousel-page"><div class="grid">
          <div class="card pink" onclick="location.href='./painting.html'"><div class="card-icon">🎨</div><div class="card-title">Paint Letter</div></div>
          <div class="card purple" onclick="location.href='./pet-animals.html'"><div class="card-icon">🐶</div><div class="card-title">Pet Animals</div></div>
          <div class="card purple" onclick="location.href='./rhymes.html'"><div class="card-icon">🎵</div><div class="card-title">Rhymes</div></div>
          <div class="card yellow" onclick="location.href='./shapes.html'"><div class="card-icon">⭐</div><div class="card-title">Shapes</div></div>
        </div></div>

        <!-- ===== SLIDE 4: V W A ===== -->
        <div class="carousel-page"><div class="grid">
          <div class="card blue" onclick="location.href='./vehicles.html'"><div class="card-icon">🚗</div><div class="card-title">Vehicles</div></div>
          <div class="card purple" onclick="location.href='./vegetables.html'"><div class="card-icon">🥕</div><div class="card-title">Vegetables</div></div>
          <div class="card orange" onclick="location.href='./wild-animals.html'"><div class="card-icon">🦁</div><div class="card-title">Wild Animals</div></div>
          <div class="card pink" onclick="location.href='./addition.html'"><div class="card-icon">➕</div><div class="card-title">Addition</div></div>
        </div></div>

        <!-- ===== SLIDE 5: F F C ===== -->
<div class="carousel-page"><div class="grid">
  <div class="card pink" onclick="location.href='./free-draw.html?v=172'"><div class="card-icon">🎨</div><div class="card-title">Free Draw</div></div>
<div class="card violet" onclick="location.href='./spell-it.html?v=173'"><div class="card-icon">🧩</div><div class="card-title">Spell It!</div></div>
  <div class="card violet" onclick="location.href='./shape-studio.html?v=173'"><div class="card-icon">🎨</div><div class="card-title">Shape Studio</div></div>
  <div class="card grey"><div class="card-icon">🔒</div><div class="card-title">Coming Soon</div></div>
</div></div>

      </div>
    </div>
    <div class="dots" id="dots"></div>
  </div>
<script>
  if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js?v=11-2');}
  document.getElementById('name').textContent=localStorage.getItem('jujuName')||'JUJU';
  document.getElementById('avatar').src=localStorage.getItem('jujuAvatar')||'./icon-192.png';
  function toggleSidebar(){document.getElementById('sidebar').classList.toggle('active')}
  document.addEventListener('click',(e)=>{const s=document.getElementById('sidebar');const h=document.querySelector('.hamburger');if(!s.contains(e.target)&&!h.contains(e.target)){s.classList.remove('active')}})

  document.getElementById('logoutBtn').onclick=()=>{ location.href='./index.html'; }

  const track=document.getElementById('track');
  const pages=document.querySelectorAll('.carousel-page');
  const wrapper=document.getElementById('carousel');
  const dotsWrap=document.getElementById('dots');
  let currentPage=0,startX=0,isDragging=false;

  pages.forEach((_,i)=>{const dot=document.createElement('div');dot.className='dot';dot.onclick=()=>goToPage(i);dotsWrap.appendChild(dot);});
  const dots=document.querySelectorAll('.dot');

  function goToPage(i){
    currentPage=i;
    localStorage.setItem('jujuLastPage',i);
    track.style.transition='transform 0.3s ease-out';
    track.style.transform=`translateX(-${i*100}%)`;
    dots.forEach((d,j)=>d.classList.toggle('active',i===j));
  }

  window.addEventListener('load',()=>{
    const goToSlide = parseInt(localStorage.getItem('jujuGoToSlide'));
    const lastPage = isNaN(goToSlide)? (parseInt(localStorage.getItem('jujuLastPage'))||0) : goToSlide;
    goToPage(lastPage);
    localStorage.removeItem('jujuGoToSlide');
  });

  const getX=e=>e.touches?e.touches[0].clientX:e.clientX;
  wrapper.addEventListener('touchstart',e=>{startX=getX(e);isDragging=true;track.style.transition='none';},{passive:true});
  wrapper.addEventListener('touchmove',e=>{if(!isDragging)return;const x=getX(e)-startX;track.style.transform=`translateX(calc(-${currentPage*100}% + ${x}px))`;},{passive:true});
  wrapper.addEventListener('touchend',e=>{if(!isDragging)return;isDragging=false;const x=e.changedTouches[0].clientX-startX;if(x<-50&&currentPage<pages.length-1)goToPage(currentPage+1);else if(x>50&&currentPage>0)goToPage(currentPage-1);else goToPage(currentPage);});
// ===== DESKTOP MOUSE + KEYBOARD =====
wrapper.addEventListener('mousedown',e=>{startX=getX(e);isDragging=true;track.style.transition='none';e.preventDefault()});
wrapper.addEventListener('mousemove',e=>{if(!isDragging)return;const x=getX(e)-startX;track.style.transform=`translateX(calc(-${currentPage*100}% + ${x}px))`});
wrapper.addEventListener('mouseup',e=>{if(!isDragging)return;isDragging=false;track.style.transition='transform 0.3s ease';const x=getX(e)-startX;if(x<-50&&currentPage<pages.length-1)goToPage(currentPage+1);else if(x>50&&currentPage>0)goToPage(currentPage-1);else goToPage(currentPage)});
wrapper.addEventListener('mouseleave',()=>{if(isDragging){isDragging=false;goToPage(currentPage)}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'&&currentPage<pages.length-1)goToPage(currentPage+1);if(e.key==='ArrowLeft'&&currentPage>0)goToPage(currentPage-1)});

</script>
</body>
</html>

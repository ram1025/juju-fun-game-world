<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JUJU Dashboard</title><link rel="manifest" href="./manifest.json?v=44"><meta name="theme-color" content="#3B82F6">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#3B82F6;font-family:'Nunito',sans-serif;color:#fff;min-height:100vh;padding:20px;overflow-x:hidden}
.header{display:flex;justify-content:flex-start;align-items:center;margin-bottom:10px;max-width:400px;margin:0 auto 10px}
.menu{background:#fff;border:0;border-radius:12px;padding:10px 14px;font-size:24px;font-weight:900;color:#1e40af;cursor:pointer;z-index:10}
.sidemenu{position:fixed;top:0;left:-280px;width:280px;height:100%;background:#fff;box-shadow:2px 0 20px rgba(0,0,0,.3);transition:.3s;z-index:100;padding:20px;display:flex;flex-direction:column}
.sidemenu.active{left:0}.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;z-index:99}
.overlay.active{display:block}.sidemenu h2{color:#1e40af;font-size:24px;font-weight:900;margin-bottom:30px;text-align:center}
.menu-btn{background:#3B82F6;color:#fff;border:0;padding:15px;border-radius:12px;font-size:18px;font-weight:800;cursor:pointer;margin-bottom:12px;text-align:left;width:100%}
.logout-btn{background:#EF4444;color:#fff;border:0;padding:15px;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;margin-top:auto;width:100%}
.profile-img{width:100px;height:100px;border-radius:50%;border:5px solid #fff;margin:0 auto 15px;display:block;object-fit:cover;background:#E5E7EB}
h1{text-align:center;font-size:32px;font-weight:900;margin-bottom:5px}
.sub{text-align:center;font-size:18px;margin-bottom:25px;color:#FEF9C3;font-weight:800}
.slider{display:flex;overflow-x:scroll;scroll-snap-type:x mandatory;scroll-behavior:auto;-webkit-overflow-scrolling: touch;gap:0;padding:0;max-width:100%;margin:0 auto}
.slider::-webkit-scrollbar{display:none}
.page{min-width:100%;scroll-snap-align:start;flex-shrink:0;display:grid;grid-template-columns:repeat(2,1fr);gap:20px;padding:0 10px 20px}
.card{background:#fff;padding:30px 15px;border-radius:30px;text-align:center;cursor:pointer;font-weight:900;font-size:18px;color:#1e293b;box-shadow:0 10px 25px rgba(0,0,0,.2);transition:.2s;min-height:150px;display:flex;flex-direction:column;justify-content:center}
.card:active{transform:scale(0.95)}.card.icon{width:80px;height:80px;background:rgba(255,255,255,.3);border-radius:25px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:45px;font-weight:900}
.card.locked{background:#64748B;color:#fff;cursor:not-allowed;opacity:0.8}.card.locked:active{transform:scale(1)}
.dots{display:flex;justify-content:center;gap:8px;margin-top:15px}.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.4);transition:.3s}
.dot.active{background:#fff;width:20px;border-radius:5px}
.pink{background:#EC4899;color:#fff}.blue{background:#3B82F6;color:#fff}.orange{background:#F97316;color:#fff}
.purple{background:#A855F7;color:#fff}.green{background:#22C55E;color:#fff}.yellow{background:#FACC15;color:#1e293b}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeMenu()"></div>
<div class="sidemenu" id="sidemenu">
  <h2>Menu</h2>
  <button class="menu-btn" onclick="location.href='./profile.html'">👤 Profile</button>
  <button class="menu-btn" onclick="exitApp()">🚪 Exit App</button>
  <button class="logout-btn" onclick="logout()">🚪 Logout</button>
</div>
<div class="header"><button class="menu" onclick="openMenu()">≡</button></div>
<img src="./icon-192.png" class="profile-img" id="profilePic">
<h1 id="profileName">JU</h1>
<p class="sub">Choose Your Adventure! 🎮</p>
<div class="slider" id="slider"></div>
<div class="dots" id="dots"></div>
<script>
function openMenu(){document.getElementById('sidemenu').classList.add('active');document.getElementById('overlay').classList.add('active')}
function closeMenu(){document.getElementById('sidemenu').classList.remove('active');document.getElementById('overlay').classList.remove('active')}
function logout(){
  localStorage.removeItem('lastDashboardPage');
  history.replaceState({page:0},'',location.href);
  alert('Logged out! 👋');
  location.href='./index.html?skipSplash=true&v='+Date.now();
}

function exitApp(){
  closeMenu();
  
  // PWA ayithe close cheyyadaniki try
  if (window.matchMedia('(display-mode: standalone)').matches) {
    window.close();
  }
  
  // Browser ayithe history anni clear chesi bayataki
  setTimeout(()=>{
    history.go(-(history.length));
    location.href = 'about:blank';
  }, 100);
  }

const allGames = [
{name:"Addition",file:"./addition.html",icon:"➕",color:"pink"},{name:"Alphabets",file:"./alphabets.html",icon:"abc",color:"blue"},
{name:"Balloon Pop Edu",file:"./balloon-pop-edu.html",icon:"🎈",color:"orange"},{name:"Body Parts",file:"./body-parts.html",icon:"👂",color:"yellow"},
{name:"Juju Car Race",file:"./juju-car-race.html",icon:"🚗",color:"purple"},{name:"Color Mixing",file:"./color-mixing.html",icon:"🧪",color:"purple"},
{name:"Colors",file:"./colors.html",icon:"🎨",color:"green"},{name:"Drag & Drop",file:"./drag-drop.html",icon:"✋",color:"pink"},
{name:"Free Draw",file:"./free-draw.html",icon:"🐒",color:"purple"},{name:"Fruits",file:"./fruits.html",icon:"🍎",color:"orange"},
{name:"Matching",file:"./matching.html",icon:"🧩",color:"green"},{name:"Numbers",file:"./numbers.html",icon:"123",color:"blue"},
{name:"Paint Letter",file:"./painting.html",icon:"🎨",color:"pink"},{name:"Pet Animals",file:"./pet-animals.html",icon:"🐶",color:"purple"},
{name:"Rhymes",file:"./rhymes.html",icon:"🎵",color:"purple"},{name:"Shapes",file:"./shapes.html",icon:"⭐",color:"yellow"},
{name:"Spell It",file:"./spell-it.html",icon:"🧩",color:"blue"},{name:"Temple Run",file:"./temple-run.html",icon:"🏃",color:"blue"},
{name:"Vehicles",file:"./vehicles.html",icon:"🚗",color:"blue"},{name:"Vegetables",file:"./vegetables.html",icon:"🥕",color:"purple"},
{name:"Wild Animals",file:"./wild-animals.html",icon:"🦁",color:"orange"},
{name:"Coming Soon",file:"#",icon:"🔒",color:"locked"},{name:"Coming Soon",file:"#",icon:"🔒",color:"locked"},{name:"Coming Soon",file:"#",icon:"🔒",color:"locked"}
];

let currentPage = 0;
let slider;

function getSavedPage(){
  return parseInt(history.state?.page ?? localStorage.getItem('lastDashboardPage') ?? 0);
}

function goToPage(page, smooth=false){
  if(!slider) return;
  const sliderWidth = slider.offsetWidth;
  slider.scrollTo({left: page * sliderWidth, behavior: smooth ? 'smooth' : 'auto'});
  currentPage = page;
  updateDots();
}

function updateDots(){
  document.querySelectorAll('.dot').forEach((d,i)=>{ d.classList.toggle('active', i===currentPage) })
}

function savePage(page){
  currentPage = page;
  localStorage.setItem('lastDashboardPage', page);
  history.replaceState({page:page},'',location.href);
}

function loadGames(){
 slider = document.getElementById('slider'); slider.innerHTML = '';
 for(let i=0; i<allGames.length; i+=4){
   let page = '<div class="page">';
   allGames.slice(i,i+4).forEach(g=>{
    if(g.file === "#"){page += `<div class="card ${g.color}"><div class="icon">${g.icon}</div>${g.name}</div>`}
    else {page += `<div class="card ${g.color}" onclick="openGame('${g.file}')"><div class="icon">${g.icon}</div>${g.name}</div>`}
   })
   page += '</div>'; slider.innerHTML += page;
 }
 createDots();
 
 // Immediate restore without animation
 requestAnimationFrame(()=>{
   const saved = getSavedPage();
   goToPage(saved, false);
 });
}

function openGame(file){
 if(file === "#"){ alert('Coming Soon! 🚀'); return; }
 const sliderWidth = slider.offsetWidth;
 const page = Math.round(slider.scrollLeft / sliderWidth);
 savePage(page);
 location.href = file;
}

function createDots(){
 const dotsContainer = document.getElementById('dots'); dotsContainer.innerHTML='';
 const pages = document.querySelectorAll('.page');
 pages.forEach((_,i)=>{ 
   const dot = document.createElement('div'); 
   dot.className = 'dot'; 
   dotsContainer.appendChild(dot); 
 })
 updateDots();
 
 slider.addEventListener('scroll', ()=>{ 
   const newPage = Math.round(slider.scrollLeft / slider.offsetWidth);
   if(newPage !== currentPage){
     savePage(newPage);
   }
 })
}

// Profile load
window.addEventListener('DOMContentLoaded', () => {
  let p = JSON.parse(localStorage.getItem('jujuProfile') || '{}');
  document.getElementById('profileName').textContent = p.name || 'JUJU';
  document.getElementById('profilePic').src = p.image || './icon-192.png';
  loadGames();
});

// Handle back/forward button - instant jump
window.addEventListener('pageshow', (event) => {
  setTimeout(()=>{
    const saved = getSavedPage();
    goToPage(saved, false);
  }, 50);
});

if('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js?v=44'); }
</script>
</body>
</html>

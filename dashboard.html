<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Juju Fun World</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #3B82F6;
            min-height: 100vh;
            padding: 20px;
        }
        .hamburger {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 100;
        }
        .hamburger span {
            display: block;
            width: 25px;
            height: 3px;
            background: #1F2937;
            margin: 5px 0;
            border-radius: 2px;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 4px 0 20px rgba(0,0,0,0.3);
            transform: translateX(-100%);
            transition: transform 0.3s;
            z-index: 99;
            padding: 80px 20px 20px;
        }
        .sidebar.active {
            transform: translateX(0);
        }
        .sidebar-btn {
            width: 100%;
            text-align: left;
            padding: 15px;
            border: none;
            background: #F3F4F6;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .profile-section {
            text-align: center;
            padding: 40px 20px 20px;
        }
        .dashboard-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid white;
            margin: 0 auto 15px;
            object-fit: cover;
        }
        .dashboard-name {
            font-size: 24px;
            font-weight: 900;
            color: white;
            margin-bottom: 5px;
        }
        .nick-text {
            font-size: 18px;
            font-weight: 700;
            color: #FEF3C7;
            margin-bottom: 25px;
        }
        .title-text {
            font-size: 28px;
            font-weight: 900;
            color: white;
            text-align: center;
            margin-bottom: 25px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 450px;
            margin: 0 auto;
        }
        .card {
            border-radius: 25px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }
        .card:active {
            transform: scale(0.95);
        }
        .card-icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.3);
            border-radius: 15px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .card-title {
            font-size: 20px;
            font-weight: 900;
            color: white;
        }
        .card-pink {
            background: linear-gradient(135deg, #EC4899, #F472B6);
        }
        .card-blue {
            background: linear-gradient(135deg, #3B82F6, #60A5FA);
        }
        .card-orange {
            background: linear-gradient(135deg, #F97316, #FB923C);
        }
        .card-purple {
            background: linear-gradient(135deg, #A855F7, #C084FC);
        }
    </style>
</head>
<body>
    <button class="hamburger" onclick="toggleSidebar()">
        <span></span><span></span>
    </button>
    <div class="sidebar" id="sidebar">
        <button class="sidebar-btn" onclick="location.href='./profile.html'">👤 Profile</button>
        <button class="sidebar-btn" onclick="exitApp()" style="color:#EF4444;">🚪 Exit App</button>
    </div>
    <div class="profile-section">
        <img src="./icon-192.png" class="dashboard-avatar" id="dashboardAvatar">
        <div class="dashboard-name" id="dashboardName">JUJU</div>
        <div class="nick-text">Choose Your Adventure! 🎮</div>
        <div class="grid">
    <div class="card card-pink" onclick="location.href='./alphabets.html'">
        <div class="card-icon">abc</div>
        <div class="card-title">Alphabets</div>
    </div>

    <div class="card card-blue" onclick="location.href='./numbers.html'">
        <div class="card-icon">123</div>
        <div class="card-title">Numbers</div>
    </div>
            
<div class="card card-orange" onclick="location.href='./painting.html'">
    <div class="card-icon">🎨</div>
    <div class="card-title">Paint Letter</div>
</div>
            
    <div class="card card-purple" onclick="location.href='./free-draw.html'">
        <div class="card-icon">🐒</div>
        <div class="card-title">Free Draw</div>
    </div>
        
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const savedPic = localStorage.getItem('jujuAvatar') || './icon-192.png';
            const savedName = localStorage.getItem('jujuName') || 'JUJU';

            document.getElementById('dashboardAvatar').src = savedPic;
            document.getElementById('dashboardName').textContent = savedName;
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const hamburger = document.querySelector('.hamburger');
            if(!sidebar.contains(e.target) && !hamburger.contains(e.target)) {
                sidebar.classList.remove('active');
            }
        });
        function logout() {
    localStorage.removeItem('jujuLoggedIn');
    location.href = './index.html';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JU Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  font-family:'Nunito',sans-serif;
  color:#fff;
  min-height:100vh;
  padding:20px;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.back{
  background:#fff;
  color:#1e40af;
  border:0;
  border-radius:12px;
  padding:10px 20px;
  font-weight:900;
  text-decoration:none;
  font-size:16px;
}
h1{
  text-align:center;
  color:#fbbf24;
  font-size:32px;
  margin-bottom:30px;
  font-weight:900;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
  max-width:600px;
  margin:0 auto;
}
.card{
  background:#1e293b;
  padding:30px 20px;
  border-radius:20px;
  text-align:center;
  cursor:pointer;
  font-weight:900;
  font-size:18px;
  transition:.3s;
  border:3px solid #334155;
  box-shadow:0 8px 20px rgba(0,0,0,.3);
}
.card:hover{
  background:#334155;
  transform:translateY(-5px);
  border-color:#fbbf24;
}
.card .icon{font-size:40px;display:block;margin-bottom:8px}
</style>
</head>
<body>
<div class="header">
  <a href="./index.html" class="back">← Home</a>
</div>

<h1>🎮 Choose a Game</h1>

<div class="grid">
  <div class="card" onclick="location.href='./addition.html'">
    <span class="icon">➕</span>
    Addition
  </div>
  <div class="card" onclick="location.href='./alphabets.html'">
    <span class="icon">🔤</span>
    Alphabets
  </div>
  <div class="card" onclick="location.href='./balloon-pop-edu.html'">
    <span class="icon">🎈</span>
    Balloon Pop
  </div>
  <div class="card" onclick="location.href='./body-parts.html'">
    <span class="icon">👦</span>
    Body Parts
  </div>
  <div class="card" onclick="location.href='./colors.html'">
    <span class="icon">🎨</span>
    Colors
  </div>
  <div class="card" onclick="location.href='./free-draw.html'">
    <span class="icon">🖌️</span>
    Free Draw
  </div>
  <div class="card" onclick="location.href='./fruits.html'">
    <span class="icon">🍎</span>
    Fruits
  </div>
  <div class="card" onclick="location.href='./juju-car-race.html'">
    <span class="icon">🏎️</span>
    Coin Collector
  </div>
  <div class="card" onclick="location.href='./matching.html'">
    <span class="icon">🧩</span>
    Matching
  </div>
  <div class="card" onclick="location.href='./numbers.html'">
    <span class="icon">🔢</span>
    Numbers
  </div>
  <div class="card" onclick="location.href='./painting.html'">
    <span class="icon">🎨</span>
    Painting
  </div>
  <div class="card" onclick="location.href='./rhymes.html'">
    <span class="icon">🎵</span>
    Rhymes
  </div>
  <div class="card" onclick="location.href='./shapes.html'">
    <span class="icon">🔷</span>
    Shapes
  </div>
  <div class="card" onclick="location.href='./temple-run.html'">
    <span class="icon">🏃</span>
    Temple Run
  </div>
  <div class="card" onclick="location.href='./vegetables.html'">
    <span class="icon">🥦</span>
    Vegetables
  </div>
  <div class="card" onclick="location.href='./vehicles.html'">
    <span class="icon">🚗</span>
    Vehicles
  </div>
</div>

</body>
</html>

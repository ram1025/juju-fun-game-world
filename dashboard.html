<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Juju Fun World</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#FF9800">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FFE082 0%, #FF9800 100%);
            min-height: 100vh; padding: 20px;
        }
      .header {
            background: white; padding: 20px; border-radius: 25px;
            border: 4px solid #FFC107; box-shadow: 0 6px 0 #E65100;
            margin-bottom: 30px; text-align: center;
        }
      .avatar {
            width: 80px; height: 80px; border-radius: 50%;
            border: 4px solid #FFC107; margin: 0 auto 10px;
            object-fit: cover;
        }
      .welcome-text { font-size: 24px; font-weight: 900; color: #E65100; }
      .grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
            max-width: 500px; margin: 0 auto;
        }
      .card {
            background: white; border-radius: 25px; border: 4px solid #FFC107;
            box-shadow: 0 8px 0 #E65100; padding: 30px 15px; text-align: center;
            cursor: pointer; transition: all 0.2s;
        }
      .card:active { transform: translateY(8px); box-shadow: none; }
      .card-emoji { font-size: 60px; margin-bottom: 10px; }
      .card-title { font-size: 20px; font-weight: 900; color: #E65100; }
      .profile-btn {
            position: fixed; top: 20px; right: 20px;
            background: white; border: 3px solid #FFC107;
            border-radius: 50%; width: 50px; height: 50px;
            font-size: 24px; cursor: pointer; box-shadow: 0 4px 0 #E65100;
        }
      .profile-btn:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>
    <button class="profile-btn" onclick="location.href='./profile.html'">👤</button>

    <div class="header">
        <img src="" class="avatar" id="avatarImg" alt="Avatar">
        <div class="welcome-text" id="welcomeText">Welcome Cub!</div>
    </div>

    <div class="grid">
        <!-- OLD ICONS REMOVE CHESAM - IVI MATRAMAE UNCHU -->
        <div class="card" onclick="location.href='./abc.html'">
            <div class="card-emoji">🔤</div>
            <div class="card-title">Alphabets</div>
        </div>
        <div class="card" onclick="location.href='./numbers.html'">
            <div class="card-emoji">🔢</div>
            <div class="card-title">Numbers</div>
        </div>
        <div class="card" onclick="location.href='./painting.html'">
            <div class="card-emoji">🎨</div>
            <div class="card-title">Paint A-Z</div>
        </div>
        <div class="card" onclick="location.href='./unko.html'">
            <div class="card-emoji">✏️</div>
            <div class="card-title">Unko Draw</div>
        </div>
    </div>

    <script>
        // Load profile data from localStorage
        window.addEventListener('load', () => {
            const name = localStorage.getItem('playerName') || 'Cub';
            const pic = localStorage.getItem('playerPic');

            document.getElementById('welcomeText').textContent = `Welcome ${name}!`;
            if(pic) {
                document.getElementById('avatarImg').src = pic;
            } else {
                document.getElementById('avatarImg').src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><text y="60" font-size="60">🦁</text></svg>';
            }
        });

        // Back button tho vachina kuda update chey
        window.addEventListener('pageshow', () => {
            const name = localStorage.getItem('playerName') || 'Cub';
            const pic = localStorage.getItem('playerPic');
            document.getElementById('welcomeText').textContent = `Welcome ${name}!`;
            if(pic) document.getElementById('avatarImg').src = pic;
        });
    </script>
</body>
</html>

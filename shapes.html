<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shapes - Juju Fun World</title>
<link rel="manifest" href="./manifest.json?v=143">
<meta name="theme-color" content="#3B82F6">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;background:#3B82F6;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center}

 .top-back{width:100%;max-width:450px;margin-bottom:15px}
 .back-btn{background:#fff;border:0;border-radius:15px;padding:12px 20px;font-size:16px;font-weight:800;color:#F97316;cursor:pointer;font-family:Nunito;box-shadow:0 4px 10px rgba(0,0,0,.2)}

 .card-box{background:#FEF3C7;border-radius:30px;padding:25px;width:100%;max-width:450px;box-shadow:0 8px 20px rgba(0,0,0,.2);text-align:center}
 .title{font-size:28px;font-weight:900;color:#F97316;margin-bottom:10px}
 .subtitle{font-size:18px;font-weight:800;color:#1F2937;margin-bottom:5px}
 .instruction{font-size:16px;font-weight:700;color:#92400E;margin-bottom:20px}

 .shape-box{background:#fff;border:3px solid #FBBF24;border-radius:20px;padding:20px;margin-bottom:20px;min-height:280px;display:flex;align-items:center;justify-content:center}
 .shape-svg{width:200px;height:200px}

 .btn-row{display:flex;gap:10px;margin-bottom:15px}
 .btn{flex:1;border:0;border-radius:15px;padding:15px;font-size:16px;font-weight:800;color:#fff;cursor:pointer;font-family:Nunito}
 .btn-red{background:#EF4444}
 .btn-blue{background:#3B82F6}
 .btn-green{background:#10B981}

 .colors{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
 .color{width:45px;height:45px;border-radius:50%;border:3px solid #fff;cursor:pointer;box-shadow:0 3px 6px rgba(0,0,0,.2)}
 .color.active{border:4px solid #1F2937;transform:scale(1.1)}
</style>
</head>
<body>
  <div class="top-back">
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>

  <div class="card-box">
    <div class="title" id="title">1/10: Square</div>
    <div class="subtitle">Color the Shape</div>
    <div class="instruction">Outline lopala matrame rayi ✏️</div>

    <div class="shape-box">
      <svg class="shape-svg" id="shapeSvg" viewBox="0 0 100 100"></svg>
    </div>

    <div class="btn-row">
      <button class="btn btn-red" onclick="clearCanvas()">Clear</button>
      <button class="btn btn-blue" onclick="prevShape()">← Back</button>
      <button class="btn btn-green" onclick="nextShape()">Next →</button>
    </div>

    <div class="colors" id="colors"></div>
  </div>

<script>
  // Shape data with SVG path
  const shapes = [
    {name:'Square', svg:`<rect x="10" y="10" width="80" height="80" fill="none" stroke="#374151" stroke-width="6"/>`},
    {name:'Circle', svg:`<circle cx="50" cy="50" r="40" fill="none" stroke="#374151" stroke-width="6"/>`},
    {name:'Triangle', svg:`<polygon points="50,10 90,90 10,90" fill="none" stroke="#374151" stroke-width="6"/>`},
    {name:'Star', svg:`<polygon points="50,10 61,35 88,35 68,57 79,88 50,70 21,88 32,57 12,35 39,35" fill="none" stroke="#374151" stroke-width="6"/>`},
    {name:'Heart', svg:`<path d="M50,88 C20,65 10,45 25,30 C35,20 50,30 50,30 C50,30 65,20 75,30 C90,45 80,65 50,88" fill="none" stroke="#374151" stroke-width="6"/>`},
    {name:'Rectangle', svg:`<rect x="15" y="25" width="70" height="50" fill="none" stroke="#374151" stroke-width="6"/>`},
    {name:'Diamond', svg:`<polygon points="50,10 90,50 50,90 10,50" fill="none" stroke="#374151" stroke-width="6"/>`},
    {name:'Pentagon', svg:`<polygon points="50,10 90,40 72,90 28,90 10,40" fill="none" stroke="#374151" stroke-width="6"/>`},
    {name:'Hexagon', svg:`<polygon points="50,10 85,30 85,70 50,90 15,70 15,30" fill="none" stroke="#374151" stroke-width="6"/>`},
    {name:'Oval', svg:`<ellipse cx="50" cy="50" rx="35" ry="45" fill="none" stroke="#374151" stroke-width="6"/>`}
  ];

  const colors = ['#EF4444','#F97316','#F59E0B','#EAB308','#10B981','#14B8A6','#3B82F6','#8B5CF6','#A855F7','#EC4899'];
  let currentIndex = 0;
  let selectedColor = colors[0];

  // Load saved slide from dashboard
  function goBack(){
    const lastSlide = localStorage.getItem('jujuLastPage') || 4; // Shapes is 5th slide = index 4
    localStorage.setItem('jujuGoToSlide', lastSlide);
    location.href = './dashboard.html';
  }

  function renderShape(){
    const shape = shapes[currentIndex];
    document.getElementById('title').textContent = `${currentIndex+1}/${shapes.length}: ${shape.name}`;
    document.getElementById('shapeSvg').innerHTML = shape.svg;
  }

  function nextShape(){
    if(currentIndex < shapes.length-1){ currentIndex++; renderShape(); }
  }
  function prevShape(){
    if(currentIndex > 0){ currentIndex--; renderShape(); }
  }
  function clearCanvas(){
    renderShape(); // Just re-render to clear
  }

  // Color palette
  const colorsDiv = document.getElementById('colors');
  colors.forEach((c,i)=>{
    const div = document.createElement('div');
    div.className = 'color' + (i===0?' active':'');
    div.style.background = c;
    div.onclick = ()=>{ selectedColor=c; document.querySelectorAll('.color').forEach(x=>x.classList.remove('active')); div.classList.add('active'); }
    colorsDiv.appendChild(div);
  });

  // Simple canvas drawing inside SVG
  document.getElementById('shapeSvg').onclick = (e)=>{
    const svg = document.getElementById('shapeSvg');
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    const pt = svg.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY;
    const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
    circle.setAttribute('cx',svgP.x); circle.setAttribute('cy',svgP.y);
    circle.setAttribute('r','8'); circle.setAttribute('fill',selectedColor);
    svg.appendChild(circle);
  }

  renderShape();
</script>
</body>
</html>

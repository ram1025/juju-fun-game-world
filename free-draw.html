<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Draw - Juju Fun World</title>
    <link rel="icon" type="image/png" href="./icon-192.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #3B82F6;
            min-height: 100vh; padding: 20px; display: flex;
            flex-direction: column;
        }
    .header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 15px;
        }
    .back-btn {
            background: white; border: none; width: 50px; height: 50px;
            border-radius: 15px; font-size: 24px; cursor: pointer;
            box-shadow: 0 4px 0 #E5E7EB;
        }
    .back-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #E5E7EB; }
    .title {
            color: white; font-size: 28px; font-weight: 900;
        }
    .tools {
            background: white; padding: 15px; border-radius: 20px;
            margin-bottom: 15px; display: flex; gap: 10px;
            justify-content: center; flex-wrap: wrap;
        }
    .color-btn {
            width: 40px; height: 40px; border-radius: 50%;
            border: 3px solid #E5E7EB; cursor: pointer;
        }
    .color-btn.active { border-color: #1F2937; transform: scale(1.2); }
    .tool-btn {
            background: #F3F4F6; border: none; padding: 10px 20px;
            border-radius: 12px; font-weight: 800; font-size: 16px;
            cursor: pointer;
        }
    .tool-btn:active { transform: scale(0.95); }
    .clear { background: #EF4444; color: white; }
    .save { background: #10B981; color: white; }
    .canvas-container {
            background: white; border-radius: 20px; padding: 10px;
            flex: 1; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #canvas {
            width: 100%; height: 100%; border-radius: 15px;
            cursor: crosshair; touch-action: none; background: #fff;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="location.href='./dashboard.html'">←</button>
        <div class="title">Free Draw 🎨</div>
        <div style="width: 50px;"></div>
    </div>

    <div class="tools">
        <div class="color-btn active" style="background:#000" onclick="setColor('#000')"></div>
        <div class="color-btn" style="background:#EF4444" onclick="setColor('#EF4444')"></div>
        <div class="color-btn" style="background:#3B82F6" onclick="setColor('#3B82F6')"></div>
        <div class="color-btn" style="background:#10B981" onclick="setColor('#10B981')"></div>
        <div class="color-btn" style="background:#F59E0B" onclick="setColor('#F59E0B')"></div>
        <div class="color-btn" style="background:#EC4899" onclick="setColor('#EC4899')"></div>
        <button class="tool-btn clear" onclick="clearCanvas()">🗑️ Clear</button>
        <button class="tool-btn save" onclick="saveImage()">💾 Save</button>
    </div>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let painting = false;
        let currentColor = '#000';

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.offsetWidth - 20;
            canvas.height = container.offsetHeight - 20;
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = currentColor;
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function setColor(color) {
            currentColor = color;
            ctx.strokeStyle = color;
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function clearCanvas() {
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = 'juju-drawing.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        function startPosition(e) {
            painting = true;
            draw(e);
        }

        function endPosition() {
            painting = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!painting) return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', endPosition);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('touchstart', startPosition);
        canvas.addEventListener('touchend', endPosition);
        canvas.addEventListener('touchmove', draw);

        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js');
        }
    </script>
</body>
</html>

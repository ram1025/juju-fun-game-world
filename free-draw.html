<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Draw - Juju Fun World</title>
    <link rel="icon" type="image/png" href="./icon-192.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#A855F7">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Nunito',sans-serif;background:#A855F7;min-height:100vh;padding:20px}
     .back-btn{background:#fff;color:#A855F7;border:none;padding:12px 24px;border-radius:15px;font-weight:800;font-size:16px;margin-bottom:20px;cursor:pointer;box-shadow:0 4px 0 #7E22CE}
     .back-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #7E22CE}
     .container{background:#FEFCE8;padding:20px;border-radius:30px;max-width:400px;margin:0 auto}
        h1{color:#A855F7;font-weight:900;font-size:28px;text-align:center;margin-bottom:5px}
        p{color:#581C87;font-weight:700;text-align:center;margin-bottom:15px}
     .canvas-wrapper{position:relative;width:320px;height:320px;margin:0 auto;border:4px solid #E9D5FF;border-radius:20px;background:#fff;overflow:hidden}
        #canvas{position:absolute;top:0;left:0;touch-action:none;cursor:crosshair}
     .controls{margin-top:15px;display:flex;gap:10px;justify-content:center}
     .btn{color:#fff;border:none;padding:12px 24px;border-radius:15px;font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2)}
     .btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.2)}
     .clear{background:#EF4444}
     .save{background:#10B981}
     .colors{margin-top:15px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
     .color{width:45px;height:45px;border-radius:50%;border:3px solid #fff;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.2)}
     .color.active{border:3px solid #000;transform:scale(1.15)}
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='./dashboard.html'">← Back</button>
    <div class="container">
        <h1>🐒 Free Draw</h1>
       <div>Free drawing! Whatever you like 🎨</div>
        <div class="canvas-wrapper">
            <canvas id="canvas" width="320" height="320"></canvas>
        </div>
        <div class="controls">
            <button class="btn clear" onclick="clearCanvas()">Clear</button>
            <button class="btn save" onclick="saveImage()">Save 🐒</button>
        </div>
        <div class="colors" id="colors"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let currentColor = '#EF4444';
        
        const colorList = ['#EF4444','#F97316','#EAB308','#10B981','#3B82F6','#8B5CF6','#EC4899','#000000'];
        const colorDiv = document.getElementById('colors');
        colorList.forEach(c => {
            const div = document.createElement('div');
            div.className = 'color';
            div.style.background = c;
            if(c === currentColor) div.classList.add('active');
            div.onclick = () => {
                currentColor = c;
                document.querySelectorAll('.color').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
            };
            colorDiv.appendChild(div);
        });

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches? e.touches[0].clientY : e.clientY) - rect.top;
            return {x, y};
        }

        function startDraw(e) {
            isDrawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            e.preventDefault();
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
            e.preventDefault();
        }

        function stopDraw() { isDrawing = false; }
        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
        
        function saveImage() {
            const link = document.createElement('a');
            link.download = 'juju-drawing.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDraw);

        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js');
        }
    </script>
</body>
</html>

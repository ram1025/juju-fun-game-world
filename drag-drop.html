<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Drag & Drop - Juju</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;touch-action:none} /* Scroll off for drag */
  body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#F59E0B,#FBBF24);min-height:100vh;padding:20px;text-align:center}
 .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
 .back-btn{background:#fff;border:0;border-radius:15px;padding:10px 15px;font-size:16px;font-weight:900;font-family:Nunito;box-shadow:0 4px 0 rgba(0,0,0,.2);cursor:pointer}
 .title{font-size:24px;font-weight:900;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.2)}
 .score{font-size:20px;font-weight:900;color:#fff;background:rgba(0,0,0,.2);padding:8px 15px;border-radius:15px}
 .game-box{background:#fff;border-radius:30px;padding:20px;box-shadow:0 10px 0 rgba(0,0,0,.2);max-width:450px;margin:0 auto}
 .drop-zone{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-bottom:25px}
 .target{aspect-ratio:1/1;border:4px dashed #D1D5DB;border-radius:25px;background:#F3F4F6;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#6B7280;transition:all.2s}
 .target.hover{border-color:#10B981;background:#D1FAE5;transform:scale(1.05)}
 .target.correct{border:4px solid #10B981;background:#A7F3D0;animation:pop.3s}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
 .target img{width:60px;height:60px;object-fit:contain;margin-bottom:5px}
 .drag-items{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;min-height:100px}
 .draggable{width:80px;height:80px;background:#fff;border-radius:20px;box-shadow:0 6px 0 rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;cursor:grab;transition:transform.1s}
 .draggable:active{transform:scale(.9);cursor:grabbing}
 .draggable.dragging{opacity:.5}
 .draggable img{width:60px;height:60px;object-fit:contain;pointer-events:none} /* Image drag avvakunda */
 .reset-btn{margin-top:20px;background:#EF4444;color:#fff;border:0;border-radius:15px;padding:12px 25px;font-size:18px;font-weight:900;font-family:Nunito;box-shadow:0 6px 0 #B91C1C;cursor:pointer}
 .win-popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:99}
 .win-box{background:#fff;border-radius:30px;padding:30px;text-align:center;animation:pop.3s}
 .win-box h2{font-size:32px;color:#10B981;margin-bottom:10px}
 .win-box p{font-size:18px;margin-bottom:20px}
</style>
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="location.href='./dashboard.html?v=109'">← Back</button>
    <div class="title">Match Shapes!</div>
    <div class="score">Score: <span id="score">0</span>/4</div>
  </div>

  <div class="game-box">
    <!-- DROP TARGETS - Objects -->
    <div class="drop-zone">
      <div class="target" data-shape="circle">
        <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" alt="Ball">
        <span>Ball</span>
      </div>
      <div class="target" data-shape="square">
        <img src="https://cdn-icons-png.flaticon.com/512/616/616433.png" alt="Box">
        <span>Box</span>
      </div>
      <div class="target" data-shape="triangle">
        <img src="https://cdn-icons-png.flaticon.com/512/616/616554.png" alt="Cone">
        <span>Cone</span>
      </div>
      <div class="target" data-shape="star">
        <img src="https://cdn-icons-png.flaticon.com/512/616/616489.png" alt="Star">
        <span>Star</span>
      </div>
    </div>

    <!-- DRAGGABLE SHAPES -->
    <div class="drag-items" id="dragItems">
      <div class="draggable" draggable="true" data-shape="triangle">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png" alt="Triangle">
      </div>
      <div class="draggable" draggable="true" data-shape="circle">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Circle">
      </div>
      <div class="draggable" draggable="true" data-shape="star">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25431.png" alt="Star">
      </div>
      <div class="draggable" draggable="true" data-shape="square">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25318.png" alt="Square">
      </div>
    </div>

    <button class="reset-btn" onclick="resetGame()">🔄 Reset</button>
  </div>

  <div class="win-popup" id="winPopup">
    <div class="win-box">
      <h2>🎉 Super!</h2>
      <p>All Shapes Matched!</p>
      <button class="reset-btn" onclick="location.href='./dashboard.html?v=109'">Back to Home</button>
    </div>
  </div>

<script>
let score=0;
let draggedItem=null;

const draggables=document.querySelectorAll('.draggable');
const targets=document.querySelectorAll('.target');
const scoreEl=document.getElementById('score');
const winPopup=document.getElementById('winPopup');

// 1. DRAG START
draggables.forEach(item=>{
  item.addEventListener('dragstart',e=>{
    draggedItem=item;
    item.classList.add('dragging');
    setTimeout(()=>item.style.display='none',0); // Hide while dragging
  });
  item.addEventListener('dragend',e=>{
    item.classList.remove('dragging');
    item.style.display='flex';
  });

  // Mobile Touch Support
  item.addEventListener('touchstart',e=>{draggedItem=item;item.classList.add('dragging');});
});

// 2. DROP TARGET EVENTS
targets.forEach(target=>{
  target.addEventListener('dragover',e=>{e.preventDefault();target.classList.add('hover');});
  target.addEventListener('dragleave',()=>target.classList.remove('hover'));

  target.addEventListener('drop',e=>{
    e.preventDefault();
    target.classList.remove('hover');
    checkMatch(target);
  });

  // Mobile Touch Support
  target.addEventListener('touchend',e=>{
    if(draggedItem){checkMatch(target);draggedItem=null;}
  });
});

function checkMatch(target){
  if(!draggedItem)return;
  const shape=draggedItem.dataset.shape;
  const targetShape=target.dataset.shape;

  if(shape===targetShape &&!target.classList.contains('correct')){
    // Correct Match
    target.classList.add('correct');
    target.innerHTML=''; // Clear old image
    target.appendChild(draggedItem); // Move shape into target
    draggedItem.style.cursor='default';
    draggedItem.draggable=false; // Lock it
    score++;
    scoreEl.textContent=score;
    playSound(true);

    if(score===4){
      setTimeout(()=>winPopup.style.display='flex',500);
    }
  }else{
    // Wrong Match
    playSound(false);
    draggedItem.style.transform='translate(0,0)'; // Snap back effect
  }
}

function resetGame(){
  score=0;
  scoreEl.textContent=0;
  winPopup.style.display='none';
  const dragItems=document.getElementById('dragItems');
  targets.forEach(t=>{
    t.classList.remove('correct');
    const img=t.querySelector('img');
    const span=t.querySelector('span');
    t.innerHTML='';
    if(img)t.appendChild(img);
    if(span)t.appendChild(span);
  });
  draggables.forEach(d=>{
    d.draggable=true;
    d.style.cursor='grab';
    dragItems.appendChild(d); // Back to start
  });
  shuffle(draggables); // Randomize order
}

function shuffle(nodeList){
  const arr=[...nodeList];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    arr[i].parentNode.appendChild(arr[j]);
  }
}

function playSound(correct){
  // Simple beep sound using Web Audio API
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator();
  o.frequency.value=correct?800:300;
  o.connect(ctx.destination);
  o.start();o.stop(ctx.currentTime+.1);
}

resetGame(); // Start shuffled
</script>
</body>
</html>

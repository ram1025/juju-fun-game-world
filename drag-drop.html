<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Drag Drop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap');
  body{margin:0;min-height:100vh;background:#3B82F6;font-family:Nunito,sans-serif;padding:20px;padding-top:80px;display:flex;justify-content:center;align-items:flex-start;overscroll-behavior:none}
.card{background:#FFF7ED;border-radius:24px;padding:24px;text-align:center;box-shadow:0 8px 0 #FDBA74;width:100%;max-width:420px;touch-action:none}
.title{font-size:28px;font-weight:900;color:#F97316;margin:0 0 8px}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
.slot{background:#fff;border:4px solid #FDBA74;border-radius:18px;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:40px;padding:8px;user-select:none;-webkit-user-select:none;-webkit-user-drag:none;touch-action:none}
.slot.label{font-size:14px;font-weight:800;color:#1F2937;margin-top:4px}
.slot.drag-item{cursor:grab}
.slot.drop-zone{border-style:dashed;background:#FFFBEB}
.slot.drop-zone.over{border-color:#3B82F6;background:#DBEAFE;border-style:solid;transform:scale(1.05)}
.slot.filled{background:#D1FAE5;border-color:#10B981;border-style:solid}
.btns{display:flex;gap:12px;justify-content:center;margin-top:16px}
.btn{border:0;border-radius:12px;padding:14px 20px;font-size:16px;font-weight:800;color:#fff;cursor:pointer;font-family:Nunito}
.btn.green{background:#10B981}.btn.blue{background:#3B82F6}.btn.red{background:#EF4444}
.dragging{opacity:.7;transform:scale(1.1);z-index:999;position:fixed;pointer-events:none}
</style>
</head>
<body>
<div class="card">
  <h1 class="title" id="title">1/5: Letters</h1>
  <div class="board" id="dragBoard"></div>
  <div class="board" id="dropBoard"></div>
  <div class="btns">
    <button class="btn red" onclick="loadPage()">Clear</button>
    <button class="btn blue" onclick="prevPage()">← Back</button>
    <button class="btn green" onclick="nextPage()">Next →</button>
  </div>
</div>
<script>
const PAGES=[[["A","A"],["B","B"],["C","C"]],[["⬛","Square"],["⭕","Circle"],["⭐","Star"]],[["🍎","Apple"],["🍌","Banana"],["🍊","Orange"]],[["🐶","Dog"],["🐱","Cat"],["🐰","Rabbit"]],[["1","One"],["2","Two"],["3","Three"]]];
const TITLES=['Letters','Shapes','Fruits','Animals','Numbers'];
let page=0,matched=0,dragItem=null,touchItem=null;

function loadPage(){
  matched=0; const data=PAGES[page];
  document.getElementById('title').textContent=`${page+1}/5: ${TITLES[page]}`;
  const dB=document.getElementById('dragBoard'); const pB=document.getElementById('dropBoard');
  dB.innerHTML=''; pB.innerHTML='';
  const dragData=[...data].sort(()=>Math.random()-0.5);
  const dropData=[...data].sort(()=>Math.random()-0.5);

  dragData.forEach(([e,n])=>{
    const el=document.createElement('div');
    el.className='slot drag-item';
    el.innerHTML=`${e}<div class="label">${n}</div>`;
    el.dataset.id=e;
    el.draggable=true; // Desktop

    // DESKTOP DRAG
    el.ondragstart=(ev)=>{dragItem=el; ev.dataTransfer.effectAllowed='move';};

    // MOBILE TOUCH DRAG - IDHE MAIN FIX
    el.ontouchstart=(ev)=>{
      ev.preventDefault();
      touchItem=el;
      setTimeout(()=>{ // 100ms delay tarvate drag start
        if(touchItem){
          touchItem.classList.add('dragging');
          const t=ev.touches[0];
          moveGhost(t.clientX, t.clientY);
        }
      },100);
    };
    el.ontouchmove=(ev)=>{
      ev.preventDefault();
      if(touchItem && touchItem.classList.contains('dragging')){
        const t=ev.touches[0];
        moveGhost(t.clientX, t.clientY);
        checkHover(t.clientX, t.clientY);
      }
    };
    el.ontouchend=(ev)=>{
      ev.preventDefault();
      if(touchItem && touchItem.classList.contains('dragging')){
        const t=ev.changedTouches[0];
        const dropTarget=document.elementFromPoint(t.clientX, t.clientY);
        if(dropTarget && dropTarget.closest('.drop-zone')){
          handleDrop(dropTarget.closest('.drop-zone'));
        }
        touchItem.classList.remove('dragging');
        const g=document.getElementById('ghost'); if(g) g.remove();
      }
      touchItem=null;
      document.querySelectorAll('.over').forEach(z=>z.classList.remove('over'));
    };
    dB.appendChild(el);
  });

  dropData.forEach(([e,n])=>{
    const el=document.createElement('div');
    el.className='slot drop-zone';
    el.innerHTML=`<div class="label">${n}</div>`;
    el.dataset.id=e;
    el.ondragover=(ev)=>{ev.preventDefault(); el.classList.add('over');};
    el.ondragleave=()=>el.classList.remove('over');
    el.ondrop=(ev)=>{ev.preventDefault(); handleDrop(el);};
    pB.appendChild(el);
  });
}

function moveGhost(x,y){
  let g=document.getElementById('ghost');
  if(!g){
    g=touchItem.cloneNode(true);
    g.id='ghost'; g.classList.add('dragging');
    document.body.appendChild(g);
  }
  g.style.left=`${x-50}px`; g.style.top=`${y-50}px`;
}
function checkHover(x,y){
  document.querySelectorAll('.drop-zone').forEach(z=>{
    const r=z.getBoundingClientRect();
    if(x>r.left&&x<r.right&&y>r.top&&y<r.bottom&&!z.classList.contains('filled')){z.classList.add('over');}
    else{z.classList.remove('over');}
  });
}
function handleDrop(zone){
  const item = dragItem || touchItem;
  if(!item || zone.classList.contains('filled')) return;
  if(item.dataset.id === zone.dataset.id){
    zone.classList.add('filled'); zone.innerHTML=item.innerHTML; item.remove(); matched++;
    if(matched===3) setTimeout(nextPage,1000);
  }else{item.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],{duration:200});}
}
const prevPage=()=>{page=(page-1+PAGES.length)%PAGES.length;loadPage();};
const nextPage=()=>{page=(page+1)%PAGES.length;loadPage();};
loadPage();
</script>
</body>
</html>

<html lang="en">

<title>Drag Drop - Juju</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
  body { margin:0; min-height:100vh; background:#8B5CF6; font-family:'Nunito',sans-serif; padding:15px; box-sizing:border-box; }
.top-back { background:white; border:none; border-radius:12px; padding:10px 15px; font-size:16px; font-weight:800; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,0.2); margin-bottom:15px; }
.card { background:#FDE68A; border-radius:25px; padding:20px; text-align:center; box-shadow:0 8px 0 #F59E0B; overflow:hidden; }
.counter { font-size:24px; font-weight:900; color:#D97706; margin-bottom:15px; }
.drag-area { display:flex; justify-content:center; gap:12px; margin:20px 0; min-height:100px; flex-wrap:wrap; }
.drop-area { display:flex; justify-content:space-between; gap:12px; margin:20px 0; }
.item {
    background:white; border:4px solid #D97706; border-radius:20px;
    padding:10px 8px; font-size:36px; cursor:grab; box-shadow:0 5px 0 #D97706;
    width:30%; min-height:90px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    touch-action:none; user-select:none; box-sizing:border-box;
  }
.item-name { font-size:13px; font-weight:800; color:#DC2626; margin-top:3px; line-height:1.1; }
.drop-box {
    background:white; border:4px dashed #D97706; border-radius:20px;
    padding:10px 8px; font-size:36px; width:30%; min-height:90px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; box-sizing:border-box;
  }
.drop-box.hover { border-color:#3B82F6; background:#DBEAFE; }
.drop-box.filled { background:#BBF7D0; border-style:solid; border-color:#10B981; }
h1 { font-size:22px; color:#B45309; margin-top:10px; min-height:28px; }
.bottom-btns { display:flex; gap:10px; justify-content:center; margin-top:15px; }
.bottom-btn { border:none; border-radius:12px; padding:12px 20px; font-size:16px; font-weight:800; color:white; cursor:pointer; }
.btn-clear { background:#EF4444; }
.btn-back { background:#3B82F6; }
.btn-next { background:#10B981; }
@keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }
</style>
</head>

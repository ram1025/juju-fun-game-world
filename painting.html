<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paint Letter - Juju Fun World</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background: #3B82F6; min-height: 100vh; padding: 20px; overscroll-behavior: none; }
.header { display: flex; align-items: center; margin-bottom: 20px; }
.back-btn { background: white; border: none; padding: 12px 20px; border-radius: 15px; font-size: 18px; font-weight: 900; color: #F97316; cursor: pointer; }
.container { background: #FEF3C7; padding: 25px; border-radius: 30px; max-width: 400px; margin: 0 auto; }
.letter-title { font-size: 28px; font-weight: 900; color: #F97316; text-align: center; margin-bottom: 8px; }
.letter-sub { font-size: 16px; font-weight: 700; color: #92400E; text-align: center; margin-bottom: 15px; }
.canvas-wrap { background: #FFFFFF; border: 3px solid #FDBA74; border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        #canvas { width: 100%; height: 320px; border-radius: 15px; touch-action: none; display: block; background: #FFFFFF; }
.controls { display: flex; gap: 10px; margin-bottom: 15px; }
.ctrl-btn { flex: 1; padding: 14px; border: none; border-radius: 15px; font-size: 16px; font-weight: 800; cursor: pointer; }
.clear-btn { background: #EF4444; color: white; }
.back-btn-2 { background: #3B82F6; color: white; }
.next-btn { background: #10B981; color: white; }
.colors { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
.color { width: 45px; height: 45px; border-radius: 50%; border: 3px solid white; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.color.active { border: 4px solid #1F2937; transform: scale(1.15); }
    </style>
</head>
<body>
    <div class="header"><button class="back-btn" onclick="location.href='./dashboard.html'">← Back</button></div>
    <div class="container">
        <div class="letter-title">Paint Letter: <span id="letterText">A</span></div>
        <div class="letter-sub">A lopala matrame rayi 🖍️</div>
        <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
        <div class="controls">
            <button class="ctrl-btn clear-btn" onclick="clearCanvas()">Clear</button>
            <button class="ctrl-btn back-btn-2" onclick="prevLetter()">← Back</button>
            <button class="ctrl-btn next-btn" onclick="nextLetter()">Next →</button>
        </div>
        <div class="colors">
            <div class="color active" style="background:#EF4444;" onclick="setColor('#EF4444', this)"></div>
            <div class="color" style="background:#F97316;" onclick="setColor('#F97316', this)"></div>
            <div class="color" style="background:#EAB308;" onclick="setColor('#EAB308', this)"></div>
            <div class="color" style="background:#10B981;" onclick="setColor('#10B981', this)"></div>
            <div class="color" style="background:#3B82F6;" onclick="setColor('#3B82F6', this)"></div>
            <div class="color" style="background:#A855F7;" onclick="setColor('#A855F7', this)"></div>
            <div class="color" style="background:#EC4899;" onclick="setColor('#EC4899', this)"></div>
        </div>
    </div>

    <script>
        if('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js?v=82');}

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let currentColor = '#EF4444';
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        let letterIndex = 0;
        const fontSizeRatio = 0.55;
        const outerStroke = 16; // 8px Gap
        const innerStroke = 8;
        const brushSize = 6;

        let outerPath = new Path2D(); // KEY: Gap path ni memory lo pettam
        let innerPath = new Path2D();

        function initCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width - 30;
            canvas.height = 320;
            document.fonts.ready.then(() => { buildPaths(); drawLetter(); });
        }

        function buildPaths() {
            // KEY: Rendu paths create chesam. Prati letter change ki okkasari matrame.
            const x = canvas.width/2, y = canvas.height/2;
            const font = `bold ${canvas.width * fontSizeRatio}px Nunito`;

            outerPath = new Path2D();
            innerPath = new Path2D();
            ctx.font = font;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            outerPath.addPath(new Path2D(ctx.fillText(letters[letterIndex], x, y))); // Dummy
            // Stroke ni path ga convert cheyalem, so trick vadutham
            ctx.save();
            ctx.lineWidth = outerStroke;
            ctx.strokeStyle = '#000';
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            outerPath = new Path2D();
            outerPath.stroke(ctx, letters[letterIndex]); // Chrome lo work avutundi

            ctx.lineWidth = innerStroke;
            innerPath = new Path2D();
            innerPath.stroke(ctx, letters[letterIndex]);
            ctx.restore();
        }

        function drawLetter() {
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = `bold ${canvas.width * fontSizeRatio}px Nunito`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.strokeStyle = '#000';
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.lineWidth = outerStroke;
            ctx.strokeText(letters[letterIndex], canvas.width/2, canvas.height/2);
            ctx.lineWidth = innerStroke;
            ctx.strokeText(letters[letterIndex], canvas.width/2, canvas.height/2);
            document.getElementById('letterText').textContent = letters[letterIndex];
        }

        function isInGap(x, y) {
            // KEY: Super Fast Check. No getImageData
            const inOuter = ctx.isPointInStroke(outerPath, x, y);
            const inInner = ctx.isPointInStroke(innerPath, x, y);
            return inOuter &&!inInner; // Outer lo undi, Inner lo ledu = Gap
        }

        function setColor(color, el) {
            currentColor = color;
            document.querySelectorAll('.color').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let x, y;
            if (e.touches && e.touches[0]) { x = (e.touches[0].clientX - rect.left) * scaleX; y = (e.touches[0].clientY - rect.top) * scaleY; }
            else { x = (e.clientX - rect.left) * scaleX; y = (e.clientY - rect.top) * scaleY; }
            return { x, y };
        }

        function startDraw(e) {
            e.preventDefault();
            const pos = getPos(e);
            if (isInGap(pos.x, pos.y)) {
                drawing = true;
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            }
        }

        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const pos = getPos(e);
            if (isInGap(pos.x, pos.y)) {
                ctx.lineTo(pos.x, pos.y);
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = brushSize;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
            } else {
                drawing = false;
            }
        }

        function stopDraw(e) {
            if (e) e.preventDefault();
            drawing = false;
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDraw, {passive: false});

        function clearCanvas() { drawLetter(); }
        function nextLetter() { letterIndex = (letterIndex + 1) % letters.length; buildPaths(); drawLetter(); }
        function prevLetter() { letterIndex = (letterIndex - 1 + letters.length) % letters.length; buildPaths(); drawLetter(); }

        window.addEventListener('load', initCanvas);
        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paint Letter - Juju Fun World</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { font-family: 'Nunito', sans-serif; background: #3B82F6; min-height: 100vh; padding: 20px; }
      .container { background: #FEF3C7; padding: 20px; border-radius: 30px; max-width: 400px; margin: 0 auto; }
      .letter-title { font-size: 28px; font-weight: 900; color: #F97316; text-align: center; margin-bottom: 10px; }
      .canvas-wrap { background: #FFFFFF; border: 4px solid #FDBA74; border-radius: 20px; }
        #canvas { width: 100%; height: 300px; display: block; border-radius: 16px; background: #fff; }
      .controls { display: flex; gap: 10px; margin: 15px 0; }
      .btn { flex: 1; padding: 12px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; color: white; }
      .colors { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
      .color { width: 40px; height: 40px; border-radius: 50%; border: 3px solid white; cursor: pointer; }
      .color.active { transform: scale(1.2); border-color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <div class="letter-title">Paint Letter: <span id="letterText">A</span></div>
        <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
        <div class="controls">
            <button class="btn" style="background:#EF4444" onclick="initCanvas()">Clear</button>
            <button class="btn" style="background:#3B82F6" onclick="changeLetter(-1)">← Back</button>
            <button class="btn" style="background:#10B981" onclick="changeLetter(1)">Next →</button>
        </div>
        <div class="colors" id="colorPalette"></div>
    </div>

    <script>
        if('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js?v=89');}

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        let idx = 0, drawing = false, curCol = '#EF4444';
        let fontSize, cw, ch;

        function initCanvas() {
            // KEY FIX: No dpr. 1:1 ratio
            cw = canvas.offsetWidth;
            ch = 300;
            canvas.width = cw;
            canvas.height = ch;
            fontSize = cw * 0.55;

            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, cw, ch);
            drawOutline();
        }

        function drawOutline() {
            ctx.font = `bold ${fontSize}px Nunito`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.strokeStyle = '#E5E7EB'; // Light grey dotted border
            ctx.lineWidth = 8;
            ctx.setLineDash([6, 3]); // 6px dot, 3px gap
            ctx.strokeText(letters[idx], cw/2, ch/2);
            ctx.setLineDash([]); // Reset
            document.getElementById('letterText').textContent = letters[idx];
        }

        function startDraw(e) {
            e.preventDefault();
            const pos = getPos(e);
            drawing = true;

            ctx.save();
            // KEY: Solid A tho clip
            ctx.beginPath();
            ctx.font = `bold ${fontSize}px Nunito`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(letters[idx], cw/2, ch/2);
            ctx.clip(); // Ika lopala matrame

            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = curCol;
            ctx.lineWidth = 24;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function stopDraw(e) {
            if (e) e.preventDefault();
            drawing = false;
            ctx.restore();
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            let x = (e.touches? e.touches[0].clientX : e.clientX) - rect.left;
            let y = (e.touches? e.touches[0].clientY : e.clientY) - rect.top;
            return { x, y }; // 1:1 ga istondi
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDraw, {passive: false});

        function changeLetter(step) {
            idx = (idx + step + letters.length) % letters.length;
            initCanvas();
        }

        const colors = ['#EF4444', '#F97316', '#EAB308', '#10B981', '#3B82F6', '#A855F7', '#EC4899'];
        const palette = document.getElementById('colorPalette');
        colors.forEach(c => {
            const div = document.createElement('div');
            div.className = 'color';
            div.style.background = c;
            div.onclick = () => { curCol = c; document.querySelectorAll('.color').forEach(el => el.classList.remove('active')); div.classList.add('active'); };
            palette.appendChild(div);
        });
        palette.firstChild.classList.add('active');

        initCanvas();
        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>

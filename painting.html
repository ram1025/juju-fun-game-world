<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paint Letter - Juju Fun World</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #3B82F6;
            min-height: 100vh;
            padding: 20px;
            overscroll-behavior: none;
        }
.header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
.back-btn {
            background: white;
            border: none;
            padding: 12px 20px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 900;
            color: #F97316;
            cursor: pointer;
        }
.container {
            background: #FEF3C7;
            padding: 25px;
            border-radius: 30px;
            max-width: 400px;
            margin: 0 auto;
        }
.letter-title {
            font-size: 28px;
            font-weight: 900;
            color: #F97316;
            text-align: center;
            margin-bottom: 8px;
        }
.letter-sub {
            font-size: 16px;
            font-weight: 700;
            color: #92400E;
            text-align: center;
            margin-bottom: 15px;
        }
.canvas-wrap {
            background: white;
            border: 3px solid #FDBA74;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
        }
        #canvas {
            width: 100%;
            height: 320px;
            border-radius: 15px;
            touch-action: none;
            display: block;
        }
.controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
.ctrl-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
        }
.clear-btn { background: #EF4444; color: white; }
.back-btn-2 { background: #3B82F6; color: white; }
.next-btn { background: #10B981; color: white; }
.colors {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
.color {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
.color.active {
            border: 4px solid #1F2937;
            transform: scale(1.15);
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="location.href='./dashboard.html'">← Back</button>
    </div>

    <div class="container">
        <div class="letter-title">Paint Letter: <span id="letterText">A</span></div>
        <div class="letter-sub">Tap = Fill | Drag = Brush 🦁</div>

        <div class="canvas-wrap">
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <button class="ctrl-btn clear-btn" onclick="clearCanvas()">Clear</button>
            <button class="ctrl-btn back-btn-2" onclick="prevLetter()">← Back</button>
            <button class="ctrl-btn next-btn" onclick="nextLetter()">Next →</button>
        </div>

        <div class="colors">
            <div class="color active" style="background:#EF4444;" onclick="setColor('#EF4444', this)"></div>
            <div class="color" style="background:#F97316;" onclick="setColor('#F97316', this)"></div>
            <div class="color" style="background:#EAB308;" onclick="setColor('#EAB308', this)"></div>
            <div class="color" style="background:#10B981;" onclick="setColor('#10B981', this)"></div>
            <div class="color" style="background:#3B82F6;" onclick="setColor('#3B82F6', this)"></div>
            <div class="color" style="background:#A855F7;" onclick="setColor('#A855F7', this)"></div>
            <div class="color" style="background:#EC4899;" onclick="setColor('#EC4899', this)"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let currentColor = '#EF4444';
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        let letterIndex = 0;

        function initCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width - 30;
            canvas.height = 320;
            drawLetter();
        }

        window.addEventListener('load', initCanvas);
        window.addEventListener('resize', initCanvas);

        function drawLetter() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.font = `bold ${canvas.width * 0.65}px Nunito`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            ctx.fillStyle = '#FFFFFF'; // White base fill
            ctx.fillText(letters[letterIndex], canvas.width/2, canvas.height/2);

            ctx.strokeStyle = '#000'; // Black border 100% block
            ctx.lineWidth = 14;
            ctx.lineJoin = 'round';
            ctx.strokeText(letters[letterIndex], canvas.width/2, canvas.height/2);
            ctx.restore();

            document.getElementById('letterText').textContent = letters[letterIndex];
        }

        function setColor(color, el) {
            currentColor = color;
            document.querySelectorAll('.color').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let x, y;
            if (e.touches && e.touches[0]) {
                x = (e.touches[0].clientX - rect.left) * scaleX;
                y = (e.touches[0].clientY - rect.top) * scaleY;
            } else {
                x = (e.clientX - rect.left) * scaleX;
                y = (e.clientY - rect.top) * scaleY;
            }
            return { x, y };
        }

        function startDraw(e) {
            e.preventDefault();
            drawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = 20;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        }

        function stopDraw(e) {
            if (e) e.preventDefault();
            drawing = false;
        }

        // FLOOD FILL FUNCTION - IDHE MAGIC 🔑
        function floodFill(startX, startY, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const startPos = (startY * canvas.width + startX) * 4;

            const startR = data[startPos];
            const startG = data[startPos + 1];
            const startB = data[startPos + 2];
            const startA = data[startPos + 3];

            // Black border or already colored unte aapi vey
            if (startA > 10 &&!(startR > 240 && startG > 240 && startB > 240)) return;

            const fillR = parseInt(fillColor.slice(1, 3), 16);
            const fillG = parseInt(fillColor.slice(3, 5), 16);
            const fillB = parseInt(fillColor.slice(5, 7), 16);

            const stack = [[startX, startY]];
            const visited = new Uint8Array(canvas.width * canvas.height);

            while (stack.length) {
                const [x, y] = stack.pop();
                const pos = (y * canvas.width + x) * 4;

                if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) continue;
                if (visited[y * canvas.width + x]) continue;

                const r = data[pos]; const g = data[pos + 1]; const b = data[pos + 2]; const a = data[pos + 3];

                if (a > 10 && (Math.abs(r - startR) > 10 || Math.abs(g - startG) > 10 || Math.abs(b - startB) > 10)) continue;

                visited[y * canvas.width + x] = 1;
                data[pos] = fillR; data[pos + 1] = fillG; data[pos + 2] = fillB; data[pos + 3] = 255;
                stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
            }
            ctx.putImageData(imageData, 0, 0);
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDraw, {passive: false});

        // TAP CHESITE FILL AVTUNDI
        canvas.addEventListener('click', (e) => {
            if(drawing) return;
            const pos = getPos(e);
            floodFill(Math.floor(pos.x), Math.floor(pos.y), currentColor);
        });

        function clearCanvas() {
            drawLetter();
        }

        function nextLetter() {
            letterIndex = (letterIndex + 1) % letters.length;
            drawLetter();
        }

        function prevLetter() {
            letterIndex = (letterIndex - 1 + letters.length) % letters.length;
            drawLetter();
        }

        if('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js?v=61'); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint Letter - Juju Fun World</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #3B82F6;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #FEF3C7;
            padding: 25px;
            border-radius: 30px;
            max-width: 400px;
            margin: 0 auto;
        }
        #canvas {
            width: 100%;
            height: 320px;
            border: 3px solid #FDBA74;
            border-radius: 20px;
            touch-action: none;
        }
        .colors {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .color {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid white;
            cursor: pointer;
        }
        .color.active {
            border: 4px solid #1F2937;
            transform: scale(1.15);
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align:center; font-size:28px; font-weight:900; color:#F97316;">
            Paint Letter: <span id="letterText">A</span>
        </div>
        <canvas id="canvas"></canvas>
        <div class="colors">
            <div class="color active" style="background:#EF4444;" onclick="setColor('#EF4444', this)"></div>
            <div class="color" style="background:#F97316;" onclick="setColor('#F97316', this)"></div>
            <div class="color" style="background:#EAB308;" onclick="setColor('#EAB308', this)"></div>
            <div class="color" style="background:#10B981;" onclick="setColor('#10B981', this)"></div>
            <div class="color" style="background:#3B82F6;" onclick="setColor('#3B82F6', this)"></div>
        </div>
        <button onclick="nextLetter()">Next Letter</button>
    </div>

    <script>
        if('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js?v=63');}
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let currentColor = '#EF4444';
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        let letterIndex = 0;

        function initCanvas() {
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = 320;
            drawLetter();
        }

        function drawLetter() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = `bold ${canvas.width * 0.65}px Nunito`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 14;
            ctx.lineJoin = 'round';
            ctx.strokeText(letters[letterIndex], canvas.width/2, canvas.height/2);
            document.getElementById('letterText').textContent = letters[letterIndex];
        }

        function setColor(color, el) {
            currentColor = color;
            document.querySelectorAll('.color').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function floodFill(startX, startY, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const startPos = (startY * canvas.width + startX) * 4;
            const startR = data[startPos];
            const startG = data[startPos + 1];
            const startB = data[startPos + 2];
            const startA = data[startPos + 3];

            if (startA > 10 && !(startR > 240 && startG > 240 && startB > 240)) return;

            const fillR = parseInt(fillColor.slice(1, 3), 16);
            const fillG = parseInt(fillColor.slice(3, 5), 16);
            const fillB = parseInt(fillColor.slice(5, 7), 16);

            const stack = [[startX, startY]];
            const visited = new Uint8Array(canvas.width * canvas.height);

            while (stack.length) {
                const [x, y] = stack.pop();
                const pos = (y * canvas.width + x) * 4;
                if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) continue;
                if (visited[y * canvas.width + x]) continue;

                const r = data[pos];
                const g = data[pos + 1];
                const b = data[pos + 2];
                const a = data[pos + 3];

                if (a > 10 && (Math.abs(r - startR) > 10 || Math.abs(g - startG) > 10 || Math.abs(b - startB) > 10)) continue;

                visited[y * canvas.width + x] = 1;
                data[pos] = fillR;
                data[pos + 1] = fillG;
                data[pos + 2] = fillB;
                data[pos + 3] = 255;

                stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
            }
            ctx.putImageData(imageData, 0, 0);
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            floodFill(x, y, currentColor);
        });

        function nextLetter() {
            letterIndex = (letterIndex + 1) % letters.length;
            drawLetter();
        }

        window.addEventListener('load', initCanvas);
        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paint Letter - Juju Fun World</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { font-family: 'Nunito', sans-serif; background: #3B82F6; min-height: 100vh; padding: 20px; }
       .header { margin-bottom: 15px; }
       .back-top-btn { background: white; border: none; padding: 12px 24px; border-radius: 15px; font-size: 18px; font-weight: 900; color: #F97316; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
      .container { background: #FEF3C7; padding: 25px; border-radius: 30px; max-width: 400px; margin: 0 auto; }
      .letter-title { font-size: 28px; font-weight: 900; color: #F97316; text-align: center; margin-bottom: 5px; }
      .letter-sub { font-size: 16px; font-weight: 700; color: #92400E; text-align: center; margin-bottom: 15px; }
      .canvas-wrap { background: #FFFFFF; border: 4px solid #FDBA74; border-radius: 20px; }
        #canvas { width: 100%; height: 320px; display: block; border-radius: 16px; background: #fff; }
      .controls { display: flex; gap: 10px; margin: 15px 0; }
      .btn { flex: 1; padding: 14px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; color: white; font-size: 16px; }
      .colors { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
      .color { width: 45px; height: 45px; border-radius: 50%; border: 3px solid white; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
      .color.active { transform: scale(1.2); border: 4px solid #1F2937; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-top-btn" onclick="location.href='./dashboard.html'">← Back</button>
    </div>
    <div class="container">
        <div class="letter-title">Paint Letter: <span id="letterText">A</span></div>
        <div class="letter-sub">A lopala matrame rayi 🖍️</div>
        <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
        <div class="controls">
            <button class="btn" style="background:#EF4444" onclick="initCanvas()">Clear</button>
            <button class="btn" style="background:#3B82F6" onclick="changeLetter(-1)">← Back</button>
            <button class="btn" style="background:#10B981" onclick="changeLetter(1)">Next →</button>
        </div>
        <div class="colors" id="colorPalette"></div>
    </div>

    <script>
        if('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js?v=91');}

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        let idx = 0, drawing = false, curCol = '#EF4444';
        let cw, ch;

        function initCanvas() {
            cw = canvas.offsetWidth;
            ch = 320;
            canvas.width = cw;
            canvas.height = ch;
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, cw, ch);
            drawOutline();
        }

        // KEY: A-Z anni letters kosam Path function
        function getLetterPath(letter) {
            const path = new Path2D();
            const size = cw * 0.5;
            const x = cw/2;
            const y = ch/2;
            const h = size;
            const w = size * 0.8;

            if(letter === 'A') {
                path.moveTo(x - w/2, y + h/2);
                path.lineTo(x, y - h/2);
                path.lineTo(x + w/2, y + h/2);
                path.moveTo(x - w/3, y + h/6);
                path.lineTo(x + w/3, y + h/6);
            } else if(letter === 'B') {
                path.rect(x - w/2, y - h/2, w/2, h);
                path.arc(x, y - h/2, w/2, Math.PI*1.5, Math.PI*0.5);
                path.arc(x, y + h/2, w/2, Math.PI*1.5, Math.PI*0.5, true);
            } else {
                // Simple block letter for others. Nuvvu B,C,D ki custom path ivvochu
                ctx.font = `bold ${h}px Nunito`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                // FillText ni Path ga marchadam kastam, so block use chesam
                path.rect(x - w/2, y - h/2, w, h);
            }
            return path;
        }

        function drawOutline() {
            const letter = letters[idx];
            const path = getLetterPath(letter);
            ctx.strokeStyle = '#9CA3AF';
            ctx.lineWidth = 12;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.setLineDash([8, 4]); // Dotted
            ctx.stroke(path);
            ctx.setLineDash([]);
            document.getElementById('letterText').textContent = letter;
        }

        function startDraw(e) {
            e.preventDefault();
            const pos = getPos(e);
            drawing = true;
            ctx.save();
            ctx.clip(getLetterPath(letters[idx])); // KEY: Lopala matrame
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = curCol;
            ctx.lineWidth = 26;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        }

        function stopDraw(e) {
            if (e) e.preventDefault();
            drawing = false;
            ctx.restore();
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            let x = (e.touches? e.touches[0].clientX : e.clientX) - rect.left;
            let y = (e.touches? e.touches[0].clientY : e.clientY) - rect.top;
            return { x, y };
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDraw, {passive: false});

        function changeLetter(step) {
            idx = (idx + step + letters.length) % letters.length;
            initCanvas();
        }

        // KEY: 10 Colors add chesam
        const colors = ['#EF4444', '#F97316', '#F59E0B', '#EAB308', '#10B981', '#14B8A6', '#3B82F6', '#8B5CF6', '#A855F7', '#EC4899'];
        const palette = document.getElementById('colorPalette');
        colors.forEach(c => {
            const div = document.createElement('div');
            div.className = 'color';
            div.style.background = c;
            div.onclick = () => { curCol = c; document.querySelectorAll('.color').forEach(el => el.classList.remove('active')); div.classList.add('active'); };
            palette.appendChild(div);
        });
        palette.firstChild.classList.add('active');

        initCanvas();
        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>

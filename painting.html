<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paint Letter - Juju Fun World</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #3B82F6;
            min-height: 100vh;
            padding: 20px;
            overscroll-behavior: none;
        }
       .header { display: flex; align-items: center; margin-bottom: 20px; }
       .back-btn {
            background: white; border: none; padding: 12px 20px;
            border-radius: 15px; font-size: 18px; font-weight: 900;
            color: #F97316; cursor: pointer;
        }
       .container {
            background: #FEF3C7; padding: 25px; border-radius: 30px;
            max-width: 400px; margin: 0 auto;
        }
       .letter-title {
            font-size: 28px; font-weight: 900; color: #F97316;
            text-align: center; margin-bottom: 8px;
        }
       .canvas-wrap {
            background: white; border: 3px solid #FDBA74;
            border-radius: 20px; padding: 15px; margin-bottom: 15px;
        }
        #canvas {
            width: 100%; height: 320px; border-radius: 15px;
            touch-action: none; display: block;
        }
       .controls { display: flex; gap: 10px; margin-bottom: 15px; }
       .ctrl-btn {
            flex: 1; padding: 14px; border: none; border-radius: 15px;
            font-size: 16px; font-weight: 800; cursor: pointer;
        }
       .clear-btn { background: #EF4444; color: white; }
       .back-btn-2 { background: #3B82F6; color: white; }
       .next-btn { background: #10B981; color: white; }
       .colors {
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
        }
       .color {
            width: 45px; height: 45px; border-radius: 50%;
            border: 3px solid white; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
       .color.active { border: 4px solid #1F2937; transform: scale(1.15); }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="location.href='./dashboard.html'">← Back</button>
    </div>

    <div class="container">
        <div class="letter-title">Paint Letter: <span id="letterText">A</span></div>
        <div class="canvas-wrap">
            <canvas id="canvas"></canvas>
        </div>
        <div class="controls">
            <button class="ctrl-btn clear-btn" onclick="clearCanvas()">Clear</button>
            <button class="ctrl-btn back-btn-2" onclick="prevLetter()">← Back</button>
            <button class="ctrl-btn next-btn" onclick="nextLetter()">Next →</button>
        </div>
        <div class="colors">
            <div class="color active" style="background:#EF4444;" onclick="setColor('#EF4444', this)"></div>
            <div class="color" style="background:#F97316;" onclick="setColor('#F97316', this)"></div>
            <div class="color" style="background:#EAB308;" onclick="setColor('#EAB308', this)"></div>
            <div class="color" style="background:#10B981;" onclick="setColor('#10B981', this)"></div>
            <div class="color" style="background:#3B82F6;" onclick="setColor('#3B82F6', this)"></div>
            <div class="color" style="background:#A855F7;" onclick="setColor('#A855F7', this)"></div>
            <div class="color" style="background:#EC4899;" onclick="setColor('#EC4899', this)"></div>
        </div>
    </div>

    <script>
        if('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js?v=63');}

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let currentColor = '#EF4444';
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        let letterIndex = 0;

        function initCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width - 30; // padding -30 important
            canvas.height = 320;
            drawLetter();
        }

        function drawLetter() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // FIX 1: White base compulsory for floodFill
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = `bold ${canvas.width * 0.65}px Nunito`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 14;
            ctx.lineJoin = 'round';
            ctx.strokeText(letters[letterIndex], canvas.width/2, canvas.height/2);
            document.getElementById('letterText').textContent = letters[letterIndex];
        }

        function setColor(color, el) {
            currentColor = color;
            document.querySelectorAll('.color').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        // FIX 2: Scale correct cheyali
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let x, y;
            if (e.touches && e.touches[0]) {
                x = (e.touches[0].clientX - rect.left) * scaleX;
                y = (e.touches[0].clientY - rect.top) * scaleY;
            } else {
                x = (e.clientX - rect.left) * scaleX;
                y = (e.clientY - rect.top) * scaleY;
            }
            return { x: Math.floor(x), y: Math.floor(y) };
        }

        function floodFill(startX, startY, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const startPos = (startY * canvas.width + startX) * 4;
            const startR = data[startPos], startG = data[startPos + 1], startB = data[startPos + 2], startA = data[startPos + 3];

            // Black border or already colored unte aapi vey
            if (startA > 10 &&!(startR > 240 && startG > 240 && startB > 240)) return;

            const fillR = parseInt(fillColor.slice(1, 3), 16);
            const fillG = parseInt(fillColor.slice(3, 5), 16);
            const fillB = parseInt(fillColor.slice(5, 7), 16);

            const stack = [[startX, startY]];
            const visited = new Uint8Array(canvas.width * canvas.height);

            while (stack.length) {
                const [x, y] = stack.pop();
                if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) continue;
                if (visited[y * canvas.width + x]) continue;

                const pos = (y * canvas.width + x) * 4;
                const r = data[pos], g = data[pos + 1], b = data[pos + 2], a = data[pos + 3];
                if (a > 10 && (Math.abs(r - startR) > 10 || Math.abs(g - startG) > 10 || Math.abs(b - startB) > 10)) continue;

                visited[y * canvas.width + x] = 1;
                data[pos] = fillR; data[pos + 1] = fillG; data[pos + 2] = fillB; data[pos + 3] = 255;
                stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
            }
            ctx.putImageData(imageData, 0, 0);
        }

        // FIX 3: Touch + Mouse support
        canvas.addEventListener('click', (e) => {
            const pos = getPos(e);
            floodFill(pos.x, pos.y, currentColor);
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const pos = getPos(e);
            floodFill(pos.x, pos.y, currentColor);
        }, {passive: false});

        function clearCanvas() { drawLetter(); }
        function nextLetter() { letterIndex = (letterIndex + 1) % letters.length; drawLetter(); }
        function prevLetter() { letterIndex = (letterIndex - 1 + letters.length) % letters.length; drawLetter(); }

        window.addEventListener('load', initCanvas);
        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>

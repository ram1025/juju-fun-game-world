<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paint 10 Shapes - Juju Fun World</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { font-family: 'Baloo 2', sans-serif; background: #3B82F6; min-height: 100vh; padding: 15px; }
.header { margin-bottom: 10px; }
.back-top-btn { background: white; border: none; padding: 10px 20px; border-radius: 15px; font-size: 16px; font-weight: 900; color: #F97316; cursor: pointer; }
.container { background: #FFF7ED; padding: 20px; border-radius: 30px; max-width: 400px; margin: 0 auto; text-align: center; }
.letter-head { font-size: 32px; font-weight: 900; color: #F97316; margin-bottom: 5px; }
.letter-word { font-size: 20px; font-weight: 700; color: #1F2937; margin-bottom: 10px; }
.letter-sub { font-size: 16px; font-weight: 700; color: #92400E; margin-bottom: 10px; }
.canvas-wrap { background: #FFFFFF; border: 4px solid #FDBA74; border-radius: 20px; }
        #canvas { width: 100%; height: 300px; display: block; border-radius: 16px; background: #fff; }
.controls { display: flex; gap: 8px; margin: 12px 0; }
.btn { flex: 1; padding: 12px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; color: white; font-size: 15px; }
.colors { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
.color { width: 42px; height: 42px; border-radius: 50%; border: 3px solid white; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.color.active { transform: scale(1.2); border: 4px solid #1F2937; }
    </style>
</head>
<body>
    <div class="header"><button class="back-top-btn" onclick="location.href='./dashboard.html'">← Back</button></div>
    <div class="container">
        <div class="letter-head"><span id="count">1</span>/10: <span id="shapeText">Square</span></div>
        <div class="letter-word" id="letterWord">Color the Square 🟥</div>
        <div class="letter-sub">Outline lopala matrame rayi 🖍️</div>
        <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
        <div class="controls">
            <button class="btn" style="background:#EF4444" onclick="initCanvas()">Clear</button>
            <button class="btn" style="background:#3B82F6" onclick="changeItem(-1)">← Back</button>
            <button class="btn" style="background:#10B981" onclick="changeItem(1)">Next →</button>
        </div>
        <div class="colors" id="colorPalette"></div>
    </div>

    <script>
        if('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js?v=101');}

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // KEY: All 10 Shapes = 100% Closed Paths
        const data = [
            {n:'Square', e:'🟥', path: (p,cx,cy,r) => {p.rect(cx-r,cy-r,r*2,r*2);}},
            {n:'Circle', e:'🔵', path: (p,cx,cy,r) => {p.arc(cx,cy,r,0,Math.PI*2);}},
            {n:'Triangle', e:'🔺', path: (p,cx,cy,r) => {p.moveTo(cx,cy-r); p.lineTo(cx-r,cy+r); p.lineTo(cx+r,cy+r); p.closePath();}},
            {n:'Star', e:'⭐', path: (p,cx,cy,r) => {for(let i=0;i<10;i++){let ang=(18+i*36)*Math.PI/180; let rad=i%2?r*0.5:r; p.lineTo(cx+rad*Math.cos(ang), cy+rad*Math.sin(ang));} p.closePath();}},
            {n:'Heart', e:'❤️', path: (p,cx,cy,r) => {p.moveTo(cx,cy+r*0.3); p.bezierCurveTo(cx,cy-r*0.3, cx-r,cy-r*0.3, cx-r,cy+r*0.1); p.bezierCurveTo(cx-r,cy+r*0.5, cx,cy+r*0.8, cx,cy+r*0.8); p.bezierCurveTo(cx,cy+r*0.8, cx+r,cy+r*0.5, cx+r,cy+r*0.1); p.bezierCurveTo(cx+r,cy-r*0.3, cx,cy-r*0.3, cx,cy+r*0.3); p.closePath();}},
            {n:'Sun', e:'☀️', path: (p,cx,cy,r) => { // Cartoon Sun
                p.arc(cx,cy,r*0.6,0,Math.PI*2); p.closePath(); // Center
                for(let i=0;i<8;i++){ // 8 Fat Rays
                    let ang=i*Math.PI/4;
                    p.moveTo(cx+r*0.6*Math.cos(ang),cy+r*0.6*Math.sin(ang));
                    p.lineTo(cx+r*1.1*Math.cos(ang),cy+r*1.1*Math.sin(ang));
                }
            }},
            {n:'Cloud', e:'☁️', path: (p,cx,cy,r) => { // Puffy Cloud
                p.arc(cx-r*0.4,cy,r*0.4,0,Math.PI*2);
                p.arc(cx,cy-r*0.2,r*0.5,0,Math.PI*2);
                p.arc(cx+r*0.4,cy,r*0.4,0,Math.PI*2);
            }},
            {n:'Rectangle', e:'🟫', path: (p,cx,cy,r) => {p.rect(cx-r*1.2,cy-r,r*2.4,r*2);}},
            {n:'Diamond', e:'💎', path: (p,cx,cy,r) => {p.moveTo(cx,cy-r); p.lineTo(cx+r,cy); p.lineTo(cx,cy+r); p.lineTo(cx-r,cy); p.closePath();}},
            {n:'Moon', e:'🌙', path: (p,cx,cy,r) => { // FINAL FIX: Perfect Crescent
                p.arc(cx,cy,r,0,Math.PI*2);
                p.arc(cx+r*0.5,cy,r*0.9,Math.PI*0.5,Math.PI*1.5,true); // Inner cut, bigger
                p.closePath();
            }},
        ];
        let idx = 0, drawing = false, curCol = '#EF4444';
        let cw, ch, cx, cy, r;

        function initCanvas() {
            cw = canvas.offsetWidth; ch = 300;
            canvas.width = cw; canvas.height = ch;
            cx = cw/2; cy = ch/2; r = Math.min(cw,ch)*0.35;

            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, cw, ch);

            document.getElementById('count').textContent = idx+1;
            document.getElementById('shapeText').textContent = data[idx].n;
            document.getElementById('letterWord').textContent = `Color the ${data[idx].n} ${data[idx].e}`;

            drawOutline();
            speak(data[idx].n);
        }

        function getItemPath() {
            const p = new Path2D();
            data[idx].path(p, cx, cy, r);
            return p;
        }

        function drawOutline() {
            const path = getItemPath();
            ctx.strokeStyle = '#374151';
            ctx.lineWidth = 18;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.setLineDash([12, 6]);
            ctx.stroke(path);
            ctx.setLineDash([]);
        }

        function startDraw(e) {
            e.preventDefault();
            const pos = getPos(e);
            drawing = true;
            ctx.save();
            ctx.clip(getItemPath(), 'evenodd'); // KEY: Magic
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = curCol;
            ctx.lineWidth = 32;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function stopDraw(e) {
            if (e) e.preventDefault();
            drawing = false;
            ctx.restore();
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: (e.touches? e.touches[0].clientX : e.clientX) - rect.left, y: (e.touches? e.touches[0].clientY : e.clientY) - rect.top };
        }

        function speak(text) {
            if('speechSynthesis' in window) {
                speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US'; u.rate = 0.8;
                speechSynthesis.speak(u);
            }
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDraw, {passive: false});

        function changeItem(step) {
            idx = (idx + step + data.length) % data.length;
            initCanvas();
        }

        const colors = ['#EF4444', '#F97316', '#F59E0B', '#EAB308', '#10B981', '#14B8A6', '#3B82F6', '#8B5CF6', '#A855F7', '#EC4899'];
        const palette = document.getElementById('colorPalette');
        colors.forEach(c => {
            const div = document.createElement('div');
            div.className = 'color';
            div.style.background = c;
            div.onclick = () => { curCol = c; document.querySelectorAll('.color').forEach(el => el.classList.remove('active')); div.classList.add('active'); };
            palette.appendChild(div);
        });
        palette.firstChild.classList.add('active');

        initCanvas();
        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
